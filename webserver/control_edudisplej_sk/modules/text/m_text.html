<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduDisplej Text Module</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #000000;
            color: #ffffff;
        }

        .module-root {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        .text-viewport {
            position: absolute;
            inset: 0;
            overflow: hidden;
            padding: 4vh 4vw;
        }

        .clock-overlay-band {
            position: absolute;
            left: 0;
            right: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.35em;
            background: rgba(0, 0, 0, 0.32);
            line-height: 1;
            z-index: 2;
        }

        .clock-overlay-separator {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background-image: repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.9) 0 8px,
                transparent 8px 14px
            );
            pointer-events: none;
        }

        .clock-overlay-time,
        .clock-overlay-date {
            width: 100%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 1.2vw;
            font-weight: 800;
        }

        .clock-overlay-date {
            font-weight: 700;
            opacity: 0.96;
        }

        .text-content {
            width: 100%;
            white-space: normal;
            word-break: break-word;
            overflow-wrap: anywhere;
            transform: translateY(0px);
            will-change: transform;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(60px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes zoomIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .text-animation-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .text-animation-slideUp {
            animation: slideUp 0.8s ease-out forwards;
        }

        .text-animation-zoomIn {
            animation: zoomIn 0.8s ease-out forwards;
        }        .text-content p,
        .text-content div,
        .text-content blockquote,
        .text-content h1,
        .text-content h2,
        .text-content h3,
        .text-content h4,
        .text-content h5,
        .text-content h6 {
            margin: 0.15em 0;
        }

        .text-content ul,
        .text-content ol {
            margin: 0.25em 0 0.25em 1.2em;
            padding-left: 1em;
            list-style-position: outside;
        }

        .text-content li {
            margin: 0.1em 0;
        }
    </style>
</head>
<body>
    <div class="module-root" id="moduleRoot">
        <div class="clock-overlay-band" id="clockOverlayBand">
            <div class="clock-overlay-separator" id="clockOverlaySeparator"></div>
            <div class="clock-overlay-time" id="clockOverlayTime">--:--</div>
            <div class="clock-overlay-date" id="clockOverlayDate">--.--.----</div>
        </div>
        <div class="text-viewport" id="textViewport">
            <div class="text-content" id="textContent"></div>
        </div>
    </div>

    <script>
        function parseNum(value, fallback) {
            const n = Number(value);
            return Number.isFinite(n) ? n : fallback;
        }

        function parseBool(value, fallback = false) {
            if (value === null || value === undefined || value === '') {
                return fallback;
            }
            if (typeof value === 'boolean') {
                return value;
            }
            const normalized = String(value).toLowerCase();
            if (['1', 'true', 'yes', 'on'].includes(normalized)) return true;
            if (['0', 'false', 'no', 'off'].includes(normalized)) return false;
            return fallback;
        }

        function sanitizeRichHtml(value) {
            const raw = String(value || '').trim();
            if (!raw) {
                return '';
            }

            const parser = new DOMParser();
            const doc = parser.parseFromString(`<div>${raw}</div>`, 'text/html');
            const root = doc.body.firstElementChild;
            if (!root) {
                return '';
            }

            const allowedTags = new Set([
                'p', 'div', 'span', 'br', 'strong', 'b', 'em', 'i', 'u',
                'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'blockquote'
            ]);
            const allowedStyles = new Set([
                'color', 'font-weight', 'font-style', 'text-decoration', 'text-decoration-line',
                'text-align', 'font-family', 'font-size', 'line-height', 'background-color'
            ]);

            const sanitizeNode = (node) => {
                const children = Array.from(node.childNodes);
                children.forEach((child) => {
                    if (child.nodeType === Node.ELEMENT_NODE) {
                        const tag = child.tagName.toLowerCase();
                        if (!allowedTags.has(tag)) {
                            const text = doc.createTextNode(child.textContent || '');
                            child.replaceWith(text);
                            return;
                        }

                        Array.from(child.attributes).forEach((attr) => {
                            const attrName = attr.name.toLowerCase();
                            if (attrName.startsWith('on')) {
                                child.removeAttribute(attr.name);
                                return;
                            }

                            if (attrName === 'style') {
                                const safeRules = [];
                                String(attr.value || '').split(';').forEach((rule) => {
                                    const parts = rule.split(':');
                                    if (parts.length < 2) {
                                        return;
                                    }
                                    const prop = parts[0].trim().toLowerCase();
                                    const val = parts.slice(1).join(':').trim();
                                    if (!allowedStyles.has(prop)) {
                                        return;
                                    }
                                    if (/url\s*\(|expression\s*\(|javascript:/i.test(val)) {
                                        return;
                                    }
                                    safeRules.push(`${prop}: ${val}`);
                                });

                                if (safeRules.length > 0) {
                                    child.setAttribute('style', safeRules.join('; '));
                                } else {
                                    child.removeAttribute('style');
                                }
                                return;
                            }

                            child.removeAttribute(attr.name);
                        });

                        sanitizeNode(child);
                    } else if (child.nodeType === Node.COMMENT_NODE) {
                        child.remove();
                    }
                });
            };

            sanitizeNode(root);
            return root.innerHTML;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function plainTextToHtml(value) {
            const text = String(value || '').replace(/\r\n?/g, '\n').trim();
            if (!text) {
                return '';
            }
            return escapeHtml(text).replace(/\n/g, '<br>');
        }

        function isHtmlResourceUrl(value) {
            return /\.html(?:[?#].*)?$/i.test(String(value || '').trim());
        }

        function getSettings() {
            const defaults = {
                textSourceType: 'manual',
                textCollectionId: 0,
                textCollectionLabel: '',
                textCollectionVersionTs: 0,
                textExternalUrl: '',
                text: 'Sem vložte text...',
                fontFamily: 'Arial, sans-serif',
                fontSize: 72,
                textSizingMode: 'manual',
                fontWeight: '700',
                fontStyle: 'normal',
                lineHeight: 1.2,
                textAlign: 'left',
                textColor: '#ffffff',
                bgColor: '#000000',
                bgImageData: '',
                bgImageStorageKey: '',
                durationSeconds: 10,
                textAnimationEntry: 'none',
                scrollMode: false,
                scrollStartPauseMs: 3000,
                scrollEndPauseMs: 3000,
                scrollSpeedPxPerSec: 35,
                clockOverlayEnabled: false,
                clockOverlayPosition: 'bottom',
                clockOverlayHeightPercent: 30,
                clockOverlayTimeColor: '#ffffff',
                clockOverlayDateColor: '#ffffff',
                clockOverlayClockSize: 300,
                clockOverlayDateFormat: 'dmy',
                clockOverlayShowYear: true,
                clockOverlayLanguage: 'sk',
                clockOverlayDatePosition: 'below',
                clockOverlayFontFamily: 'Arial, sans-serif',
                clockOverlaySeparatorColor: '#22d3ee',
                clockOverlaySeparatorThickness: 2
            };

            const injected = (typeof window.EDUDISPLEJ_SETTINGS === 'object' && window.EDUDISPLEJ_SETTINGS)
                ? window.EDUDISPLEJ_SETTINGS
                : {};

            const params = new URLSearchParams(window.location.search);
            const merged = {
                ...defaults,
                ...injected,
                textSourceType: String(params.get('textSourceType') ?? injected.textSourceType ?? defaults.textSourceType),
                textCollectionId: parseNum(params.get('textCollectionId') ?? injected.textCollectionId, defaults.textCollectionId),
                textCollectionLabel: String(params.get('textCollectionLabel') ?? injected.textCollectionLabel ?? defaults.textCollectionLabel),
                textCollectionVersionTs: parseNum(params.get('textCollectionVersionTs') ?? injected.textCollectionVersionTs, defaults.textCollectionVersionTs),
                textExternalUrl: String(params.get('textExternalUrl') ?? injected.textExternalUrl ?? defaults.textExternalUrl),
                text: params.get('text') ?? injected.text ?? defaults.text,
                fontFamily: params.get('fontFamily') ?? injected.fontFamily ?? defaults.fontFamily,
                fontSize: parseNum(params.get('fontSize') ?? injected.fontSize, defaults.fontSize),
                textSizingMode: String(params.get('textSizingMode') ?? injected.textSizingMode ?? defaults.textSizingMode),
                fontWeight: String(params.get('fontWeight') ?? injected.fontWeight ?? defaults.fontWeight),
                fontStyle: String(params.get('fontStyle') ?? injected.fontStyle ?? defaults.fontStyle),
                lineHeight: parseNum(params.get('lineHeight') ?? injected.lineHeight, defaults.lineHeight),
                textAlign: String(params.get('textAlign') ?? injected.textAlign ?? defaults.textAlign),
                textColor: params.get('textColor') ?? injected.textColor ?? defaults.textColor,
                bgColor: params.get('bgColor') ?? injected.bgColor ?? defaults.bgColor,
                bgImageData: params.get('bgImageData') ?? injected.bgImageData ?? defaults.bgImageData,
                bgImageStorageKey: params.get('bgImageStorageKey') ?? injected.bgImageStorageKey ?? '',
                durationSeconds: parseNum(params.get('durationSeconds') ?? injected.durationSeconds, defaults.durationSeconds),
                textAnimationEntry: String(params.get('textAnimationEntry') ?? injected.textAnimationEntry ?? defaults.textAnimationEntry),
                scrollMode: parseBool(params.get('scrollMode') ?? injected.scrollMode, defaults.scrollMode),
                scrollStartPauseMs: parseNum(params.get('scrollStartPauseMs') ?? injected.scrollStartPauseMs, defaults.scrollStartPauseMs),
                scrollEndPauseMs: parseNum(params.get('scrollEndPauseMs') ?? injected.scrollEndPauseMs, defaults.scrollEndPauseMs),
                scrollSpeedPxPerSec: parseNum(params.get('scrollSpeedPxPerSec') ?? injected.scrollSpeedPxPerSec, defaults.scrollSpeedPxPerSec),
                clockOverlayEnabled: parseBool(params.get('clockOverlayEnabled') ?? injected.clockOverlayEnabled, defaults.clockOverlayEnabled),
                clockOverlayPosition: String(params.get('clockOverlayPosition') ?? injected.clockOverlayPosition ?? defaults.clockOverlayPosition),
                clockOverlayHeightPercent: parseNum(params.get('clockOverlayHeightPercent') ?? injected.clockOverlayHeightPercent, defaults.clockOverlayHeightPercent),
                clockOverlayTimeColor: params.get('clockOverlayTimeColor') ?? injected.clockOverlayTimeColor ?? defaults.clockOverlayTimeColor,
                clockOverlayDateColor: params.get('clockOverlayDateColor') ?? injected.clockOverlayDateColor ?? defaults.clockOverlayDateColor,
                clockOverlayClockSize: parseNum(params.get('clockOverlayClockSize') ?? injected.clockOverlayClockSize, defaults.clockOverlayClockSize),
                clockOverlayDateFormat: String(params.get('clockOverlayDateFormat') ?? injected.clockOverlayDateFormat ?? defaults.clockOverlayDateFormat),
                clockOverlayShowYear: parseBool(params.get('clockOverlayShowYear') ?? injected.clockOverlayShowYear, defaults.clockOverlayShowYear),
                clockOverlayLanguage: String(params.get('clockOverlayLanguage') ?? injected.clockOverlayLanguage ?? defaults.clockOverlayLanguage),
                clockOverlayDatePosition: String(params.get('clockOverlayDatePosition') ?? injected.clockOverlayDatePosition ?? defaults.clockOverlayDatePosition),
                clockOverlayFontFamily: String(params.get('clockOverlayFontFamily') ?? injected.clockOverlayFontFamily ?? defaults.clockOverlayFontFamily),
                clockOverlaySeparatorColor: String(params.get('clockOverlaySeparatorColor') ?? injected.clockOverlaySeparatorColor ?? defaults.clockOverlaySeparatorColor),
                clockOverlaySeparatorThickness: parseNum(params.get('clockOverlaySeparatorThickness') ?? injected.clockOverlaySeparatorThickness, defaults.clockOverlaySeparatorThickness)
            };

            if (!merged.bgImageData && merged.bgImageStorageKey) {
                try {
                    const stored = localStorage.getItem(merged.bgImageStorageKey);
                    if (stored) {
                        merged.bgImageData = stored;
                    }
                } catch (error) {
                }
            }

            return merged;
        }

        async function resolveTextHtml() {
            const fallbackHtml = sanitizeRichHtml(settings.text || '') || 'Sem vložte text...';
            const sourceType = String(settings.textSourceType || 'manual').toLowerCase();
            const externalUrl = String(settings.textExternalUrl || '').trim();

            if (sourceType === 'external' && externalUrl && isHtmlResourceUrl(externalUrl)) {
                try {
                    const response = await fetch(externalUrl, {
                        method: 'GET',
                        cache: 'no-store'
                    });
                    if (response.ok) {
                        const responseText = String(await response.text() || '').slice(0, 30000);
                        const externalHtml = plainTextToHtml(responseText);
                        if (externalHtml) {
                            return externalHtml;
                        }
                    }
                } catch (error) {
                }
            }

            return fallbackHtml;
        }

        const settings = getSettings();
        const root = document.getElementById('moduleRoot');
        const viewport = document.getElementById('textViewport');
        const content = document.getElementById('textContent');
        const clockOverlayBand = document.getElementById('clockOverlayBand');
        const clockOverlaySeparator = document.getElementById('clockOverlaySeparator');
        const clockOverlayTime = document.getElementById('clockOverlayTime');
        const clockOverlayDate = document.getElementById('clockOverlayDate');

        let overlayClockInterval = null;

        function clearOverlayClockRuntime() {
            if (overlayClockInterval !== null) {
                clearInterval(overlayClockInterval);
                overlayClockInterval = null;
            }
        }

        function getUiLocale() {
            const raw = String(document?.documentElement?.lang || '').toLowerCase();
            if (raw.startsWith('hu')) return 'hu-HU';
            if (raw.startsWith('en')) return 'en-GB';
            return 'sk-SK';
        }

        function getOverlayLocale(language) {
            const lang = String(language || '').toLowerCase();
            if (lang === 'hu') return 'hu-HU';
            if (lang === 'en') return 'en-GB';
            if (lang === 'sk') return 'sk-SK';
            return getUiLocale();
        }

        function normalizeOverlayDateFormat(value) {
            const raw = String(value || '').toLowerCase();
            return ['full', 'short', 'dmy', 'numeric', 'none'].includes(raw) ? raw : 'dmy';
        }

        function normalizeOverlayDatePosition(value) {
            return String(value || '').toLowerCase() === 'right' ? 'right' : 'below';
        }

        function formatOverlayDate(now) {
            const locale = getOverlayLocale(settings.clockOverlayLanguage);
            const format = normalizeOverlayDateFormat(settings.clockOverlayDateFormat);
            const showYear = settings.clockOverlayShowYear !== false;
            if (format === 'none') {
                return '';
            }

            if (format === 'full') {
                return new Intl.DateTimeFormat(locale, {
                    weekday: 'long',
                    ...(showYear ? { year: 'numeric' } : {}),
                    month: 'long',
                    day: 'numeric'
                }).format(now);
            }

            if (format === 'short') {
                return new Intl.DateTimeFormat(locale, {
                    ...(showYear ? { year: 'numeric' } : {}),
                    month: 'short',
                    day: 'numeric'
                }).format(now);
            }

            if (format === 'numeric') {
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                if (showYear) {
                    const y = String(now.getFullYear());
                    return `${y}.${m}.${d}`;
                }
                return `${m}.${d}`;
            }

            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            if (showYear) {
                const y = String(now.getFullYear());
                return `${d}.${m}.${y}`;
            }
            return `${d}.${m}`;
        }

        function renderOverlayClockTick() {
            if (!clockOverlayTime || !clockOverlayDate) {
                return;
            }
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            clockOverlayTime.textContent = `${hh}:${mm}`;
            const dateText = formatOverlayDate(now);
            clockOverlayDate.textContent = dateText;
            clockOverlayDate.style.display = dateText ? 'block' : 'none';
        }

        function applyClockOverlayLayout() {
            if (!clockOverlayBand || !viewport) {
                return;
            }

            clearOverlayClockRuntime();

            const enabled = settings.clockOverlayEnabled === true;
            if (!enabled) {
                clockOverlayBand.style.display = 'none';
                clockOverlayBand.style.top = '';
                clockOverlayBand.style.bottom = '';
                clockOverlayBand.style.height = '';
                if (clockOverlaySeparator) {
                    clockOverlaySeparator.style.display = 'none';
                }
                viewport.style.top = '0';
                viewport.style.bottom = '0';
                return;
            }

            const position = 'bottom';
            const bandHeight = Math.max(30, Math.min(30, parseNum(settings.clockOverlayHeightPercent, 30)));
            const datePosition = normalizeOverlayDatePosition(settings.clockOverlayDatePosition);
            const clockSize = Math.max(100, Math.min(2000, parseNum(settings.clockOverlayClockSize, 300)));
            const bandPx = Math.max(120, Math.round((root.clientHeight || window.innerHeight || 1080) * (bandHeight / 100)));
            const scale = clockSize / 300;
            const dateHidden = normalizeOverlayDateFormat(settings.clockOverlayDateFormat) === 'none';
            const baseTimeRatio = dateHidden ? 0.86 : (datePosition === 'right' ? 0.72 : 0.66);
            const baseDateRatio = datePosition === 'right' ? 0.28 : 0.24;
            const timePx = Math.max(36, Math.min(900, Math.round(bandPx * baseTimeRatio * scale)));
            const datePx = Math.max(14, Math.min(260, Math.round(bandPx * baseDateRatio * Math.max(0.7, scale * 0.95))));
            const overlayFontFamily = String(settings.clockOverlayFontFamily || 'Arial, sans-serif');
            const separatorColor = String(settings.clockOverlaySeparatorColor || '#22d3ee');
            const separatorThickness = Math.max(1, Math.min(8, Math.round(parseNum(settings.clockOverlaySeparatorThickness, 2))));

            clockOverlayBand.style.display = 'flex';
            clockOverlayBand.style.height = `${bandHeight}%`;
            clockOverlayBand.style.top = position === 'top' ? '0' : '';
            clockOverlayBand.style.bottom = position === 'bottom' ? '0' : '';
            clockOverlayBand.style.flexDirection = datePosition === 'right' ? 'row' : 'column';
            clockOverlayBand.style.gap = datePosition === 'right' ? '1.2em' : '0.35em';
            clockOverlayBand.style.background = 'rgba(0, 0, 0, 0.48)';

            if (position === 'top') {
                viewport.style.top = `${bandHeight}%`;
                viewport.style.bottom = '0';
            } else {
                viewport.style.top = '0';
                viewport.style.bottom = `${bandHeight}%`;
            }

            if (clockOverlaySeparator) {
                clockOverlaySeparator.style.display = 'block';
                clockOverlaySeparator.style.height = `${separatorThickness}px`;
                clockOverlaySeparator.style.top = position === 'bottom' ? '0' : 'auto';
                clockOverlaySeparator.style.bottom = position === 'top' ? '0' : 'auto';
                clockOverlaySeparator.style.backgroundImage = `repeating-linear-gradient(90deg, ${separatorColor} 0 10px, transparent 10px 17px)`;
            }

            if (clockOverlayTime) {
                clockOverlayTime.style.color = settings.clockOverlayTimeColor || '#ffffff';
                clockOverlayTime.style.fontSize = `${timePx}px`;
                clockOverlayTime.style.width = datePosition === 'right' ? 'auto' : '100%';
                clockOverlayTime.style.fontFamily = overlayFontFamily;
                clockOverlayTime.style.fontWeight = '900';
                clockOverlayTime.style.letterSpacing = '0.02em';
            }
            if (clockOverlayDate) {
                clockOverlayDate.style.color = settings.clockOverlayDateColor || '#ffffff';
                clockOverlayDate.style.fontSize = `${datePx}px`;
                clockOverlayDate.style.width = datePosition === 'right' ? 'auto' : '100%';
                clockOverlayDate.style.marginTop = datePosition === 'right' ? '0' : '6px';
                clockOverlayDate.style.fontFamily = overlayFontFamily;
            }

            renderOverlayClockTick();
            overlayClockInterval = setInterval(renderOverlayClockTick, 1000);
        }

        function applyStyles(resolvedHtml) {
            root.style.backgroundColor = settings.bgColor || '#000000';

            if (settings.bgImageData) {
                root.style.backgroundImage = `url("${settings.bgImageData}")`;
            } else {
                root.style.backgroundImage = 'none';
            }

            content.innerHTML = resolvedHtml || 'Sem vložte text...';
            content.style.fontFamily = settings.fontFamily || 'Arial, sans-serif';
            const requestedFontSize = Math.max(10, parseNum(settings.fontSize, 72));
            content.style.fontSize = `${requestedFontSize}px`;
            content.style.fontWeight = settings.fontWeight || '700';
            content.style.fontStyle = settings.fontStyle || 'normal';
            content.style.lineHeight = String(Math.max(0.8, parseNum(settings.lineHeight, 1.2)));
            content.style.textAlign = settings.textAlign || 'left';
            content.style.color = settings.textColor || '#ffffff';

            applyClockOverlayLayout();

            if (String(settings.textSizingMode || 'manual').toLowerCase() === 'fit') {
                const minFont = 10;
                const maxFont = 260;
                let low = minFont;
                let high = maxFont;
                let best = minFont;

                const fitsAt = (sizePx) => {
                    content.style.fontSize = `${sizePx}px`;
                    return content.scrollHeight <= (viewport.clientHeight + 1)
                        && content.scrollWidth <= (viewport.clientWidth + 1);
                };

                while (low <= high) {
                    const mid = Math.floor((low + high) / 2);
                    if (fitsAt(mid)) {
                        best = mid;
                        low = mid + 1;
                    } else {
                        high = mid - 1;
                    }
                }

                content.style.fontSize = `${best}px`;
            } else {
                content.style.fontSize = `${requestedFontSize}px`;
            }

            const animationEntry = String(settings.textAnimationEntry || 'none').toLowerCase();
            if (animationEntry === 'fadein') {
                content.classList.add('text-animation-fadeIn');
            } else if (animationEntry === 'slideup') {
                content.classList.add('text-animation-slideUp');
            } else if (animationEntry === 'zoomin') {
                content.classList.add('text-animation-zoomIn');
            }
        }

        let scrollAnimationFrame = null;
        let scrollTimeout = null;

        function clearScrollRuntime() {
            if (scrollAnimationFrame) {
                cancelAnimationFrame(scrollAnimationFrame);
                scrollAnimationFrame = null;
            }
            if (scrollTimeout) {
                clearTimeout(scrollTimeout);
                scrollTimeout = null;
            }
        }

        function startScrollIfNeeded() {
            clearScrollRuntime();
            content.style.transform = 'translateY(0px)';

            const scrollRequired = settings.scrollMode || settings.clockOverlayEnabled;
            if (!scrollRequired) {
                return;
            }

            const overflow = content.scrollHeight - viewport.clientHeight;
            if (overflow <= 0) {
                return;
            }

            const startPause = Math.max(0, parseNum(settings.scrollStartPauseMs, 3000));
            const endPause = Math.max(0, parseNum(settings.scrollEndPauseMs, 3000));
            let speed = Math.max(5, parseNum(settings.scrollSpeedPxPerSec, 35));
            const distance = overflow;

            const availableTotalMs = Math.max(1000, parseNum(settings.durationSeconds, 10) * 1000);
            let effectiveStartPause = startPause;
            let effectiveEndPause = endPause;
            let scrollingMs = Math.max(200, availableTotalMs - effectiveStartPause - effectiveEndPause);

            if (availableTotalMs <= (effectiveStartPause + effectiveEndPause + 200)) {
                const reducedPause = Math.max(0, (availableTotalMs - 200) / 2);
                effectiveStartPause = reducedPause;
                effectiveEndPause = reducedPause;
                scrollingMs = Math.max(200, availableTotalMs - effectiveStartPause - effectiveEndPause);
            }

            const fittedSpeed = distance / Math.max(0.2, scrollingMs / 1000);
            if (Number.isFinite(fittedSpeed) && fittedSpeed > 0) {
                speed = fittedSpeed;
            }
            const durationMs = (distance / speed) * 1000;

            scrollTimeout = setTimeout(() => {
                const startedAt = performance.now();

                const tick = (now) => {
                    const elapsed = now - startedAt;
                    const progress = Math.min(elapsed / durationMs, 1);
                    const y = -distance * progress;
                    content.style.transform = `translateY(${y}px)`;

                    if (progress < 1) {
                        scrollAnimationFrame = requestAnimationFrame(tick);
                    } else {
                        scrollTimeout = setTimeout(() => {
                        }, effectiveEndPause);
                    }
                };

                scrollAnimationFrame = requestAnimationFrame(tick);
            }, effectiveStartPause);
        }

        async function render() {
            const resolvedHtml = await resolveTextHtml();
            applyStyles(resolvedHtml);
            requestAnimationFrame(startScrollIfNeeded);
        }

        render();
        window.addEventListener('resize', () => {
            render();
        });
        window.addEventListener('beforeunload', () => {
            clearOverlayClockRuntime();
        });
    </script>
</body>
</html>
