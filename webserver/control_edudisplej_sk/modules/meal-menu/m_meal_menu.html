<div class="root">

            </div>

                <div class="small-header-date" id="small-header-date">--.--.----</div>
                <div class="small-header-clock" id="small-header-clock">--:--</div>
            </div>
            <div class="status" id="status">Loading...</div>
        </div>
        <div class="cards-wrap" id="cards-wrap"><div class="cards" id="cards"></div></div>
        <div class="foot" id="foot"></div>
    </div>

<script src="./meal_menu_utils.js"></script>
<script>
(function () {
    const MU = (typeof window.MealMenuUtils === 'object' && window.MealMenuUtils) ? window.MealMenuUtils : null;
    let scrollRaf = null;
    let mealPageSwitchTimer = null;
    let overlayClockInterval = null;
    let smallHeaderClockInterval = null;
    let backgroundRefreshTimer = null;
    const overlayTextState = {
        top: { raf: null },
        bottom: { raf: null }
    };
    const headerTitleMarqueeState = new WeakMap();

    function stopHeaderTitleMarquee(titleEl) {
        if (!titleEl) {
            return;
        }
        const state = headerTitleMarqueeState.get(titleEl);
        if (state && state.raf !== null) {
            cancelAnimationFrame(state.raf);
        }
        headerTitleMarqueeState.delete(titleEl);
        const track = titleEl.querySelector('.small-page-header-title-track');
        if (track) {
            track.style.transform = 'translate3d(0, 0, 0)';
        }
    }

    function startHeaderTitleMarquee(titleEl, settings = null) {
        if (!titleEl) {
            return;
        }

        stopHeaderTitleMarquee(titleEl);

        const track = titleEl.querySelector('.small-page-header-title-track');
        if (!track) {
            return;
        }

        const overflow = Math.ceil(track.scrollWidth - titleEl.clientWidth);
        if (overflow <= 8) {
            track.style.transform = 'translate3d(0, 0, 0)';
            return;
        }

        const speedPxPerSec = Math.max(8, Math.min(60, Number(settings?.smallHeaderMarqueeSpeedPxPerSec || 22)));
        const edgePauseMs = Math.max(200, Math.min(5000, Number(settings?.smallHeaderMarqueeEdgePauseMs || 1200)));
        let x = 0;
        let direction = -1;
        let lastTs = 0;
        let pauseUntil = performance.now() + edgePauseMs;

        const step = (ts) => {
            if (!titleEl.isConnected || !track.isConnected) {
                stopHeaderTitleMarquee(titleEl);
                return;
            }

            if (lastTs === 0) {
                lastTs = ts;
            }

            if (ts >= pauseUntil) {
                const dt = Math.max(0, (ts - lastTs) / 1000);
                x += direction * speedPxPerSec * dt;

                if (direction < 0 && x <= -overflow) {
                    x = -overflow;
                    direction = 1;
                    pauseUntil = ts + edgePauseMs;
                } else if (direction > 0 && x >= 0) {
                    x = 0;
                    direction = -1;
                    pauseUntil = ts + edgePauseMs;
                }
            }

            track.style.transform = `translate3d(${Math.round(x)}px, 0, 0)`;
            lastTs = ts;

            const state = headerTitleMarqueeState.get(titleEl);
            if (state) {
                state.raf = requestAnimationFrame(step);
            }
        };

        headerTitleMarqueeState.set(titleEl, { raf: requestAnimationFrame(step) });
    }

    function stopSlowScroll() {
        if (scrollRaf !== null) {
            cancelAnimationFrame(scrollRaf);
            scrollRaf = null;
        }
        const cards = document.getElementById('cards');
        if (cards) {
            cards.style.transform = 'translateY(0px)';
        }
    }

    function stopMealPageSwitch() {
        if (mealPageSwitchTimer !== null) {
            clearInterval(mealPageSwitchTimer);
            mealPageSwitchTimer = null;
        }
    }

    function stopSmallHeaderClock() {
        if (smallHeaderClockInterval !== null) {
            clearInterval(smallHeaderClockInterval);
            smallHeaderClockInterval = null;
        }
    }

    function startSmallHeaderClock() {
        const skDayShort = ['Ne', 'Po', 'Ut', 'St', 'Št', 'Pia', 'So'];

        const renderClock = () => {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const yyyy = String(now.getFullYear());
            const dayShort = skDayShort[now.getDay()] || 'Po';

            const legacyClockEl = document.getElementById('small-header-clock');
            const legacyDateEl = document.getElementById('small-header-date');
            if (legacyClockEl) {
                legacyClockEl.textContent = `${hh}:${mm}`;
            }
            if (legacyDateEl) {
                legacyDateEl.textContent = `${dayShort} ${dd}.${month}.${yyyy}`;
            }

            const rowClockEls = Array.from(document.querySelectorAll('[data-small-fixed-clock]'));
            rowClockEls.forEach((el) => {
                el.textContent = `${hh}:${mm}`;
            });
        };

        stopSmallHeaderClock();
        renderClock();
        smallHeaderClockInterval = setInterval(renderClock, 1000);
    }

    function parseBool(value, fallback) {
        if (value === null || value === undefined || value === '') return fallback;
        if (typeof value === 'boolean') return value;
        const normalized = String(value).toLowerCase();
        if (['1','true','yes','on'].includes(normalized)) return true;
        if (['0','false','no','off'].includes(normalized)) return false;
        return fallback;
    }

    function parseNum(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
    }

    function mealLineSvg(lineText, mealKey, lineIndex) {
        if (String(mealKey || '').toLowerCase() === 'lunch') {
            if (lineIndex === 0) return iconSvg('soup');
            if (lineIndex === 1) return iconSvg('cutlery');
            if (lineIndex === 2) return iconSvg('plate');
        }
        const normalized = String(lineText || '').toLowerCase();
        if (normalized.includes('polievka') || normalized.includes('leves')) {
            return iconSvg('soup');
        }
        return iconSvg('food');

    function applyVisualSettings(settings) {
        const root = document.documentElement;
        root.style.setProperty('--meal-font-family', String(settings.fontFamily || 'Segoe UI, Tahoma, sans-serif'));

        const textSize = Math.max(1.8, Math.min(4, Number(settings.mealTextFontSize || 2.4)));
        const titleSize = Math.max(0.8, Math.min(4, textSize * 1.5));
        const textWeight = Math.max(300, Math.min(800, Number(settings.textFontWeight || 600)));
        const lineHeight = Math.max(1, Math.min(2.2, Number(settings.lineHeight || 1.35)));
        const smallHeaderFontPx = Math.max(20, Math.min(120, Number(settings.smallScreenHeaderFontPx || 40)));

        // Detect preview mode: when iframe viewport is exactly 320px or less and it's in an iframe
        // This is used to scale up vw values which are relative to the small iframe viewport
        const isInIframe = window.parent !== window;
        const smallViewport = document.documentElement.offsetWidth <= 320;
        const isPreview = isInIframe && smallViewport;
        
        // Scale factor: 3.5x compensates for the fact that vw calculations are based on 320px iframe width
        // but the iframe is then scaled down further with CSS transform scale()
        const scaleFactor = isPreview ? 3.5 : 1;

        root.style.setProperty('--meal-title-font-size', `${titleSize * scaleFactor}vw`);
        root.style.setProperty('--meal-text-font-size', `${textSize * scaleFactor}vw`);
        root.style.setProperty('--small-header-font-px', `${smallHeaderFontPx}px`);
        
        // Add preview-mode class to override clamp() limits
        document.documentElement.classList.toggle('preview-mode', isPreview);
        root.style.setProperty('--meal-text-weight', String(Math.round(textWeight)));
        root.style.setProperty('--meal-line-height', String(lineHeight));

        root.style.setProperty('--meal-white-space', 'nowrap');
        root.style.setProperty('--meal-word-break', 'normal');
        root.style.setProperty('--meal-overflow-wrap', 'normal');

        const rootEl = document.querySelector('.root');
        if (rootEl) {
            const displayMode = String(settings.mealDisplayMode || 'small_screen').toLowerCase() === 'large_screen'
                ? 'large_screen'
                : 'small_screen';
            rootEl.classList.toggle('small-mode', displayMode === 'small_screen');
            rootEl.classList.toggle('large-mode', displayMode === 'large_screen');
            rootEl.classList.remove('center', 'center-left', 'scroll-mode', 'square-mode');

            const shouldWrapLargeText = displayMode === 'large_screen'
                && settings.wrapText !== false;
            root.style.setProperty('--meal-white-space', shouldWrapLargeText ? 'normal' : 'nowrap');
            root.style.setProperty('--meal-word-break', shouldWrapLargeText ? 'break-word' : 'normal');
            root.style.setProperty('--meal-overflow-wrap', shouldWrapLargeText ? 'anywhere' : 'normal');
        }
    }

    function normalizeMealLine(line) {
        if (MU && typeof MU.normalizeMealLine === 'function') {
            return MU.normalizeMealLine(line);
        }
        let value = String(line || '').trim();
        value = value.replace(/^\d+\.\s*/u, '');
        value = value.replace(/^\d{1,2}\.\d{3}(?:\s*[\)\].,;:-])?\s*/u, '');
        value = value.replace(/\b\d{1,2}\.\d{3}\b(?:\s*[,;:.\)\(\-])?/gu, '');
        value = value.replace(/,\s*(?:Kysličník|Obilniny|Vajcia|Mlieko|Ryby|Zeler|Horčica|Orech|Sezam|S[oó]j|Lupina|M[aä]kk[ýy]še).*$/iu, '');
        value = value.replace(/\s+\d{1,2}\.\d{3}\s*$/u, '');
        value = value.replace(/,\s*,+/g, ', ');
        value = value.replace(/\s+,/g, ',');
        value = value.replace(/,\s*$/g, '');
        value = value.replace(/\s+\)\s*$/u, '');
        value = value.replace(/[ \t]{2,}/g, ' ').trim();
        return value;
    }

    function isLikelyDrinkLine(rawLine, normalizedLine) {
        const source = `${String(rawLine || '').toLowerCase()} ${String(normalizedLine || '').toLowerCase()}`;
        if (source.includes('čaj') || source.includes('caj') || source.includes('tea')) return true;
        if (source.includes('mlieko') || source.includes('kakao') || source.includes('káv') || source.includes('kava') || source.includes('coffee')) return true;
        if (source.includes('nápoj') || source.includes('napoj') || source.includes('džús') || source.includes('dzus') || source.includes('juice')) return true;
        if (source.includes('voda') || source.includes('water') || source.includes('sirup')) return true;
        return false;
    }

    function normalizeDedupKey(line) {
        return String(line || '')
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z0-9]+/g, ' ')
            .trim();
    }

    function parseMealRowsForSmall(rawMealText) {
        if (MU && typeof MU.parseMealRowsForSmall === 'function') {
            return MU.parseMealRowsForSmall(rawMealText);
        }
        const rawText = stripAllergenAnnotations(stripSourceNoise(String(rawMealText || '').trim()));
        const rawLines = String(rawText || '')
            .split(/\r?\n/)
            .map((line) => String(line || '').trim())
            .filter(Boolean);

        const seen = new Set();
        const rows = [];
        rawLines.forEach((rawLine) => {
            const normalized = normalizeMealLine(rawLine);
            if (!normalized) {
                return;
            }

            const aliasKey = mealAliasToKey(normalized);
            if (aliasKey && normalized.length <= 20) {
                return;
            }

            const dedupKey = normalizeDedupKey(normalized);
            if (!dedupKey || seen.has(dedupKey)) {
                return;
            }
            seen.add(dedupKey);

            rows.push({
                text: normalized,
                isDrink: isLikelyDrinkLine(rawLine, normalized),
                icon: ''
            });
        });

        if (!rows.length) {
            return [{ text: '—', isDrink: false, icon: 'cutlery' }];
        }

        const drinkIndex = rows.findIndex((row) => row.isDrink === true);
        if (drinkIndex >= 0) {
            rows[drinkIndex].icon = 'drink';
        }

        const mainMealIndex = rows.findIndex((row) => row.isDrink !== true);
        if (mainMealIndex >= 0) {
            rows[mainMealIndex].icon = 'cutlery';
        } else {
            rows[0].icon = 'cutlery';
        }

        return rows;
    }

    function stripTrailingMealCodesFromLine(lineText) {
        const raw = String(lineText || '').trim();
        const match = raw.match(/\((\s*[0-9]{1,2}(?:\s*,\s*[0-9]{1,2})*)\)\s*$/u);
        if (!match) {
            return raw;
        }

        const codeSet = new Set();
        const nums = String(match[1] || '').match(/\b([1-9]|1[0-4])\b/g) || [];
        nums.forEach((numStr) => {
            const code = parseInt(numStr, 10);
            if (code >= 1 && code <= 14) {
                codeSet.add(code);
            }
        });

        const cleanText = raw.replace(/\((\s*[0-9]{1,2}(?:\s*,\s*[0-9]{1,2})*)\)\s*$/u, '').trim();
        return codeSet.size > 0 ? (cleanText || raw) : raw;
    }

    function parseHmToMinutes(value, fallbackMinutes) {
        const text = String(value || '').trim();
        const match = text.match(/^(\d{1,2}):(\d{2})$/);
        if (!match) {
            return fallbackMinutes;
        }
        const hh = Number(match[1]);
        const mm = Number(match[2]);
        if (!Number.isFinite(hh) || !Number.isFinite(mm) || hh < 0 || hh > 23 || mm < 0 || mm > 59) {
            return fallbackMinutes;
        }
        return (hh * 60) + mm;
    }

    function nowMinutesLocal() {
        const now = new Date();
        return now.getHours() * 60 + now.getMinutes();
    }

    function mealVisibleBySchedule(mealKey, settings, currentMinutes) {
        if (settings.mealScheduleEnabled === false) {
            return true;
        }

        const limits = {
            breakfast: parseHmToMinutes(settings.scheduleBreakfastUntil, 10 * 60),
            snack_am: parseHmToMinutes(settings.scheduleSnackAmUntil, 11 * 60),
            lunch: parseHmToMinutes(settings.scheduleLunchUntil, 14 * 60),
            snack_pm: parseHmToMinutes(settings.scheduleSnackPmUntil, 18 * 60),
            dinner: parseHmToMinutes(settings.scheduleDinnerUntil, 23 * 60 + 59)
        };

        const key = String(mealKey || '').trim();
        if (!Object.prototype.hasOwnProperty.call(limits, key)) {
            return true;
        }

        return currentMinutes <= limits[key];
    }

    function filterMealsForCurrentTime(meals, settings, currentMinutes) {
        const list = Array.isArray(meals) ? meals : [];
        return list.filter((meal) => mealVisibleBySchedule(meal?.key, settings, currentMinutes));
    }

    function isFutureMenuDate(menuDate) {
        const normalized = String(menuDate || '').trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(normalized)) {
            return false;
        }
        return normalized > isoDateOffset(0);
    }

    function shouldShowTomorrowAfterEvening(settings, currentMinutes) {
        if (settings.showTomorrowAfterEvening === false) {
            return true;
        }
        const triggerKey = String(settings.tomorrowAfterMeal || 'snack_pm').toLowerCase() === 'dinner'
            ? 'dinner'
            : 'snack_pm';
        const triggerMinutes = triggerKey === 'dinner'
            ? parseHmToMinutes(settings.scheduleDinnerUntil, 23 * 60 + 59)
            : parseHmToMinutes(settings.scheduleSnackPmUntil, 18 * 60);
        return currentMinutes > triggerMinutes;
    }

    function filterTomorrowPreviewMeals(meals) {
        const list = Array.isArray(meals) ? meals : [];
        return list.filter((meal) => {
            const key = String(meal?.key || '').trim();
            return key === 'breakfast' || key === 'lunch';
        });
    }

    function buildSmallScreenMeals(todayMealsRaw, tomorrowMealsRaw, settings, currentMinutes, t) {
        const orderedKeys = ['breakfast', 'snack_am', 'lunch', 'snack_pm', 'dinner'];
        const todayMap = new Map();
        const tomorrowMap = new Map();

        (Array.isArray(todayMealsRaw) ? todayMealsRaw : []).forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key) {
                todayMap.set(key, meal);
            }
        });

        (Array.isArray(tomorrowMealsRaw) ? tomorrowMealsRaw : []).forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key) {
                tomorrowMap.set(key, meal);
            }
        });

        const startModeRaw = String(settings.smallScreenStartMode || 'current_onward').toLowerCase();
        const startMode = ['current_onward', 'breakfast_onward', 'lunch_onward', 'dinner_onward'].includes(startModeRaw)
            ? startModeRaw
            : 'current_onward';
        const maxMeals = Math.max(1, Math.min(5, parseInt(settings.smallScreenMaxMeals || 5, 10) || 5));
        const scheduleEnabled = settings.mealScheduleEnabled !== false;
        const useTomorrowAfterPassed = settings.showTomorrowAfterMealPassed !== false;

        const determineStartIndex = () => {
            if (startMode === 'breakfast_onward') return 0;
            if (startMode === 'lunch_onward') return 2;
            if (startMode === 'dinner_onward') return 4;
            if (!scheduleEnabled) return 0;

            for (let i = 0; i < orderedKeys.length; i += 1) {
                const key = orderedKeys[i];
                if (mealVisibleBySchedule(key, settings, currentMinutes)) {
                    return i;
                }
            }
            return orderedKeys.length;
        };

        const startIndex = determineStartIndex();
        const result = [];

        for (let i = startIndex; i < orderedKeys.length; i += 1) {
            const key = orderedKeys[i];
            const todayMeal = todayMap.get(key) || null;
            const tomorrowMeal = tomorrowMap.get(key) || null;

            if (todayMeal && mealHasRenderableRows(todayMeal)) {
                result.push(todayMeal);
            } else if (useTomorrowAfterPassed && tomorrowMeal && mealHasRenderableRows(tomorrowMeal)) {
                const titlePrefix = String(t.tomorrowMealLabels?.[key] || t.mealLabels?.[key] || tomorrowMeal.label || key).trim();
                result.push({
                    ...tomorrowMeal,
                    key,
                    label: titlePrefix,
                    __displayLabel: titlePrefix,
                    __tomorrowPreview: true
                });
            }

            if (result.length >= maxMeals) {
                break;
            }
        }

        if (result.length === 0) {
            orderedKeys.forEach((key) => {
                if (result.length >= maxMeals) return;
                const meal = todayMap.get(key) || null;
                if (meal && mealHasRenderableRows(meal)) {
                    result.push(meal);
                }
            });
        }

        if (result.length === 0) {
            (Array.isArray(tomorrowMealsRaw) ? tomorrowMealsRaw : []).forEach((meal) => {
                if (result.length >= maxMeals) return;
                if (mealHasRenderableRows(meal)) {
                    result.push(meal);
                }
            });
        }

        return result;
    }

    function buildLargeScreenMeals(todayMealsRaw, tomorrowMealsRaw, settings, currentMinutes, t) {
        const orderedKeys = ['breakfast', 'snack_am', 'lunch', 'snack_pm', 'dinner'];
        const todayMap = new Map();
        const tomorrowMap = new Map();

        (Array.isArray(todayMealsRaw) ? todayMealsRaw : []).forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key) {
                todayMap.set(key, meal);
            }
        });

        (Array.isArray(tomorrowMealsRaw) ? tomorrowMealsRaw : []).forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key) {
                tomorrowMap.set(key, meal);
            }
        });

        const scheduleEnabled = settings.mealScheduleEnabled !== false;
        const useTomorrowAfterPassed = settings.showTomorrowAfterMealPassed !== false;
        const result = [];
        const consumedKeys = new Set();

        orderedKeys.forEach((key) => {
            const todayMeal = todayMap.get(key) || null;
            const tomorrowMeal = tomorrowMap.get(key) || null;
            const todayVisible = mealVisibleBySchedule(key, settings, currentMinutes);

            if (todayMeal && (!scheduleEnabled || todayVisible)) {
                result.push(todayMeal);
                consumedKeys.add(key);
                return;
            }

            if (scheduleEnabled && useTomorrowAfterPassed && !todayVisible && tomorrowMeal && mealHasRenderableRows(tomorrowMeal)) {
                const titlePrefix = String(t.tomorrowMealLabels?.[key] || t.mealLabels?.[key] || tomorrowMeal.label || key).trim();
                result.push({
                    ...tomorrowMeal,
                    key,
                    label: titlePrefix,
                    __displayLabel: titlePrefix,
                    __tomorrowPreview: true
                });
                consumedKeys.add(key);
            }
        });

        (Array.isArray(todayMealsRaw) ? todayMealsRaw : []).forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (!consumedKeys.has(key) && mealHasRenderableRows(meal)) {
                result.push(meal);
            }
        });

        return result;
    }

    function emptyStateMessage(data, t) {
        if (data && data.__pendingServerSync === true) {
            return String(t.pendingSync || t.emptyMeals || '').trim() || 'Pending sync';
        }
        return String(t.emptyMeals || '').trim() || 'No meals available';
    }

    function startSlowScroll(cards, cardsWrap, settings, topDownOnly) {
        if (!cards || !cardsWrap) {
            return;
        }
        const overflowPx = cards.scrollHeight - cardsWrap.clientHeight;
        if (overflowPx <= 4) {
            return;
        }

        const speed = Math.max(40, Math.min(120, Number(settings.slowScrollSpeedPxPerSec || 40)));
        let y = 0;
        let direction = 1;
        let lastTs = 0;
        let waitUntil = performance.now() + Math.max(7000, Number(settings.scrollStartDelayMs || 7000));
        const edgePause = Math.max(7000, Number(settings.scrollLoopPauseMs || 7000));

        if (topDownOnly) {
            direction = 1;
        }

        const tick = (ts) => {
            if (ts < waitUntil) {
                cards.style.transform = `translateY(${-Math.round(y)}px)`;
                scrollRaf = requestAnimationFrame(tick);
                return;
            }

            if (!lastTs) {
                lastTs = ts;
            }
            const dt = Math.max(0, (ts - lastTs) / 1000);
            lastTs = ts;
            y += direction * speed * dt;

            if (y >= overflowPx && direction > 0) {
                y = overflowPx;
                if (topDownOnly) {
                    direction = 0;
                    waitUntil = ts + edgePause;
                } else {
                    direction = -1;
                    waitUntil = ts + edgePause;
                }
                lastTs = 0;
            } else if (y <= 0 && direction < 0) {
                y = 0;
                direction = 1;
                waitUntil = ts + edgePause;
                lastTs = 0;
            } else if (topDownOnly && direction === 0) {
                y = 0;
                direction = 1;
            }

            cards.style.transform = `translateY(${-Math.round(y)}px)`;
            scrollRaf = requestAnimationFrame(tick);
        };
        scrollRaf = requestAnimationFrame(tick);
    }

    function resolveApiUrl(base, query) {
        const hasQ = String(base).includes('?');
        return `${base}${hasQ ? '&' : '?'}${query}`;
    }

    function appendToken(url) {
        const pageParams = new URLSearchParams(window.location.search);
        const pageToken = pageParams.get('token');
        if (!pageToken || String(url).includes('token=')) {
            return url;
        }
        const glue = String(url).includes('?') ? '&' : '?';
        return `${url}${glue}token=${encodeURIComponent(pageToken)}`;
    }

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (m) => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }[m]));
    }

    function stripAllergenAnnotations(text) {
        if (MU && typeof MU.stripAllergenAnnotations === 'function') {
            return MU.stripAllergenAnnotations(text);
        }
        return String(text || '')
            .replace(/\((?:allerg[eé]n(?:ek)?|alerg[eé]ny(?:ek)?)\s*:\s*[^)]*\)/giu, '')
            .replace(/(?:allerg[eé]n(?:ek)?|alerg[eé]ny(?:ek)?)\s*:\s*[^\n\r;]+/giu, '')
            .replace(/ALERG[ÉE]NY:\s*[^\n\r]+/giu, '')
            .replace(/\([^)]*ALERG[ÉE]NY:[^)]*\)/giu, '')
            .replace(/\([^)]*allerg[eé]n[^)]*\)/giu, '')
            .replace(/[ \t]{2,}/g, ' ')
            .replace(/\n{3,}/g, '\n\n')
            .trim();
    }

    function stripSourceNoise(text) {
        if (MU && typeof MU.stripSourceNoise === 'function') {
            return MU.stripSourceNoise(text);
        }
        return String(text || '')
            .replace(/\bbody=\[[\s\S]*$/giu, '')
            .replace(/\b(header|windowlock|cssbody|cssheader|doubleclickstop|singleclickstop|requireclick|hideselects|fade)=\[[^\]]*\]/giu, '')
            .replace(/\be\.hod\.[^\n\r]*$/giu, '')
            .replace(/[ \t]{2,}/g, ' ')
            .replace(/\n{3,}/g, '\n\n')
            .trim();
    }

    function mergeStandardMealBands(meals, t, settings = {}) {
        const list = Array.isArray(meals) ? meals : [];
        const byKey = new Map();
        const appearanceOrder = [];
        list.forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key && !byKey.has(key)) {
                byKey.set(key, meal);
                appearanceOrder.push(key);
            }
        });

        const mergeBreakfastSnack = settings.mergeBreakfastSnack !== false;
        const mergeLunchSnack = settings.mergeLunchSnack !== false;

        const merged = [];
        const used = new Set();
        const mergePair = (leftKey, rightKey, targetKey) => {
            const left = byKey.get(leftKey) || null;
            const right = byKey.get(rightKey) || null;
            if (!left && !right) return;
            if (left) used.add(leftKey);
            if (right) used.add(rightKey);

            if (left && right) {
                const leftLabel = String(t.mealLabels?.[leftKey] || left.label || leftKey).trim();
                const rightLabel = String(t.mealLabels?.[rightKey] || right.label || rightKey).trim();
                merged.push({
                    ...left,
                    key: targetKey,
                    label: `${leftLabel} / ${rightLabel}`,
                    text: `${String(left.text || '').trim()}\n\n${String(right.text || '').trim()}`.trim()
                });
                return;
            }

            merged.push(left || right);
        };

        appearanceOrder.forEach((key) => {
            if (used.has(key)) {
                return;
            }

            if (mergeBreakfastSnack && (key === 'breakfast' || key === 'snack_am')) {
                mergePair('breakfast', 'snack_am', 'breakfast');
                return;
            }

            if (mergeLunchSnack && (key === 'lunch' || key === 'snack_pm')) {
                mergePair('lunch', 'snack_pm', 'lunch');
                return;
            }

            if (byKey.has(key)) {
                merged.push(byKey.get(key));
                used.add(key);
            }
        });

        list.forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (!used.has(key)) {
                merged.push(meal);
            }
        });

        return merged;
    }

    function mealBandClass(key) {
        const normalized = String(key || '').trim().toLowerCase();
        if (normalized === 'breakfast' || normalized === 'snack_am') return 'band-breakfast';
        if (normalized === 'lunch' || normalized === 'snack_pm') return 'band-lunch';
        if (normalized === 'dinner') return 'band-dinner';
        return 'band-other';
    }

    function sortStructuredRowsForMeal(rows, mealKey) {
        const list = Array.isArray(rows) ? rows.slice() : [];
        if (!list.length) {
            return [];
        }

        const key = String(mealKey || '').trim().toLowerCase();
        const textHas = (text, pattern) => pattern.test(String(text || '').toLowerCase());
        const isBreadLine = (text) => textHas(text, /(chlieb|pečivo|pecivo|rožok|rozok|baget|toast|keny[eé]r)/i);
        const isMainDishLine = (text) => textHas(text, /(brav[čc]|kurac|hov[aä]dz|morčac|morc|ryb|reze[nň]|gul[aá]š|gulas|na\s+tatransk|na\s+paprik|om[aá]čk|omack|ragu|perkelt|sot[eé]|fašír|fasir|zapekan|rizot)/i);
        const isSideDishLine = (text) => textHas(text, /(cestovin|ryž|ryz|zemiak|knedl|tarho|bulgur|kuskus|halušk|halusk|pyr[eé]|pyre|kaša|kasa|hranol|zeleninov[aá]\s+obloha)/i);
        const isDrinkLine = (text) => textHas(text, /(n[aá]poj|napoj|čaj|caj|kakao|k[aá]va|kava|mlieko|dž[uú]s|dzus|juice|voda|sirup)/i);
        const isFruitLine = (text) => textHas(text, /(ovoc|jablk|ban[aá]n|banan|pomaran|hrušk|hrusk|brosky|komp[oó]t|kompot)/i);

        const weightForRow = (row, index) => {
            const rawText = normalizeMealLine(String(row?.text || ''));
            const cat = parseInt(row?.recipe_category || 0, 10) || 0;
            const soup = row?.is_soup === true || cat === 5;
            const drink = row?.is_drink === true || cat === 1 || isDrinkLine(rawText);

            if (key === 'lunch') {
                if (soup) return 10 + index;
                if (isBreadLine(rawText) || cat === 24) return 20 + index;
                if (isMainDishLine(rawText) || [13, 14, 15, 17].includes(cat)) return 30 + index;
                if (isSideDishLine(rawText) || [22].includes(cat)) return 40 + index;
                if (drink) return 50 + index;
                if (isFruitLine(rawText) || [23].includes(cat)) return 60 + index;
                return 45 + index;
            }

            if (soup) return 10 + index;
            if (drink) return 40 + index;
            return 20 + index;
        };

        return list
            .map((row, index) => ({ row, _weight: weightForRow(row, index) }))
            .sort((a, b) => a._weight - b._weight)
            .map((item) => item.row);
    }

    function mealCardHtml(meal, settings, t) {
        const key = String(meal.key || '').trim();
        const customDisplayLabel = String(meal?.__displayLabel || '').trim();
        const localized = String(t.mealLabels?.[key] || '').trim();
        const rawName = customDisplayLabel || localized || String(meal.label || key || '').trim();
        const mealIconHtml = settings.showMealTypeSvgIcons === true
            ? `<span class="meal-icon" aria-hidden="true">${mealTypeSvg(meal.key)}</span>`
            : '';
        const tomorrowBadge = meal?.__tomorrowPreview === true
            ? `<span class="meal-label-badge">${escapeHtml(String(t.tomorrowTag || t.tomorrow || 'TOMORROW'))}</span>`
            : '';
        const name = escapeHtml(rawName);
        const originalText = stripSourceNoise(String(meal.text || '').trim());

        const structuredRows = sortStructuredRowsForMeal(Array.isArray(meal?.structured_rows) ? meal.structured_rows : [], key);
        const textLines = structuredRows.length > 0
            ? structuredRows
                .map((row) => normalizeMealLine(String(row?.text || '')))
                .filter((line) => line !== '')
            : (() => {
                const displayTextRaw = stripAllergenAnnotations(originalText) || originalText;
                return String(displayTextRaw || '—')
                    .split(/\r?\n/)
                    .map((line) => normalizeMealLine(line))
                    .filter((line) => line !== '');
            })();

        const rowHtml = textLines.length > 0
            ? textLines.map((line, idx) => {
                const safeLine = escapeHtml(stripTrailingMealCodesFromLine(line) || line);
                const rowIcon = settings.showMealTypeSvgIcons === true
                    ? `<span class="meal-row-icon" aria-hidden="true">${mealLineSvg(line, key, idx)}</span>`
                    : `<span class="meal-row-icon" aria-hidden="true">${iconSvg('food')}</span>`;
                return `<div class="meal-row">${rowIcon}<div class="meal-row-text"><span class="meal-row-line">${safeLine}</span></div></div>`;
            }).join('')
            : `<div class="meal-row"><span class="meal-row-icon" aria-hidden="true">${iconSvg('food')}</span><div class="meal-row-text">—</div></div>`;

        return `<div class="card ${mealBandClass(key)}"><div class="meal"><span class="meal-main">${mealIconHtml}<span class="meal-name">${name}</span>${tomorrowBadge}</span></div><div class="meal-table">${rowHtml}</div></div>`;
    }

    function fitCardText(cardEl, minPx, maxPx) {
        if (!cardEl) return;
        const rows = Array.from(cardEl.querySelectorAll('.meal-row-text'));
        const shared = fitSharedTextSize(rows, Math.round(minPx), Math.round(maxPx));
        rows.forEach((row) => {
            row.style.fontSize = `${shared}px`;
        });
    }

    function fitSingleTextNode(node, minPx, maxPx) {
        if (!node) {
            return Math.max(1, Math.round(minPx));
        }
        let low = Math.max(1, Math.round(minPx));
        let high = Math.max(low, Math.round(maxPx));
        let best = low;

        while (low <= high) {
            const mid = Math.floor((low + high) / 2);
            node.style.fontSize = `${mid}px`;
            const fits = node.scrollWidth <= node.clientWidth + 2 && node.scrollHeight <= node.clientHeight + 2;
            if (fits) {
                best = mid;
                low = mid + 1;
            } else {
                high = mid - 1;
            }
        }

        node.style.fontSize = `${best}px`;
        return best;
    }

    function fitSmallFixedRows(cardEl, settings = null) {
        if (!cardEl) return;

        const preferredRowMax = Math.max(60, Math.min(260, Number(settings?.smallRowFontPx || 150)));
        const titleMax = Math.max(28, Math.min(120, Number(settings?.smallHeaderRowTitleFontPx || settings?.smallScreenHeaderFontPx || 58) * 2));
        const clockMax = Math.max(24, Math.min(100, Number(settings?.smallHeaderRowClockFontPx || settings?.smallScreenHeaderFontPx || 62) * 1.5));

        const headerRow = cardEl.querySelector('.small-page-header-row');
        const headerTitleEl = cardEl.querySelector('.small-page-header-title');
        const headerClockEl = cardEl.querySelector('.small-page-header-clock');
        const smallTable = cardEl.querySelector('.small-page-table');
        
        if (headerTitleEl && headerClockEl) {
            const fittedTitle = fitSingleTextNode(headerTitleEl, 18, titleMax);
            const fittedClock = fitSingleTextNode(headerClockEl, 24, clockMax);
            headerTitleEl.style.fontSize = `${fittedTitle}px`;
            headerClockEl.style.fontSize = `${fittedClock}px`;
            if (headerClockEl) {
                headerClockEl.style.display = '';
            }
            if (smallTable) {
                smallTable.classList.remove('clock-at-bottom');
            }

            startHeaderTitleMarquee(headerTitleEl, settings);
        } else {
            fitSingleTextNode(headerTitleEl, 14, titleMax);
            fitSingleTextNode(headerClockEl, 14, clockMax);
            if (headerTitleEl) {
                startHeaderTitleMarquee(headerTitleEl, settings);
            }
        }

        const rowTextEls = Array.from(cardEl.querySelectorAll('.small-page-meal-text:not(.clock-text)'));
        rowTextEls.forEach((rowEl) => {
            fitSingleTextNode(rowEl, 14, preferredRowMax);
        });
    }

    function fitSharedTextSize(rows, minPx, maxPx) {
        const list = Array.isArray(rows) ? rows.filter(Boolean) : [];
        if (!list.length) {
            return Math.max(1, Math.round(minPx));
        }

        let low = Math.max(1, Math.round(minPx));
        let high = Math.max(low, Math.round(maxPx));
        let best = low;

        while (low <= high) {
            const mid = Math.floor((low + high) / 2);
            list.forEach((row) => {
                row.style.fontSize = `${mid}px`;
            });

            const allFit = list.every((row) => row.scrollHeight <= row.clientHeight + 2 && row.scrollWidth <= row.clientWidth + 2);
            if (allFit) {
                best = mid;
                low = mid + 1;
            } else {
                high = mid - 1;
            }
        }

        return best;
    }

    function fitVisibleMealCards(displayMode, settings = null) {
        const cards = Array.from(document.querySelectorAll('#cards .card'));
        const isSmall = displayMode === 'small_screen';

        if (isSmall && cards.some((card) => card.querySelector('.small-page-table'))) {
            cards.forEach((card) => {
                fitSmallFixedRows(card, settings);
            });
            return;
        }

        cards.forEach((card) => fitCardText(card, isSmall ? 10 : 12, isSmall ? 160 : 34));

        if (isSmall) {
            const smallRows = Array.from(document.querySelectorAll('#cards .small-page-row-text'));
            const preferredMax = Math.max(60, Math.min(260, Number(settings?.smallRowFontPx || 150)));
            const fittedSmallPx = fitSharedTextSize(smallRows, 16, preferredMax);
            smallRows.forEach((row) => {
                row.style.fontSize = `${fittedSmallPx}px`;
            });
        }
    }

    function toDisplayMultiline(text) {
        let raw = String(text || '').trim();
        if (raw === '') {
            return '—';
        }

        raw = raw
            .replace(/\s*\|\s*/g, '\n')
            .replace(/\s*\/\s*/g, '\n')
            .replace(/\s*[;]\s*/g, '\n')
            .replace(/[ \t]+/g, ' ')
            .replace(/\n{3,}/g, '\n\n')
            .trim();

        return raw;
    }

    function normalizeMealAlias(value) {
        if (MU && typeof MU.normalizeMealAlias === 'function') {
            return MU.normalizeMealAlias(value);
        }
        return String(value || '')
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z]/g, '');
    }

    function mealAliasToKey(value) {
        if (MU && typeof MU.mealAliasToKey === 'function') {
            return MU.mealAliasToKey(value);
        }
        const n = normalizeMealAlias(value);
        if (n === 'breakfast' || n === 'ranajky' || n === 'reggeli') return 'breakfast';
        if (n === 'snackam' || n === 'desiata' || n === 'tizorai') return 'snack_am';
        if (n === 'lunch' || n === 'obed' || n === 'ebed') return 'lunch';
        if (n === 'snackpm' || n === 'olovrant' || n === 'uzsonna') return 'snack_pm';
        if (n === 'dinner' || n === 'vecera' || n === 'vacsora') return 'dinner';
        return '';
    }

    function resolveSmallScreenAllowedMealKeys(settings) {
        if (!(settings && settings.smallScreenUseCustomMealSelection === true)) {
            return null;
        }

        const raw = String(settings.smallScreenVisibleMeals || '').trim();
        if (raw === '') {
            // If custom selection is enabled but no meals specified, show all meals
            return null;
        }

        const tokens = raw.split(/[\n,;|]+/).map((part) => part.trim()).filter(Boolean);
        const keys = new Set();
        tokens.forEach((token) => {
            const resolved = mealAliasToKey(token);
            if (resolved) {
                keys.add(resolved);
            }
        });

        return keys;
    }

    function filterSmallScreenMealsWithSafeFallback(meals, settings) {
        const list = Array.isArray(meals) ? meals : [];
        if (!list.length) {
            return [];
        }

        const allowedKeys = resolveSmallScreenAllowedMealKeys(settings);
        if (allowedKeys === null) {
            return list;
        }

        const filtered = list.filter((meal) => {
            const key = String(meal?.key || '').trim();
            if (key === '') {
                // Do not drop keyless meals in small mode.
                return true;
            }
            return allowedKeys.has(key);
        });

        // If selection rules filter everything out, keep original list to avoid false empty state.
        return filtered.length > 0 ? filtered : list;
    }

    function renderSmallScreenPagedMeals(meals, settings, t) {
        const cards = document.getElementById('cards');
        if (!cards) return;
        stopMealPageSwitch();

        const rowTheme = {
            headerBg: String(settings.smallHeaderRowBgColor || '#bae6fd'),
            titleColor: String(settings.smallHeaderRowTextColor || '#000000'),
            clockColor: String(settings.smallHeaderRowClockColor || '#facc15')
        };

        const list = Array.isArray(meals) ? meals : [];
        
        // For small screen: always show all meals, even if empty
        // Never filter meals here
        if (!list.length) {
            cards.innerHTML = `<div class="empty">${escapeHtml(t.emptyMeals || 'No meals available')}</div>`;
            return;
        }

        const pages = [];
        list.forEach((meal) => {
            const key = String(meal?.key || '').trim();
            const localized = String(t.mealLabels?.[key] || '').trim();
            const customDisplayLabel = String(meal?.__displayLabel || '').trim();
            const explicitLabel = String(meal?.label || '').trim();
            const mealName = customDisplayLabel || localized || explicitLabel || String(key || '').trim() || '—';
            const structuredRows = sortStructuredRowsForMeal(Array.isArray(meal?.structured_rows) ? meal.structured_rows : [], key);
            const pageRowsFromStructured = [];
            if (structuredRows.length > 0) {
                structuredRows.forEach((row, index) => {
                    const category = parseInt(row?.recipe_category || 0, 10) || 0;
                    let icon = '';
                    if (row?.is_soup === true || category === 5) {
                        icon = 'soup';
                    } else if (row?.is_drink === true || category === 1) {
                        icon = 'drink';
                    } else if (index === 0) {
                        icon = 'cutlery';
                    }

                    const lineText = normalizeMealLine(String(row?.text || '').trim());
                    if (!lineText) {
                        return;
                    }

                    pageRowsFromStructured.push({
                        text: lineText,
                        icon
                    });
                });
            }

            const pageRows = pageRowsFromStructured.length > 0
                ? pageRowsFromStructured
                : parseMealRowsForSmall(String(meal?.text || '').trim());

            pages.push({
                label: mealName,
                rows: pageRows,
                key,
                tomorrowPreview: meal?.__tomorrowPreview === true
            });
        });

        const normalizeRowsForFixedSlots = (rawRows) => {
            const lines = Array.isArray(rawRows) ? rawRows : [];
            const cleaned = lines
                .map((row) => ({
                    text: String(row?.text || '').trim(),
                    icon: String(row?.icon || '').trim().toLowerCase()
                }))
                .filter((row) => row.text !== '');

            if (!cleaned.length) {
                return [{ text: '—', icon: 'food', soup: false }];
            }

            const isSingleWord = (text) => {
                const words = String(text || '').trim().split(/\s+/).filter(Boolean);
                return words.length === 1;
            };

            // Merge single-word lines with previous/next line to avoid tiny isolated rows.
            const merged = [];
            for (let i = 0; i < cleaned.length; i += 1) {
                const current = { ...cleaned[i] };
                if (!isSingleWord(current.text)) {
                    merged.push({ ...current, soup: false });
                    continue;
                }

                const next = cleaned[i + 1] ? { ...cleaned[i + 1] } : null;
                if (next) {
                    merged.push({
                        text: `${current.text} ${next.text}`.trim(),
                        icon: next.icon || current.icon || 'food',
                        soup: false
                    });
                    i += 1;
                    continue;
                }

                if (merged.length > 0) {
                    const prev = merged[merged.length - 1];
                    prev.text = `${prev.text} ${current.text}`.trim();
                } else {
                    merged.push({ ...current, icon: current.icon || 'food', soup: false });
                }
            }

            return merged.map((row) => ({
                text: String(row.text || '').trim() || '—',
                icon: String(row.icon || 'food').trim().toLowerCase() || 'food',
                soup: false
            }));
        };

        const renderMealRow = (row) => {
            const text = escapeHtml(String(row?.text || '—'));
            return `<div class="small-page-meal-row no-icon"><span class="small-page-meal-text">${text}</span></div>`;
        };

        let pageIndex = 0;
        const renderPageHtml = (page) => {
            const pageRows = normalizeRowsForFixedSlots(Array.isArray(page.rows) ? page.rows : []);
            const pageKey = String(page.key || '').trim();
            const mealTypeLabel = String(t.mealLabels?.[pageKey] || pageKey || '').trim().toUpperCase();
            const renderedRows = pageRows.map(renderMealRow).join('');
            const label = escapeHtml(String(page.label || '').trim() || String(t.title || '').trim() || 'Menu');
            const titleFontPx = Math.max(20, Math.min(140, Number(settings.smallHeaderRowTitleFontPx || settings.smallScreenHeaderFontPx || 58)));
            const clockFontPx = Math.max(24, Math.min(480, Number(settings.smallHeaderRowClockFontPx || settings.smallScreenHeaderFontPx || 62)));

            const headerLeft = escapeHtml(mealTypeLabel || String(page.label || '').trim() || label);
            const gridRows = 1 + Math.max(1, pageRows.length);

            return `<div class="card band-other small-page-card"><div class="small-page-table small-dynamic" style="--small-page-rows:${gridRows}; --small-header-row-bg:${escapeHtml(rowTheme.headerBg)}; --small-header-title-color:${escapeHtml(rowTheme.titleColor)}; --small-header-clock-color:${escapeHtml(rowTheme.clockColor)};"><div class="small-page-header-row"><div class="small-page-header-left"><div class="small-page-header-title-wrapper"><span class="small-page-header-title" style="font-size:${titleFontPx}px;"><span class="small-page-header-title-track">${headerLeft}</span></span></div></div><div class="small-page-header-right"><span class="small-page-header-clock" data-small-fixed-clock style="font-size:${clockFontPx}px;">--:--</span></div></div>${renderedRows}</div></div>`;
        };

        const renderPage = () => {
            const page = pages[pageIndex] || pages[0] || { label: t.title, rows: [] };
            cards.setAttribute('data-page-index', String(pageIndex));
            cards.setAttribute('data-page-label', String(page.label || '').trim());
            cards.setAttribute('data-page-tomorrow-preview', page && page.tomorrowPreview === true ? '1' : '0');
            cards.innerHTML = renderPageHtml(page);
            const titleEl = document.getElementById('title');
            if (titleEl) {
                const label = String(page.label || '').trim();
                titleEl.textContent = label !== '' ? label : (String(t.title || '').trim() || 'Menu');
            }
            requestAnimationFrame(() => {
                fitVisibleMealCards('small_screen', settings);
            });
        };

        renderPage();
        if (pages.length > 1) {
            const switchMs = Math.max(1000, Math.min(120000, Number(settings.smallScreenPageSwitchSec || 12) * 1000));
            let switchInProgress = false;
            mealPageSwitchTimer = setInterval(() => {
                if (switchInProgress) {
                    return;
                }
                switchInProgress = true;
                pageIndex = (pageIndex + 1) % pages.length;
                requestAnimationFrame(() => {
                    try {
                        renderPage();
                    } finally {
                        setTimeout(() => {
                            switchInProgress = false;
                        }, 120);
                    }
                });
            }, switchMs);
        }
    }

    function renderLargeScreenGridMeals(meals, settings, t) {
        const cards = document.getElementById('cards');
        if (!cards) return;
        stopMealPageSwitch();

        const list = Array.isArray(meals) ? meals.slice(0, 4) : [];
        while (list.length < 4) {
            list.push({ key: 'other', label: '—', text: '—' });
        }

        cards.innerHTML = list.map((meal) => mealCardHtml(meal, settings, t)).join('');
        fitVisibleMealCards('large_screen', settings);
    }

    function render(data, settings, context = {}) {
        const cards = document.getElementById('cards');
        const cardsWrap = document.getElementById('cards-wrap');
        const subtitle = document.getElementById('subtitle');
        const foot = document.getElementById('foot');
        const title = document.getElementById('title');
        const t = i18n(settings.language);

        if (!isWeekdayIsoDate(isoDateOffset(0))) {
            cards.innerHTML = '<div class="empty"></div>';
            subtitle.textContent = '';
            subtitle.style.display = 'none';
            foot.innerHTML = '';
            return;
        }

        const dayText = String(data?.menu_date || '').trim();
        const institutionName = String(data?.institution_name || '').trim();

        const displayMode = String(settings.mealDisplayMode || 'small_screen').toLowerCase() === 'large_screen'
            ? 'large_screen'
            : 'small_screen';

        const tomorrowData = context && typeof context === 'object' ? (context.tomorrowData || null) : null;
        const tomorrowMealsRaw = normalizeMealsForDisplay(Array.isArray(tomorrowData?.meals) ? tomorrowData.meals : []);
        const mealsRaw = normalizeMealsForDisplay(Array.isArray(data?.meals) ? data.meals : []);
        const mealsUnmergedLarge = isFutureMenuDate(dayText)
            ? mealsRaw
            : buildLargeScreenMeals(mealsRaw, tomorrowMealsRaw, settings, nowMinutesLocal(), t);
        const mealsUnmergedSmall = buildSmallScreenMeals(mealsRaw, tomorrowMealsRaw, settings, nowMinutesLocal(), t);
        const mealsForSmall = mergeStandardMealBands(mealsUnmergedSmall, t, settings);
        const mealsForLarge = mergeStandardMealBands(mealsUnmergedLarge, t, settings);
        const mealsForSmallSelected = filterSmallScreenMealsWithSafeFallback(mealsForSmall, settings);

        if (displayMode === 'small_screen') {
            if (title) {
                title.textContent = String(t.title || '').trim() || 'Menu';
                title.style.display = '';
            }
            subtitle.textContent = '';
            subtitle.style.display = 'none';
            startSmallHeaderClock();
        } else {
            stopSmallHeaderClock();
            if (title) {
                const customTitle = String(settings.customHeaderTitle || '').trim();
                title.textContent = customTitle !== '' ? customTitle : t.title;
                title.style.display = settings.showHeaderTitle === false ? 'none' : '';
            }

            const subtitleParts = [];
            if (settings.showInstitutionName !== false && institutionName) {
                subtitleParts.push(institutionName);
            }
            if (dayText) {
                subtitleParts.push(dayText);
            }
            subtitle.textContent = subtitleParts.join(' • ') || t.noInstitution;
            subtitle.style.display = (subtitle.textContent || '').trim() === '' ? 'none' : '';
        }

        cards.classList.toggle('single-card', displayMode === 'small_screen');
        stopSlowScroll();
        stopMealPageSwitch();
        const largeRenderableMeals = mealsForLarge.filter((meal) => mealHasRenderableRows(meal));

        if (displayMode === 'small_screen') {
            const smallCandidates = [
                mealsForSmallSelected,
                mealsForSmall,
                mealsRaw,
                tomorrowMealsRaw,
                largeRenderableMeals
            ];
            const smallDisplayMeals = smallCandidates.find((list) => Array.isArray(list) && list.length > 0) || [];
            renderSmallScreenPagedMeals(smallDisplayMeals, settings, t);
        } else if (!largeRenderableMeals.length) {
            cards.innerHTML = `<div class="empty">${escapeHtml(emptyStateMessage(data, t))}</div>`;
        } else {
            renderLargeScreenGridMeals(largeRenderableMeals, settings, t);
        }
        if (displayMode === 'large_screen' && settings.slowScrollOnOverflow !== false) {
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    startSlowScroll(cards, cardsWrap, settings, true);
                });
            });
        }
        if (displayMode === 'small_screen') {
            const hasTomorrowPreview = mealsForSmallSelected.some((meal) => meal?.__tomorrowPreview === true);
            const baseDateText = hasTomorrowPreview
                ? String(t.tomorrowTag || t.tomorrow || 'ZAJTRA').trim()
                : String(dayText || '').trim();
            foot.innerHTML = `<span class="foot-line">${escapeHtml(baseDateText || '')}</span>`;
        } else {
            const serverTs = String(data?.updated_at || '').trim();
            const appetiteText = String(settings.appetiteMessageText || '').trim();
            const sourceUrl = String(settings.sourceUrl || '').trim();
            const lines = [];
            if (dayText) {
                lines.push(`<span class="foot-line">${escapeHtml(dayText)}</span>`);
            }
            lines.push(`<span class="foot-line">${escapeHtml(serverTs ? `${t.updatedAt}: ${serverTs}` : t.unknownUpdate)}</span>`);
            if (settings.showAppetiteMessage === true && appetiteText !== '') {
                lines.push(`<span class="foot-line">${escapeHtml(appetiteText)}</span>`);
            }
            if (settings.showSourceUrl === true && sourceUrl !== '') {
                lines.push(`<span class="foot-source">${escapeHtml(`${String(t.sourcePrefix || 'Menu source')}: ${sourceUrl}`)}</span>`);
            }
            foot.innerHTML = lines.join('');
        }
    }

    function renderSquareDual(todayData, tomorrowData, settings) {
        const cards = document.getElementById('cards');
        const subtitle = document.getElementById('subtitle');
        const foot = document.getElementById('foot');
        const title = document.getElementById('title');
        const t = i18n(settings.language);

        if (!isWeekdayIsoDate(isoDateOffset(0))) {
            cards.innerHTML = '<div class="empty"></div>';
            subtitle.textContent = '';
            subtitle.style.display = 'none';
            foot.innerHTML = '';
            return;
        }

        if (title) {
            const customTitle = String(settings.customHeaderTitle || '').trim();
            title.textContent = customTitle !== '' ? customTitle : t.title;
            title.style.display = settings.showHeaderTitle === false ? 'none' : '';
        }

        const institutionName = String(todayData?.institution_name || tomorrowData?.institution_name || '').trim();
        subtitle.textContent = settings.showInstitutionName === false ? '' : (institutionName || t.noInstitution);
        subtitle.style.display = (subtitle.textContent || '').trim() === '' ? 'none' : '';

        const currentMinutes = nowMinutesLocal();
        const todayDateText = String(todayData?.menu_date || '').trim();
        const todayMealsRaw = Array.isArray(todayData?.meals) ? todayData.meals : [];
        const todayMealsUnmerged = isFutureMenuDate(todayDateText)
            ? todayMealsRaw
            : filterMealsForCurrentTime(todayMealsRaw, settings, currentMinutes);
        const todayMeals = mergeStandardMealBands(todayMealsUnmerged, t, settings);
        const tomorrowRawMeals = Array.isArray(tomorrowData?.meals) ? tomorrowData.meals : [];
        const tomorrowMealsUnmerged = settings.showTomorrowAfterEvening === false
            ? tomorrowRawMeals
            : filterTomorrowPreviewMeals(tomorrowRawMeals);
        const tomorrowMeals = mergeStandardMealBands(tomorrowMealsUnmerged, t, settings);
        const shouldShowTomorrowColumn = settings.showTomorrowInSquare !== false
            && tomorrowMeals.length > 0
            && shouldShowTomorrowAfterEvening(settings, currentMinutes);

        const dayBlocks = [
            { key: 'today', title: t.today, data: { ...todayData, meals: todayMeals } }
        ];
        if (shouldShowTomorrowColumn) {
            dayBlocks.push({ key: 'tomorrow', title: t.tomorrow, data: { ...tomorrowData, meals: tomorrowMeals } });
        }

        const daysHtml = dayBlocks.map((day) => {
            const dayMeals = Array.isArray(day.data?.meals) ? day.data.meals : [];
            const mealHtml = dayMeals.length > 0
                ? dayMeals.map((meal) => {
                    const key = String(meal.key || '').trim();
                    const localized = String(t.mealLabels?.[key] || '').trim();
                    const rawName = localized || String(meal.label || key || '').trim();
                    const safeName = escapeHtml(rawName);
                    const textRaw = stripSourceNoise(String(meal.text || '').trim());
                    const displayText = (stripAllergenAnnotations(textRaw) || textRaw || '—')
                        .split(/\r?\n/)
                        .map((line) => normalizeMealLine(line))
                        .filter(Boolean)
                        .join('\n');
                    const safeText = escapeHtml(displayText);
                    const labelIcon = settings.showMealTypeSvgIcons === true
                        ? `<span class="day-meal-icon" aria-hidden="true">${mealTypeSvg(meal.key)}</span>`
                        : '';
                    return `<div class="day-meal"><div class="day-meal-label">${labelIcon}<span>${safeName}</span></div><div class="day-meal-text">${safeText}</div></div>`;
                }).join('')
                : `<div class="empty">${escapeHtml(emptyStateMessage(day.data, t))}</div>`;

            const dateText = escapeHtml(String(day.data?.menu_date || '').trim());
            return `<div class="day-square"><div class="day-title"><span class="day-title-icon" aria-hidden="true">${iconSvg('calendar')}</span><span>${escapeHtml(day.title)}</span></div><div class="day-date">${dateText}</div><div class="day-content">${mealHtml}</div></div>`;
        }).join('');

        cards.innerHTML = `<div class="dual-days ${dayBlocks.length === 1 ? 'single-day' : ''}">${daysHtml}</div>`;

        const allVisibleMeals = dayBlocks.flatMap((day) => Array.isArray(day.data?.meals) ? day.data.meals : []);
        const tsCandidates = [String(todayData?.updated_at || '').trim(), String(tomorrowData?.updated_at || '').trim()].filter(Boolean);
        const ts = tsCandidates.length > 0 ? tsCandidates.sort().slice(-1)[0] : '';
        const appetiteText = String(settings.appetiteMessageText || '').trim();
        const sourceUrl = String(settings.sourceUrl || '').trim();
        const lines = [];
        lines.push(`<span class="foot-line">${escapeHtml(ts ? `${t.updatedAt}: ${ts}` : t.unknownUpdate)}</span>`);
        if (settings.showAppetiteMessage === true && appetiteText !== '') {
            lines.push(`<span class="foot-line">${escapeHtml(appetiteText)}</span>`);
        }
        if (settings.showSourceUrl === true && sourceUrl !== '') {
            lines.push(`<span class="foot-source">${escapeHtml(`${String(t.sourcePrefix || 'Menu source')}: ${sourceUrl}`)}</span>`);
        }
        foot.innerHTML = lines.join('');
    }

    function clearOverlayTextAnimation(position) {
        const state = overlayTextState[position];
        if (!state) return;
        if (state.raf !== null) {
            cancelAnimationFrame(state.raf);
            state.raf = null;
        }
    }

    function clearOverlays() {
        if (overlayClockInterval !== null) {
            clearInterval(overlayClockInterval);
            overlayClockInterval = null;
        }
        clearOverlayTextAnimation('top');
        clearOverlayTextAnimation('bottom');

        ['overlayTop', 'overlayBottom'].forEach((id) => {
            const el = document.getElementById(id);
            if (el) {
                el.style.display = 'none';
                el.innerHTML = '';
            }
        });
    }

    function overlayDateText(now, lang) {
        const locale = String(lang || 'hu') === 'sk' ? 'sk-SK' : (String(lang || 'hu') === 'en' ? 'en-US' : 'hu-HU');
        try {
            return now.toLocaleDateString(locale, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        } catch (_) {
            return now.toISOString().slice(0, 10);
        }
    }

    function applyOverlays(settings) {
        clearOverlays();

        const displayMode = String(settings.mealDisplayMode || 'small_screen').toLowerCase() === 'large_screen'
            ? 'large_screen'
            : 'small_screen';
        if (displayMode !== 'large_screen') {
            const rootSmall = document.querySelector('.root');
            if (rootSmall) {
                rootSmall.style.setProperty('--overlay-top-height', '0%');
                rootSmall.style.setProperty('--overlay-bottom-height', '0%');
            }
            return;
        }

        const root = document.querySelector('.root');
        if (!root) return;

        let topHeight = 0;
        let bottomHeight = 0;

        const topBand = document.getElementById('overlayTop');
        const bottomBand = document.getElementById('overlayBottom');
        if (!topBand || !bottomBand) return;

        const chooseBand = (pos) => (String(pos || '').toLowerCase() === 'bottom' ? bottomBand : topBand);

        if (settings.clockOverlayEnabled === true) {
            const band = chooseBand(settings.clockOverlayPosition);
            const height = Math.max(20, Math.min(40, Number(settings.clockOverlayHeightPercent || 40)));
            band.style.display = 'flex';
            band.style.height = `${height}%`;
            if (String(settings.clockOverlayPosition || '').toLowerCase() === 'bottom') {
                bottomHeight = Math.max(bottomHeight, height);
            } else {
                topHeight = Math.max(topHeight, height);
            }

            const renderClock = () => {
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                const ss = String(now.getSeconds()).padStart(2, '0');
                const timeLine = `${hh}:${mm}:${ss}`;
                const dateLine = overlayDateText(now, settings.language);
                band.innerHTML = `<div class="overlay-clock"><div class="overlay-clock-line" style="color:${escapeHtml(String(settings.clockOverlayTimeColor || '#ffffff'))}; font-size:clamp(30px,6.2vw,132px);">${escapeHtml(timeLine)}</div><div class="overlay-clock-line" style="color:${escapeHtml(String(settings.clockOverlayDateColor || '#ffffff'))}; font-size:clamp(16px,2.2vw,48px); margin-top:6px;">${escapeHtml(dateLine)}</div></div>`;
            };

            renderClock();
            overlayClockInterval = setInterval(renderClock, 1000);
        }

        if (settings.textOverlayEnabled === true) {
            const band = chooseBand(settings.textOverlayPosition);
            const height = Math.max(12, Math.min(40, Number(settings.textOverlayHeightPercent || 20)));
            band.style.display = 'flex';
            band.style.height = `${height}%`;
            if (String(settings.textOverlayPosition || '').toLowerCase() === 'bottom') {
                bottomHeight = Math.max(bottomHeight, height);
            } else {
                topHeight = Math.max(topHeight, height);
            }

            let segments = [];
            const sourceType = String(settings.textOverlaySourceType || 'manual').toLowerCase();
            if (sourceType === 'collection') {
                try {
                    const parsed = JSON.parse(String(settings.textOverlayCollectionJson || '[]'));
                    if (Array.isArray(parsed)) {
                        segments = parsed.map((item) => String(item || '').trim()).filter(Boolean);
                    }
                } catch (_) {
                    segments = [];
                }
            } else {
                const txt = String(settings.textOverlayText || '').trim();
                if (txt) segments = [txt];
            }

            if (segments.length === 0) {
                segments = [''];
            }

            const color = String(settings.textOverlayColor || '#ffffff');
            const size = Math.max(18, Math.min(120, Number(settings.textOverlayFontSize || 52)));
            const speed = Math.max(40, Math.min(320, Number(settings.textOverlaySpeedPxPerSec || 120)));

            band.innerHTML = `<div class="overlay-text" style="color:${escapeHtml(color)}; font-size:${Math.round(size)}px;"><div class="overlay-text-track">${segments.map((s) => `<span class=\"overlay-text-segment\">${escapeHtml(s)}</span>`).join('')}</div></div>`;

            const state = overlayTextState[String(settings.textOverlayPosition || '').toLowerCase() === 'bottom' ? 'bottom' : 'top'];
            const textEl = band.querySelector('.overlay-text');
            const track = band.querySelector('.overlay-text-track');
            if (state && textEl && track) {
                let x = textEl.clientWidth;
                let lastTs = 0;
                const tick = (ts) => {
                    if (!lastTs) lastTs = ts;
                    const dt = Math.max(0, (ts - lastTs) / 1000);
                    lastTs = ts;
                    x -= speed * dt;
                    const resetAt = -track.scrollWidth;
                    if (x < resetAt) {
                        x = textEl.clientWidth;
                    }
                    track.style.transform = `translateX(${Math.round(x)}px)`;
                    state.raf = requestAnimationFrame(tick);
                };
                state.raf = requestAnimationFrame(tick);
            }
        }

        root.style.setProperty('--overlay-top-height', `${topHeight}%`);
        root.style.setProperty('--overlay-bottom-height', `${bottomHeight}%`);
    }

    function isoDateOffset(days) {
        const now = new Date();
        const base = new Date(now.getFullYear(), now.getMonth(), now.getDate() + days, 12, 0, 0, 0);
        const y = base.getFullYear();
        const m = String(base.getMonth() + 1).padStart(2, '0');
        const d = String(base.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function isoDateShift(baseIso, days) {
        const raw = String(baseIso || '').trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
            return isoDateOffset(days);
        }
        const [y, m, d] = raw.split('-').map((value) => parseInt(value, 10));
        const base = new Date(y, (m || 1) - 1, d || 1, 12, 0, 0, 0);
        base.setDate(base.getDate() + (parseInt(days, 10) || 0));
        const yy = base.getFullYear();
        const mm = String(base.getMonth() + 1).padStart(2, '0');
        const dd = String(base.getDate()).padStart(2, '0');
        return `${yy}-${mm}-${dd}`;
    }

    function isWeekdayIsoDate(isoDate) {
        const raw = String(isoDate || '').trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
            return false;
        }
        const [y, m, d] = raw.split('-').map((value) => parseInt(value, 10));
        const dt = new Date(y, (m || 1) - 1, d || 1, 12, 0, 0, 0);
        const day = dt.getDay();
        return day >= 1 && day <= 5;
    }

    function hasAnyMeals(data) {
        const meals = Array.isArray(data?.meals) ? data.meals : [];
        return meals.some((meal) => mealHasRenderableRows(meal));
    }

    function mealHasRenderableRows(meal) {
        const rawText = stripSourceNoise(String(meal?.text || '').trim());
        const cleanText = String(stripAllergenAnnotations(rawText) || rawText || '').trim();
        if (!cleanText) {
            return false;
        }
        const normalizedLines = cleanText
            .split(/\r?\n/)
            .map((line) => normalizeMealLine(line))
            .filter((line) => line !== '' && line !== '—');
        return normalizedLines.length > 0;
    }

    function normalizeMealsForDisplay(meals) {
        const list = Array.isArray(meals) ? meals.slice() : [];
        if (!list.length) {
            return list;
        }

        const byKey = new Map();
        list.forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key !== '') {
                byKey.set(key, meal);
            }
        });

        const breakfast = byKey.get('breakfast') || null;
        const lunch = byKey.get('lunch') || null;
        const breakfastHasRows = mealHasRenderableRows(breakfast);
        if (!breakfastHasRows && lunch) {
            const lunchRows = Array.isArray(lunch?.structured_rows) ? lunch.structured_rows : [];
            const categories = lunchRows
                .map((row) => parseInt(row?.recipe_category || 0, 10) || 0)
                .filter((cat) => cat > 0);
            if (categories.length > 0) {
                const breakfastCats = new Set([1, 2, 3]);
                const looksBreakfast = categories.every((cat) => breakfastCats.has(cat));
                if (looksBreakfast) {
                    byKey.set('breakfast', {
                        ...lunch,
                        key: 'breakfast',
                        label: 'Raňajky'
                    });
                    byKey.delete('lunch');
                }
            }
        }

        const orderedKeys = ['breakfast', 'snack_am', 'lunch', 'snack_pm', 'dinner'];
        const normalized = [];
        const used = new Set();
        orderedKeys.forEach((key) => {
            const meal = byKey.get(key);
            if (meal) {
                normalized.push(meal);
                used.add(key);
            }
        });

        list.forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (!used.has(key)) {
                normalized.push(meal);
            }
        });

        return normalized;
    }

    function createDebugState() {
        return { lines: [] };
    }

    function pushDebug(debugState, message) {
        if (!debugState || !Array.isArray(debugState.lines)) return;
        const clean = String(message || '').trim();
        if (!clean) return;
        debugState.lines.push(clean);
        if (debugState.lines.length > 10) {
            debugState.lines = debugState.lines.slice(-10);
        }
    }

    function renderDebugStatus(debugState, rendered) {
        const statusEl = document.getElementById('status');
        if (!statusEl) return;

        if (rendered === true) {
            statusEl.classList.remove('is-debug');
            statusEl.style.display = 'none';
            statusEl.textContent = '';
            return;
        }

        const lines = (debugState && Array.isArray(debugState.lines)) ? debugState.lines : [];
        if (!lines.length) {
            statusEl.classList.remove('is-debug');
            statusEl.style.display = 'none';
            statusEl.textContent = '';
            return;
        }

        statusEl.classList.add('is-debug');
        statusEl.style.display = 'block';
        statusEl.textContent = `⚠️ Meal debug\n${lines.join('\n')}`;
    }

    async function fetchMenuData(settings, dateValue, exactDate, debugState) {
        const queryParams = new URLSearchParams({
            action: 'menu',
            site_key: settings.siteKey,
            institution_id: String(parseInt(settings.institutionId, 10) || 0),
            date: dateValue,
            exact_date: exactDate ? '1' : '0',
            show_breakfast: settings.showBreakfast ? '1' : '0',
            show_snack_am: settings.showSnackAm ? '1' : '0',
            show_lunch: settings.showLunch ? '1' : '0',
            show_snack_pm: settings.showSnackPm ? '1' : '0',
            show_dinner: settings.showDinner ? '1' : '0',
            source_type: settings.sourceType === 'server' ? 'server' : 'manual'
        });

        const requestedCompanyId = parseInt(settings.companyId, 10) || 0;
        if (requestedCompanyId > 0) {
            queryParams.set('company_id', String(requestedCompanyId));
        }

        const url = appendToken(resolveApiUrl(settings.apiBaseUrl, queryParams.toString()));
        try {
            const response = await fetchWithTimeout(url, settings.apiTimeoutMs);
            const payload = await response.json();
            if (!response.ok || !payload || payload.success !== true) {
                pushDebug(debugState, `API fail (${response.status || 'n/a'}) ${dateValue}`);
                return null;
            }
            const data = (payload.data && typeof payload.data === 'object') ? payload.data : null;
            const meta = (payload.meta && typeof payload.meta === 'object') ? payload.meta : {};
            if (data) {
                data.__serverDataAvailable = meta.server_data_available === true;
                data.__pendingServerSync = meta.pending_server_sync === true;
            }
            return data;
        } catch (error) {
            pushDebug(debugState, `API exception ${dateValue}: ${String(error?.message || error || 'unknown')}`);
            return null;
        }
    }

    async function findNextMenuWithMeals(settings, startOffsetDays, maxDaysAhead, debugState) {
        const start = Math.max(0, parseInt(startOffsetDays, 10) || 0);
        const max = Math.max(start, parseInt(maxDaysAhead, 10) || 0);

        for (let offset = start; offset <= max; offset++) {
            const dateValue = isoDateOffset(offset);
            const data = await fetchMenuData(settings, dateValue, true, debugState);
            if (data && hasAnyMeals(data)) {
                pushDebug(debugState, `Fallback menu used: ${String(data.menu_date || dateValue)}`);
                return data;
            }
        }

        return null;
    }

    async function fetchWithTimeout(url, timeoutMs) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
            return await fetch(url, { method: 'GET', cache: 'no-store', signal: controller.signal });
        } finally {
            clearTimeout(timer);
        }
    }

    async function loadOfflineMealFile(pathValue, debugState, label) {
        const path = String(pathValue || '').trim();
        if (!path) {
            pushDebug(debugState, `Offline file missing (${String(label || 'unknown')})`);
            return null;
        }
        try {
            const response = await fetch(path, { method: 'GET', cache: 'no-store' });
            if (!response.ok) {
                pushDebug(debugState, `Offline file fail ${String(label || '')}: ${response.status}`);
                return null;
            }
            const payload = await response.json();
            if (!(payload && typeof payload === 'object')) {
                pushDebug(debugState, `Offline file invalid JSON (${String(label || '')})`);
            }
            return payload && typeof payload === 'object' ? payload : null;
        } catch (error) {
            pushDebug(debugState, `Offline file exception ${String(label || '')}: ${String(error?.message || error || 'unknown')}`);
            return null;
        }
    }

    async function refreshSingleModeFromApi(settings, cacheKey, debugState) {
        const todayIso = isoDateOffset(0);
        if (!isWeekdayIsoDate(todayIso)) {
            pushDebug(debugState, 'Single mode skipped: weekend day');
            return false;
        }

        let data = await fetchMenuData(settings, todayIso, false, debugState);
        const shouldProbeFallback = (!data || data.__serverDataAvailable !== false) && settings.maxFallbackDaysAhead > 0;
        if ((!data || !hasAnyMeals(data)) && shouldProbeFallback) {
            const tomorrowIso = isoDateShift(todayIso, 1);
            if (isWeekdayIsoDate(tomorrowIso)) {
                const tomorrowFallback = await fetchMenuData(settings, tomorrowIso, true, debugState);
                if (tomorrowFallback && hasAnyMeals(tomorrowFallback)) {
                    data = tomorrowFallback;
                }
            }
        }

        if (!data) {
            return false;
        }

        const effectiveTodayDate = String(data?.menu_date || isoDateOffset(0)).trim() || isoDateOffset(0);
        const effectiveTomorrowDate = isoDateShift(effectiveTodayDate, 1);
        const tomorrowData = await fetchMenuData(settings, effectiveTomorrowDate, true, debugState);

        render(data, settings, { tomorrowData });
        try {
            localStorage.setItem(cacheKey, JSON.stringify({ saved_at: Date.now(), mode: 'single', data: { today: data, tomorrow: tomorrowData } }));
        } catch (_) {
        }
        return true;
    }

    async function refreshSquareModeFromApi(settings, cacheKey, debugState) {
        const todayDate = isoDateOffset(0);
        if (!isWeekdayIsoDate(todayDate)) {
            pushDebug(debugState, 'Square mode skipped: weekend day');
            return false;
        }

        let todayData = await fetchMenuData(settings, todayDate, false, debugState);
        const shouldProbeFallbackToday = (!todayData || todayData.__serverDataAvailable !== false) && settings.maxFallbackDaysAhead > 0;
