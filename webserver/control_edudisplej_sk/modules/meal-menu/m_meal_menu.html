<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduDisplej Étrend Modul</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { background: #0f172a; color: #f8fafc; font-family: var(--meal-font-family, 'Segoe UI', Tahoma, sans-serif); }
        .root { width: 100%; height: 100%; position: relative; --overlay-top-height: 0%; --overlay-bottom-height: 0%; }
        .content-layer {
            position: absolute;
            left: 0;
            right: 0;
            top: var(--overlay-top-height);
            bottom: var(--overlay-bottom-height);
            padding: 3.2vh 3vw;
            display: grid;
            grid-template-rows: auto 1fr auto auto;
            gap: 2vh;
            overflow: hidden;
        }
        .root.center { justify-items: center; text-align: center; }
        .root.center .head { width: 100%; justify-content: center; }
        .root.center .title-wrap { display:flex; flex-direction:column; align-items:center; }
        .root.center-left { justify-items: center; }
        .root.center-left .head { width: 100%; justify-content: center; }
        .root.center-left .title-wrap { display:flex; flex-direction:column; align-items:center; text-align:center; }
        .root.center-left .cards { width: min(94vw, 1600px); margin: 0 auto; justify-items: stretch; }
        .cards-wrap { width: 100%; height: 100%; overflow: hidden; position: relative; }
        .head { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .small-header-right { display: none; align-items: baseline; justify-content: flex-end; min-width: 0; gap: .45vw; }
        .small-header-date { font-size: clamp(18px, 2.1vw, 44px); font-weight: 800; line-height: 1; color: #facc15; letter-spacing: .01em; white-space: nowrap; }
        .small-header-clock { font-size: clamp(18px, 2.1vw, 44px); font-weight: 800; line-height: 1; color: #f8fafc; letter-spacing: .02em; white-space: nowrap; }
        .title { font-size: clamp(38px, 4.8vw, 88px); font-weight: 700; }
        .subtitle { font-size: clamp(22px, 2.2vw, 38px); color: #cbd5e1; margin-top: 6px; }
        .status { display: none; }
        .status.is-debug { display: block; font-size: clamp(12px, 1.1vw, 18px); max-width: 56vw; text-align: right; color: #fca5a5; white-space: pre-line; }
        .cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1.8vh 1.4vw; align-content: start; }
        .cards.single-card { grid-template-columns: minmax(0, 1fr); }
        .root.center .cards { justify-items: stretch; }
        .card { background: linear-gradient(170deg, rgba(15, 23, 42, 0.92) 0%, rgba(30, 41, 59, 0.82) 100%); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 18px; padding: 1.5vh 1.2vw; display:flex; flex-direction:column; gap:1.1vh; box-shadow: 0 14px 32px rgba(2, 6, 23, 0.28), inset 0 0 0 1px rgba(255,255,255,.03); backdrop-filter: blur(4px); }
        .meal { font-size: clamp(34px, var(--meal-title-font-size, 3.2vw), 64px); font-weight: 800; color: #f1f5f9; margin-bottom: 8px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
        .meal-main { display:flex; align-items:center; gap:12px; min-width:0; }
        .meal-name { min-width:0; }
        .meal-label-badge { display:inline-flex; align-items:center; border:1px solid rgba(250, 204, 21, 0.65); background: rgba(250, 204, 21, 0.16); color:#fde68a; border-radius:999px; padding: 4px 10px; font-size: .45em; font-weight: 900; letter-spacing: .02em; text-transform: uppercase; white-space: nowrap; }
        .root.center .meal { justify-content:center; }
        .meal-icon { width: clamp(32px, 2.1vw, 46px); height: clamp(32px, 2.1vw, 46px); display:inline-flex; color:#7dd3fc; flex: 0 0 auto; }
        .meal-table { display:grid; gap:8px; }
        .meal-row { display:grid; grid-template-columns: clamp(30px, 1.9vw, 42px) 1fr; align-items:flex-start; gap:12px; border:1px solid rgba(148,163,184,.24); border-radius:13px; background: rgba(30, 41, 59, 0.66); padding:10px 12px; }
        .meal-row-icon { width: clamp(24px, 1.5vw, 34px); height: clamp(24px, 1.5vw, 34px); display:inline-flex; color:#bfdbfe; margin-top: 4px; flex: 0 0 auto; }
        .meal-row-text { font-size: clamp(28px, var(--meal-text-font-size, 2.3vw), 54px); line-height: var(--meal-line-height, 1.38); font-weight: var(--meal-text-weight, 650); color: #f8fafc; display:flex; align-items:center; gap: 8px; flex-wrap: nowrap; min-width: 0; white-space: nowrap; }
        .meal-row-line { display: block; white-space: nowrap; min-width: 0; flex: 1 1 auto; }
        .meal-inline-allergens { display:inline-flex; align-items:center; gap:6px; margin-left: 10px; vertical-align: middle; }
        .meal-inline-allergen-num { display:inline-flex; align-items:center; justify-content:center; min-width:1.8em; border-radius:999px; padding:3px 9px; font-size:.84em; line-height:1; font-weight:800; color:#111827; background:#fbbf24; border:1px solid rgba(251, 191, 36, .8); }
        .allergen-wrap { margin-top: 6px; padding: 10px 10px 0; border-top: 1px solid rgba(148, 163, 184, 0.2); background: rgba(15, 23, 42, 0.38); border-radius: 12px; }
        .allergen-title { font-size: clamp(14px, .95vw, 18px); letter-spacing: .03em; font-weight: 700; color: #cbd5e1; margin-bottom: 6px; text-transform: uppercase; }
        .allergen-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .allergen-badge { font-size: clamp(13px, .95vw, 17px); line-height: 1.1; border: 1px solid rgba(148, 163, 184, 0.34); border-radius: 999px; padding: 6px 10px; background: rgba(15, 23, 42, 0.72); color: #e2e8f0; display:inline-flex; align-items:center; gap:7px; font-weight: 600; }
        .allergen-icon { width: clamp(14px, .9vw, 18px); height: clamp(14px, .9vw, 18px); display:inline-flex; color:#93c5fd; flex: 0 0 auto; }
        .meal-allergen-inline { display:inline-flex; align-items:center; flex-wrap:wrap; gap:6px; margin-top: 2px; }
        .meal-allergen-dot { width: clamp(24px, 1.4vw, 32px); height: clamp(24px, 1.4vw, 32px); border-radius: 999px; border:1px solid rgba(148,163,184,.36); display:inline-flex; align-items:center; justify-content:center; background: rgba(15, 23, 42, 0.72); color:#93c5fd; }
        .meal-allergen-dot svg { width: 72%; height: 72%; display:block; }
        .meal-allergen-count { font-size: clamp(12px, .8vw, 15px); color:#cbd5e1; font-weight:700; margin-left: 2px; }
        .meal-allergen-code { font-size: clamp(13px, .9vw, 16px); line-height: 1.1; border:1px solid rgba(148,163,184,.36); border-radius:999px; padding: 4px 9px; font-weight:700; color:#f8fafc; background: rgba(15, 23, 42, 0.78); display:inline-flex; align-items:center; gap:6px; }
        .meal-allergen-num { font-weight: 900; color:#fde68a; background: rgba(59, 130, 246, 0.26); border:1px solid rgba(125, 211, 252, 0.44); border-radius:999px; padding:2px 7px; min-width:1.6em; text-align:center; }
        .meal-allergen-code i { font-style: normal; opacity: .86; font-weight:600; font-size: .88em; }
        .allergen-gluten, .allergen-celery, .allergen-mustard { background: rgba(120, 53, 15, 0.35); border-color: rgba(251, 191, 36, 0.48); }
        .allergen-milk, .allergen-egg, .allergen-fish { background: rgba(3, 105, 161, 0.28); border-color: rgba(125, 211, 252, 0.5); }
        .allergen-nut, .allergen-sesame, .allergen-lupin, .allergen-shell { background: rgba(127, 29, 29, 0.3); border-color: rgba(252, 165, 165, 0.52); }
        .allergen-soy, .allergen-sulfite, .allergen-warning { background: rgba(30, 64, 175, 0.28); border-color: rgba(147, 197, 253, 0.52); }
        .allergen-fixed { display:none; border:1px solid rgba(148,163,184,.26); border-radius:14px; padding:10px 12px; background: rgba(15, 23, 42, 0.72); overflow:hidden; }
        .allergen-fixed.show { display:block; }
        .allergen-fixed-title { font-size: clamp(13px, .95vw, 18px); font-weight: 700; color: #cbd5e1; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
        .allergen-fixed-row { display:flex; flex-wrap:wrap; gap: 8px; }
        .allergen-fixed-badge { display:inline-flex; align-items:center; gap:8px; padding: 6px 10px; border:1px solid rgba(148,163,184,.36); border-radius:999px; background: rgba(15, 23, 42, 0.75); color:#e2e8f0; font-size: clamp(12px, .88vw, 15px); }
        .allergen-fixed-num { font-weight: 800; min-width: 1.7em; text-align:center; border-radius:999px; padding:2px 8px; background: rgba(2, 6, 23, 0.42); color:#f8fafc; }

        .root.small-mode .meal-icon { display: none; }
        .root.small-mode .meal-table { flex: 1 1 auto; display:grid; grid-auto-rows: minmax(0, 1fr); align-content: stretch; gap: .55vh; }
        .root.small-mode .meal-row { min-height: 0; height: 100%; grid-template-columns: 1fr; align-items: stretch; padding: 0 .9vw; }

        .root.small-mode .small-page-row.no-icon .small-page-row-icon { display:none; }
        .root.small-mode .small-page-row-icon { width: clamp(34px, 3vw, 68px); height: clamp(34px, 3vw, 68px); color:#bfdbfe; display:inline-flex; align-items:center; justify-content:center; }
        .root.small-mode .small-page-row-icon svg { width: 100%; height: 100%; display:block; }
        .root.small-mode .small-page-row-text { width:100%; line-height: 1; font-size: clamp(16px, 3.2vw, 68px); font-weight: 800; color:#f8fafc; white-space: nowrap; overflow: hidden; display:block; word-break: normal; text-overflow: clip; }
        .root.small-mode .small-page-row-text .meal-row-line { white-space: nowrap; }
        .root.small-mode .foot { min-height: 0; text-align: left; font-size: clamp(15px, 1.12vw, 24px); color: #cbd5e1; border: 1px solid rgba(148,163,184,.24); border-radius: 12px; background: rgba(15, 23, 42, 0.72); padding: 0 .9vw; display:flex; align-items:center; }

        .root.large-mode .cards {

        .root.large-mode .meal { font-size: clamp(26px, 2.25vw, 42px); }
        .root.large-mode .meal-row-text { font-size: clamp(18px, 1.45vw, 30px); line-height: 1.22; }

        .card.band-breakfast {

        .dual-days { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1.2vw; height: 100%; }
        .dual-days.single-day { grid-template-columns: minmax(0, 1fr); }
        .day-square { background: rgba(15, 23, 42, 0.65); border: 1px solid rgba(148, 163, 184, 0.24); border-radius: 16px; padding: 1.2vh 1vw; display:flex; flex-direction:column; min-height:0; }
        .day-title { font-size: clamp(28px, 2.4vw, 46px); font-weight: 800; color: #e2e8f0; margin-bottom: .8vh; display:flex; align-items:center; gap:10px; }

<body>
<div class="root">
    <div id="overlayTop" class="overlay-band"></div>
    <div id="overlayBottom" class="overlay-band"></div>
    <div class="content-layer">
        <div class="head">
            <div class="title-wrap">
                <div class="title" id="title">Étrend</div>
                <div class="subtitle" id="subtitle">Betöltés...</div>
            </div>
            <div class="small-header-right" id="small-header-right">
                <div class="small-header-date" id="small-header-date">--.--.----</div>
                <div class="small-header-clock" id="small-header-clock">--:--</div>
            </div>
            <div class="status" id="status">🔄 Szerver lekérés</div>
        </div>
        <div class="cards-wrap" id="cards-wrap"><div class="cards" id="cards"></div></div>
        <div class="allergen-fixed" id="allergen-fixed"></div>
        <div class="foot" id="foot"></div>
    </div>
</div>
<script src="./meal_menu_utils.js"></script>
<script>
(function () {
    const MU = (typeof window.MealMenuUtils === 'object' && window.MealMenuUtils) ? window.MealMenuUtils : null;
    let scrollRaf = null;
    let mealPageSwitchTimer = null;
    let overlayClockInterval = null;
    let smallHeaderClockInterval = null;
    let backgroundRefreshTimer = null;
    const overlayTextState = {
        top: { raf: null },
        bottom: { raf: null }
    };

    function stopSlowScroll() {
        if (scrollRaf !== null) {
            cancelAnimationFrame(scrollRaf);
            scrollRaf = null;
        }
        const cards = document.getElementById('cards');
        if (cards) {
            cards.style.transform = 'translateY(0px)';
        }
    }

    function stopMealPageSwitch() {
        if (mealPageSwitchTimer !== null) {
            clearInterval(mealPageSwitchTimer);
            mealPageSwitchTimer = null;
        }
    }

    function stopSmallHeaderClock() {
        if (smallHeaderClockInterval !== null) {
            clearInterval(smallHeaderClockInterval);
            smallHeaderClockInterval = null;
        }
    }

    function startSmallHeaderClock() {
        const clockEl = document.getElementById('small-header-clock');
        const dateEl = document.getElementById('small-header-date');
        if (!clockEl || !dateEl) {
            return;
        }

        const skDayShort = ['Ne', 'Po', 'Ut', 'St', 'Št', 'Pia', 'So'];

        const renderClock = () => {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const yyyy = String(now.getFullYear());
            const dayShort = skDayShort[now.getDay()] || 'Po';
            clockEl.textContent = `${hh}:${mm}`;
            dateEl.textContent = `${dayShort} ${dd}.${month}.${yyyy}`;
        };

        stopSmallHeaderClock();
        renderClock();
        smallHeaderClockInterval = setInterval(renderClock, 1000);
    }

    function parseBool(value, fallback) {
        if (value === null || value === undefined || value === '') return fallback;
        if (typeof value === 'boolean') return value;
        const normalized = String(value).toLowerCase();
        if (['1','true','yes','on'].includes(normalized)) return true;
        if (['0','false','no','off'].includes(normalized)) return false;
        return fallback;
    }

    function parseNum(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
    }

    function getSettings() {
        const defaults = {
            siteKey: 'jedalen.sk',
            institutionId: 0,
            companyId: 0,
            sourceType: 'server',
            mealDisplayMode: 'small_screen',
            smallScreenPageSwitchSec: 12,
            smallRowFontPx: 150,
            smallScreenUseCustomMealSelection: false,
            smallScreenVisibleMeals: 'breakfast,snack_am,lunch,snack_pm,dinner',
            showBreakfast: true,
            showSnackAm: true,
            showLunch: true,
            showSnackPm: true,
            showDinner: true,
            mergeBreakfastSnack: true,
            mergeLunchSnack: true,
            mealScheduleEnabled: true,
            scheduleBreakfastUntil: '10:00',

    function normalizeMealLine(line) {
        if (MU && typeof MU.normalizeMealLine === 'function') {
            return MU.normalizeMealLine(line);
        }
        let value = String(line || '').trim();
        value = value.replace(/^\d+\.\s*/u, '');
        value = value.replace(/^\d{1,2}\.\d{3}(?:\s*[\)\].,;:-])?\s*/u, '');
        value = value.replace(/\b\d{1,2}\.\d{3}\b(?:\s*[,;:.\)\(\-])?/gu, '');
        value = value.replace(/,\s*(?:Kysličník|Obilniny|Vajcia|Mlieko|Ryby|Zeler|Horčica|Orech|Sezam|S[oó]j|Lupina|M[aä]kk[ýy]še).*$/iu, '');
        value = value.replace(/\s+\d{1,2}\.\d{3}\s*$/u, '');
        value = value.replace(/,\s*,+/g, ', ');
        value = value.replace(/\s+,/g, ',');
        value = value.replace(/,\s*$/g, '');
        value = value.replace(/\s+\)\s*$/u, '');
        value = value.replace(/[ \t]{2,}/g, ' ').trim();
        return value;
    }

    function isLikelyDrinkLine(rawLine, normalizedLine) {
        const source = `${String(rawLine || '').toLowerCase()} ${String(normalizedLine || '').toLowerCase()}`;
        if (source.includes('čaj') || source.includes('caj') || source.includes('tea')) return true;
        if (source.includes('mlieko') || source.includes('kakao') || source.includes('káv') || source.includes('kava') || source.includes('coffee')) return true;
        if (source.includes('nápoj') || source.includes('napoj') || source.includes('džús') || source.includes('dzus') || source.includes('juice')) return true;
        if (source.includes('voda') || source.includes('water') || source.includes('sirup')) return true;
        return false;
    }

    function normalizeDedupKey(line) {
        return String(line || '')
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z0-9]+/g, ' ')
            .trim();
    }

    function parseMealRowsForSmall(rawMealText) {
        if (MU && typeof MU.parseMealRowsForSmall === 'function') {
            return MU.parseMealRowsForSmall(rawMealText);
        }
        const rawText = stripAllergenAnnotations(stripSourceNoise(String(rawMealText || '').trim()));
        const rawLines = String(rawText || '')
            .split(/\r?\n/)
            .map((line) => String(line || '').trim())
            .filter(Boolean);

        const seen = new Set();
        const rows = [];
        rawLines.forEach((rawLine) => {
            const normalized = normalizeMealLine(rawLine);
            if (!normalized) {
                return;
            }

            const aliasKey = mealAliasToKey(normalized);
            if (aliasKey && normalized.length <= 20) {
                return;
            }

            const dedupKey = normalizeDedupKey(normalized);
            if (!dedupKey || seen.has(dedupKey)) {
                return;
            }
            seen.add(dedupKey);

            rows.push({
                text: normalized,
                isDrink: isLikelyDrinkLine(rawLine, normalized),
                icon: ''
            });
        });

        if (!rows.length) {
            return [{ text: '—', isDrink: false, icon: 'cutlery' }];
        }

        const drinkIndex = rows.findIndex((row) => row.isDrink === true);
        if (drinkIndex >= 0) {
            rows[drinkIndex].icon = 'drink';
        }

        const mainMealIndex = rows.findIndex((row) => row.isDrink !== true);
        if (mainMealIndex >= 0) {
            rows[mainMealIndex].icon = 'cutlery';
        } else {
            rows[0].icon = 'cutlery';
        }

        return rows;
    }

    function extractInlineAllergenCodesFromLine(lineText) {
        const raw = String(lineText || '').trim();
        const match = raw.match(/\((\s*[0-9]{1,2}(?:\s*,\s*[0-9]{1,2})*)\)\s*$/u);
        if (!match) {
            return { text: raw, codes: [] };
        }

        const codeSet = new Set();
        const nums = String(match[1] || '').match(/\b([1-9]|1[0-4])\b/g) || [];
        nums.forEach((numStr) => {
            const code = parseInt(numStr, 10);
            if (code >= 1 && code <= 14) {
                codeSet.add(code);
            }
        });

        const cleanText = raw.replace(/\((\s*[0-9]{1,2}(?:\s*,\s*[0-9]{1,2})*)\)\s*$/u, '').trim();
        return {
            text: cleanText || raw,
            codes: Array.from(codeSet.values()).sort((a, b) => a - b)
        };
    }

    function inlineAllergenCodesHtml(codes) {
        const list = Array.isArray(codes) ? codes : [];
        if (!list.length) {
            return '';
        }
        return `<span class="meal-inline-allergens">${list.map((code) => `<span class="meal-inline-allergen-num">${escapeHtml(String(code))}</span>`).join('')}</span>`;
    }

    function parseHmToMinutes(value, fallbackMinutes) {
        const text = String(value || '').trim();
        const match = text.match(/^(\d{1,2}):(\d{2})$/);
        if (!match) {
            return fallbackMinutes;
        }
        const hh = Number(match[1]);
        const mm = Number(match[2]);
        if (!Number.isFinite(hh) || !Number.isFinite(mm) || hh < 0 || hh > 23 || mm < 0 || mm > 59) {
            return fallbackMinutes;
        }
        return (hh * 60) + mm;
    }

    function nowMinutesLocal() {
        const now = new Date();
        return now.getHours() * 60 + now.getMinutes();
    }

    function mealVisibleBySchedule(mealKey, settings, currentMinutes) {
        if (settings.mealScheduleEnabled === false) {
            return true;
        }

        const limits = {
            breakfast: parseHmToMinutes(settings.scheduleBreakfastUntil, 10 * 60),
            snack_am: parseHmToMinutes(settings.scheduleSnackAmUntil, 11 * 60),
            lunch: parseHmToMinutes(settings.scheduleLunchUntil, 14 * 60),
            snack_pm: parseHmToMinutes(settings.scheduleSnackPmUntil, 18 * 60),
            dinner: parseHmToMinutes(settings.scheduleDinnerUntil, 23 * 60 + 59)
        };

        const key = String(mealKey || '').trim();
        if (!Object.prototype.hasOwnProperty.call(limits, key)) {
            return true;
        }

        return currentMinutes <= limits[key];
    }

    function filterMealsForCurrentTime(meals, settings, currentMinutes) {
        const list = Array.isArray(meals) ? meals : [];
        return list.filter((meal) => mealVisibleBySchedule(meal?.key, settings, currentMinutes));
    }

    function isFutureMenuDate(menuDate) {
        const normalized = String(menuDate || '').trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(normalized)) {
            return false;
        }
        return normalized > isoDateOffset(0);
    }

    function shouldShowTomorrowAfterEvening(settings, currentMinutes) {
        if (settings.showTomorrowAfterEvening === false) {
            return true;
        }
        const triggerKey = String(settings.tomorrowAfterMeal || 'snack_pm').toLowerCase() === 'dinner'
            ? 'dinner'
            : 'snack_pm';
        const triggerMinutes = triggerKey === 'dinner'
            ? parseHmToMinutes(settings.scheduleDinnerUntil, 23 * 60 + 59)
            : parseHmToMinutes(settings.scheduleSnackPmUntil, 18 * 60);
        return currentMinutes > triggerMinutes;
    }

    function filterTomorrowPreviewMeals(meals) {
        const list = Array.isArray(meals) ? meals : [];
        return list.filter((meal) => {
            const key = String(meal?.key || '').trim();
            return key === 'breakfast' || key === 'lunch';
        });

    function buildSmallScreenMeals(todayMealsRaw, tomorrowMealsRaw, settings, currentMinutes, t) {
        const orderedKeys = ['breakfast', 'snack_am', 'lunch', 'snack_pm', 'dinner'];
        const scheduleLimits = {
            breakfast: parseHmToMinutes(settings.scheduleBreakfastUntil, 10 * 60),
            snack_am: parseHmToMinutes(settings.scheduleSnackAmUntil, 11 * 60),
            lunch: parseHmToMinutes(settings.scheduleLunchUntil, 14 * 60),
            snack_pm: parseHmToMinutes(settings.scheduleSnackPmUntil, 18 * 60),
            dinner: parseHmToMinutes(settings.scheduleDinnerUntil, 23 * 60 + 59)
        };

        let displayKeys = orderedKeys.slice();
        if (settings.mealScheduleEnabled !== false) {
            const startIndex = orderedKeys.findIndex((key) => currentMinutes <= (scheduleLimits[key] ?? (23 * 60 + 59)));
            if (startIndex > 0) {
                displayKeys = orderedKeys.slice(startIndex).concat(orderedKeys.slice(0, startIndex));
            }
        }

        const todayMap = new Map();
        const tomorrowMap = new Map();

        (Array.isArray(todayMealsRaw) ? todayMealsRaw : []).forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key) {
                todayMap.set(key, meal);
            }
        });

        (Array.isArray(tomorrowMealsRaw) ? tomorrowMealsRaw : []).forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key) {
                tomorrowMap.set(key, meal);
            }
        });

        const useTomorrowAfterPassed = settings.showTomorrowAfterMealPassed !== false;
        const result = [];

        displayKeys.forEach((key) => {
            const todayMeal = todayMap.get(key) || null;
            const tomorrowMeal = tomorrowMap.get(key) || null;
            const todayVisible = mealVisibleBySchedule(key, settings, currentMinutes);

            if (todayMeal && todayVisible) {
                result.push(todayMeal);
                return;
            }

            if (useTomorrowAfterPassed && !todayVisible && tomorrowMeal && mealHasRenderableRows(tomorrowMeal)) {
                const titlePrefix = String(t.tomorrowMealLabels?.[key] || t.mealLabels?.[key] || tomorrowMeal.label || key).trim();
                result.push({
                    ...tomorrowMeal,
                    label: titlePrefix,
                    __displayLabel: titlePrefix,
                    __tomorrowPreview: true
                });
                return;
            }

            if (todayMeal && todayVisible) {
                result.push(todayMeal);
            }
        });

        return result;
    }

    function buildLargeScreenMeals(todayMealsRaw, tomorrowMealsRaw, settings, currentMinutes, t) {
        const orderedKeys = ['breakfast', 'snack_am', 'lunch', 'snack_pm', 'dinner'];
        const todayMap = new Map();
        const tomorrowMap = new Map();

        (Array.isArray(todayMealsRaw) ? todayMealsRaw : []).forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key) {
                todayMap.set(key, meal);
            }
        });

        (Array.isArray(tomorrowMealsRaw) ? tomorrowMealsRaw : []).forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key) {
                tomorrowMap.set(key, meal);
            }
        });

        const scheduleEnabled = settings.mealScheduleEnabled !== false;
        const useTomorrowAfterPassed = settings.showTomorrowAfterMealPassed !== false;
        const result = [];
        const consumedKeys = new Set();

        orderedKeys.forEach((key) => {
            const todayMeal = todayMap.get(key) || null;
            const tomorrowMeal = tomorrowMap.get(key) || null;
            const todayVisible = mealVisibleBySchedule(key, settings, currentMinutes);

            if (todayMeal && (!scheduleEnabled || todayVisible)) {
                result.push(todayMeal);
                consumedKeys.add(key);
                return;
            }

            if (scheduleEnabled && useTomorrowAfterPassed && !todayVisible && tomorrowMeal && mealHasRenderableRows(tomorrowMeal)) {
                const titlePrefix = String(t.tomorrowMealLabels?.[key] || t.mealLabels?.[key] || tomorrowMeal.label || key).trim();
                result.push({
                    ...tomorrowMeal,
                    key,
                    label: titlePrefix,
                    __displayLabel: titlePrefix,
                    __tomorrowPreview: true
                });
                consumedKeys.add(key);
            }
        });

        (Array.isArray(todayMealsRaw) ? todayMealsRaw : []).forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (!consumedKeys.has(key) && mealHasRenderableRows(meal)) {
                result.push(meal);
            }
        });

        return result;
    }

    function startSlowScroll(cards, cardsWrap, settings, topDownOnly) {
        if (!cards || !cardsWrap) {
            return;
        }
        const overflowPx = cards.scrollHeight - cardsWrap.clientHeight;
        if (overflowPx <= 4) {
            return;
        }

        const speed = Math.max(40, Math.min(120, Number(settings.slowScrollSpeedPxPerSec || 40)));
        let y = 0;
        let direction = 1;
        let lastTs = 0;
        let waitUntil = performance.now() + Math.max(7000, Number(settings.scrollStartDelayMs || 7000));
        const edgePause = Math.max(7000, Number(settings.scrollLoopPauseMs || 7000));

        if (topDownOnly) {
            direction = 1;
        }

        const tick = (ts) => {
            if (ts < waitUntil) {
                cards.style.transform = `translateY(${-Math.round(y)}px)`;
                scrollRaf = requestAnimationFrame(tick);
                return;
            }

            if (!lastTs) {
                lastTs = ts;
            }
            const dt = Math.max(0, (ts - lastTs) / 1000);
            lastTs = ts;
            y += direction * speed * dt;

            if (y >= overflowPx && direction > 0) {
                y = overflowPx;
                if (topDownOnly) {
                    direction = 0;
                    waitUntil = ts + edgePause;
                } else {
                    direction = -1;
                    waitUntil = ts + edgePause;
                }
                lastTs = 0;
            } else if (y <= 0 && direction < 0) {
                y = 0;
                direction = 1;
                waitUntil = ts + edgePause;
                lastTs = 0;
            } else if (topDownOnly && direction === 0) {
                y = 0;
                direction = 1;
            }

            cards.style.transform = `translateY(${-Math.round(y)}px)`;
            scrollRaf = requestAnimationFrame(tick);
        };
        scrollRaf = requestAnimationFrame(tick);
    }

    function extractAllergenLabels(text) {
        if (MU && typeof MU.extractAllergenLabels === 'function') {
            return MU.extractAllergenLabels(text);
        }
        const raw = String(text || '');
        const labels = [];
        const matches = raw.match(/ALERG[ÉE]NY:\s*([^\n\r)]+)/giu) || [];
        matches.forEach((m) => {
            const part = String(m).replace(/ALERG[ÉE]NY:\s*/iu, '').trim();
            part.split(',').map((item) => item.trim()).filter(Boolean).forEach((item) => labels.push(item));
        });
        return Array.from(new Set(labels));
    }

    function normalizeAllergenLabel(label) {
        return String(label || '')
            .toLowerCase()
            .replace(/[()]/g, '')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function allergenIconForLabel(label) {
        const n = normalizeAllergenLabel(label);
        if (n.includes('lepok') || n.includes('obilnin')) return 'gluten';
        if (n.includes('vajcia') || n.includes('toj')) return 'egg';
        if (n.includes('mlieko') || n.includes('tej')) return 'milk';
        if (n.includes('ryb') || n.includes('hal')) return 'fish';
        if (n.includes('horcica') || n.includes('must')) return 'mustard';
        if (n.includes('zeler')) return 'celery';
        if (n.includes('soj')) return 'soy';
        if (n.includes('orech') || n.includes('dio')) return 'nut';
        if (n.includes('sezam')) return 'sesame';
        if (n.includes('siričit') || n.includes('sulfit')) return 'sulfite';
        if (n.includes('rak')) return 'shell';
        if (n.includes('makkys')) return 'nut';
        return 'warning';
    }

    function extractAllergenCodes(text) {
        if (MU && typeof MU.extractAllergenCodes === 'function') {
            return MU.extractAllergenCodes(text);
        }
        const raw = String(text || '');
        const codeSet = new Set();
        const patterns = [
            /\((?:allerg[eé]n(?:ek)?|alerg[eé]ny(?:ek)?)\s*:\s*([^)]+)\)/giu,
            /(?:allerg[eé]n(?:ek)?|alerg[eé]ny(?:ek)?)\s*:\s*([^\n\r;]+)/giu
        ];

        patterns.forEach((pattern) => {
            let match;
            while ((match = pattern.exec(raw)) !== null) {
                const part = String(match[1] || '');
                const nums = part.match(/\b([1-9]|1[0-4])\b/g) || [];
                nums.forEach((numStr) => {
                    const code = parseInt(numStr, 10);
                    if (code >= 1 && code <= 14) {
                        codeSet.add(code);
                    }
                });
            }
        });

        return Array.from(codeSet).sort((a, b) => a - b);
    }

    function stripAllergenAnnotations(text) {
        if (MU && typeof MU.stripAllergenAnnotations === 'function') {
            return MU.stripAllergenAnnotations(text);
        }
        return String(text || '')
            .replace(/\((?:allerg[eé]n(?:ek)?|alerg[eé]ny(?:ek)?)\s*:\s*[^)]*\)/giu, '')
            .replace(/(?:allerg[eé]n(?:ek)?|alerg[eé]ny(?:ek)?)\s*:\s*[^\n\r;]+/giu, '')
            .replace(/ALERG[ÉE]NY:\s*[^\n\r]+/giu, '')
            .replace(/\([^)]*ALERG[ÉE]NY:[^)]*\)/giu, '')
            .replace(/\([^)]*allerg[eé]n[^)]*\)/giu, '')
            .replace(/[ \t]{2,}/g, ' ')
            .replace(/\n{3,}/g, '\n\n')
            .trim();
    }

    function stripSourceNoise(text) {

            .replace(/\b(header|windowlock|cssbody|cssheader|doubleclickstop|singleclickstop|requireclick|hideselects|fade)=\[[^\]]*\]/giu, '')
            .replace(/\be\.hod\.[^\n\r]*$/giu, '')
            .replace(/[ \t]{2,}/g, ' ')
            .replace(/\n{3,}/g, '\n\n')
            .trim();
    }

    function mergeStandardMealBands(meals, t, settings = {}) {
        const list = Array.isArray(meals) ? meals : [];
        const byKey = new Map();
        const appearanceOrder = [];
        list.forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key && !byKey.has(key)) {
                byKey.set(key, meal);
                appearanceOrder.push(key);
            }
        });

        const mergeBreakfastSnack = settings.mergeBreakfastSnack !== false;
        const mergeLunchSnack = settings.mergeLunchSnack !== false;

        const merged = [];
        const used = new Set();
        const mergePair = (leftKey, rightKey, targetKey) => {
            const left = byKey.get(leftKey) || null;
            const right = byKey.get(rightKey) || null;
            if (!left && !right) return;
            if (left) used.add(leftKey);
            if (right) used.add(rightKey);

            if (left && right) {
                const leftLabel = String(t.mealLabels?.[leftKey] || left.label || leftKey).trim();
                const rightLabel = String(t.mealLabels?.[rightKey] || right.label || rightKey).trim();
                merged.push({
                    ...left,
                    key: targetKey,
                    label: `${leftLabel} / ${rightLabel}`,
                    text: `${String(left.text || '').trim()}\n\n${String(right.text || '').trim()}`.trim()
                });
                return;
            }

            merged.push(left || right);
        };

        appearanceOrder.forEach((key) => {
            if (used.has(key)) {
                return;
            }

            if (mergeBreakfastSnack && (key === 'breakfast' || key === 'snack_am')) {
                mergePair('breakfast', 'snack_am', 'breakfast');
                return;
            }

            if (mergeLunchSnack && (key === 'lunch' || key === 'snack_pm')) {
                mergePair('lunch', 'snack_pm', 'lunch');
                return;
            }

            if (byKey.has(key)) {
                merged.push(byKey.get(key));
                used.add(key);
            }
        });

        list.forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (!used.has(key)) {
                merged.push(meal);
            }
        });

        return merged;
    }

    function mealBandClass(key) {
        const normalized = String(key || '').trim().toLowerCase();
        if (normalized === 'breakfast' || normalized === 'snack_am') return 'band-breakfast';
        if (normalized === 'lunch' || normalized === 'snack_pm') return 'band-lunch';
        if (normalized === 'dinner') return 'band-dinner';
        return 'band-other';

    function sortStructuredRowsForMeal(rows, mealKey) {
        const list = Array.isArray(rows) ? rows.slice() : [];
        if (!list.length) {
            return [];
        }

        const key = String(mealKey || '').trim().toLowerCase();
        const textHas = (text, pattern) => pattern.test(String(text || '').toLowerCase());
        const isBreadLine = (text) => textHas(text, /(chlieb|pečivo|pecivo|rožok|rozok|baget|toast|keny[eé]r)/i);
        const isMainDishLine = (text) => textHas(text, /(brav[čc]|kurac|hov[aä]dz|morčac|morc|ryb|reze[nň]|gul[aá]š|gulas|na\s+tatransk|na\s+paprik|om[aá]čk|omack|ragu|perkelt|sot[eé]|fašír|fasir|zapekan|rizot)/i);
        const isSideDishLine = (text) => textHas(text, /(cestovin|ryž|ryz|zemiak|knedl|tarho|bulgur|kuskus|halušk|halusk|pyr[eé]|pyre|kaša|kasa|hranol|zeleninov[aá]\s+obloha)/i);
        const isDrinkLine = (text) => textHas(text, /(n[aá]poj|napoj|čaj|caj|kakao|k[aá]va|kava|mlieko|dž[uú]s|dzus|juice|voda|sirup)/i);
        const isFruitLine = (text) => textHas(text, /(ovoc|jablk|ban[aá]n|banan|pomaran|hrušk|hrusk|brosky|komp[oó]t|kompot)/i);

        const weightForRow = (row, index) => {
            const rawText = normalizeMealLine(String(row?.text || ''));
            const cat = parseInt(row?.recipe_category || 0, 10) || 0;
            const soup = row?.is_soup === true || cat === 5;
            const drink = row?.is_drink === true || cat === 1 || isDrinkLine(rawText);

            if (key === 'lunch') {
                if (soup) return 10 + index;
                if (isBreadLine(rawText) || cat === 24) return 20 + index;
                if (isMainDishLine(rawText) || [13, 14, 15, 17].includes(cat)) return 30 + index;
                if (isSideDishLine(rawText) || [22].includes(cat)) return 40 + index;
                if (drink) return 50 + index;
                if (isFruitLine(rawText) || [23].includes(cat)) return 60 + index;
                return 45 + index;
            }

            if (soup) return 10 + index;
            if (drink) return 40 + index;
            return 20 + index;
        };

        return list
            .map((row, index) => ({ row, _weight: weightForRow(row, index) }))
            .sort((a, b) => a._weight - b._weight)
            .map((item) => item.row);
    }

        const name = escapeHtml(rawName);
        const originalText = stripSourceNoise(String(meal.text || '').trim());
        const allergenCodes = extractAllergenCodes(originalText);
