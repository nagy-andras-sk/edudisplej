        const structuredRows = sortStructuredRowsForMeal(Array.isArray(meal?.structured_rows) ? meal.structured_rows : [], key);
        const textLines = structuredRows.length > 0
            ? structuredRows
                .map((row) => normalizeMealLine(String(row?.text || '')))
                .filter((line) => line !== '')
            : (() => {
                const displayTextRaw = showAllergens
                    ? (stripAllergenAnnotations(originalText) || originalText)
                    : originalText;
                return String(displayTextRaw || '—')
                    .split(/\r?\n/)
                    .map((line) => normalizeMealLine(line))
                    .filter((line) => line !== '');
            })();

        const rowHtml = textLines.length > 0
            ? textLines.map((line, idx) => {
                const inlineParsed = extractInlineAllergenCodesFromLine(line);
                const safeLine = escapeHtml(inlineParsed.text || line);
                const inlineCodes = inlineAllergenCodesHtml(inlineParsed.codes);
                const rowIcon = settings.showMealTypeSvgIcons === true
                    ? `<span class="meal-row-icon" aria-hidden="true">${mealLineSvg(line, key, idx)}</span>`
                    : `<span class="meal-row-icon" aria-hidden="true">${iconSvg('food')}</span>`;
                return `<div class="meal-row">${rowIcon}<div class="meal-row-text"><span class="meal-row-line">${safeLine}</span>${inlineCodes}</div></div>`;
            }).join('')
            : `<div class="meal-row"><span class="meal-row-icon" aria-hidden="true">${iconSvg('food')}</span><div class="meal-row-text">—</div></div>`;

        const map = allergenMap();
        const inlineCodeBadges = allergenCodes.map((code) => {
            const item = map[code] || { icon: 'warning', label: t.allergens || 'Allergens' };
            const title = escapeHtml(`${item.label} (${code})`);
            return `<span class="meal-allergen-code allergen-${escapeHtml(item.icon)}" title="${title}"><span class="meal-allergen-num">${escapeHtml(String(code))}</span><i>${escapeHtml(item.label)}</i></span>`;
        });
        const inlineLabelBadges = allergenCodes.length === 0
            ? allergenLabels.slice(0, 3).map((label) => {
                const iconKey = allergenIconForLabel(label);
                const safeLabel = escapeHtml(label);
                return `<span class="meal-allergen-dot allergen-${escapeHtml(iconKey)}" title="${safeLabel}"><span aria-hidden="true">${allergenBadgeSvg(iconKey)}</span></span>`;
            })
            : [];
        const inlineAllergenHtml = showAllergens && (inlineCodeBadges.length > 0 || inlineLabelBadges.length > 0)
            ? `<span class="meal-allergen-inline">${inlineCodeBadges.slice(0, 4).join('')}${inlineLabelBadges.join('')}${inlineCodeBadges.length > 4 ? `<span class="meal-allergen-count">+${inlineCodeBadges.length - 4}</span>` : ''}</span>`
            : '';

        return `<div class="card ${mealBandClass(key)}"><div class="meal"><span class="meal-main">${mealIconHtml}<span class="meal-name">${name}</span>${tomorrowBadge}</span>${inlineAllergenHtml}</div><div class="meal-table">${rowHtml}</div></div>`;
    }

    function fitCardText(cardEl, minPx, maxPx) {
        if (!cardEl) return;
        const rows = Array.from(cardEl.querySelectorAll('.meal-row-text'));
        const shared = fitSharedTextSize(rows, Math.round(minPx), Math.round(maxPx));
        rows.forEach((row) => {
            row.style.fontSize = `${shared}px`;
        });
    }

    function fitSharedTextSize(rows, minPx, maxPx) {
        const list = Array.isArray(rows) ? rows.filter(Boolean) : [];
        if (!list.length) {
            return Math.max(1, Math.round(minPx));
        }

        let low = Math.max(1, Math.round(minPx));
        let high = Math.max(low, Math.round(maxPx));
        let best = low;

        while (low <= high) {
            const mid = Math.floor((low + high) / 2);
            list.forEach((row) => {
                row.style.fontSize = `${mid}px`;
            });

            const allFit = list.every((row) => row.scrollHeight <= row.clientHeight + 2 && row.scrollWidth <= row.clientWidth + 2);
            if (allFit) {
                best = mid;
                low = mid + 1;
            } else {
                high = mid - 1;
            }
        }

        return best;
    }

    function fitVisibleMealCards(displayMode, settings = null) {
        const cards = Array.from(document.querySelectorAll('#cards .card'));
        const isSmall = displayMode === 'small_screen';
        cards.forEach((card) => fitCardText(card, isSmall ? 10 : 12, isSmall ? 160 : 34));

        if (isSmall) {
            const smallRows = Array.from(document.querySelectorAll('#cards .small-page-row-text'));
            const responsiveMax = Math.max(28, Math.min(84, Math.round(window.innerHeight * 0.085)));
            const fittedSmallPx = fitSharedTextSize(smallRows, 10, responsiveMax);
            smallRows.forEach((row) => {
                row.style.fontSize = `${fittedSmallPx}px`;
            });
        }
    }

    function toDisplaySingleLine(text, language) {
        const raw = String(text || '').replace(/\s+/g, ' ').trim();
        if (raw === '') {
            return '—';
        }
        return raw;
    }

    function normalizeMealAlias(value) {
        if (MU && typeof MU.normalizeMealAlias === 'function') {
            return MU.normalizeMealAlias(value);
        }
        return String(value || '')
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z]/g, '');
    }

    function mealAliasToKey(value) {
        if (MU && typeof MU.mealAliasToKey === 'function') {
            return MU.mealAliasToKey(value);
        }
        const n = normalizeMealAlias(value);
        if (n === 'breakfast' || n === 'ranajky' || n === 'reggeli') return 'breakfast';
        if (n === 'snackam' || n === 'desiata' || n === 'tizorai') return 'snack_am';
        if (n === 'lunch' || n === 'obed' || n === 'ebed') return 'lunch';
        if (n === 'snackpm' || n === 'olovrant' || n === 'uzsonna') return 'snack_pm';
        if (n === 'dinner' || n === 'vecera' || n === 'vacsora') return 'dinner';
        return '';
    }

    function resolveSmallScreenAllowedMealKeys(settings) {
        if (!(settings && settings.smallScreenUseCustomMealSelection === true)) {
            return null;
        }

        const raw = String(settings.smallScreenVisibleMeals || '').trim();
        if (raw === '') {
            return new Set();
        }

        const tokens = raw.split(/[\n,;|]+/).map((part) => part.trim()).filter(Boolean);
        const keys = new Set();
        tokens.forEach((token) => {
            const resolved = mealAliasToKey(token);
            if (resolved) {
                keys.add(resolved);
            }
        });

        return keys;
    }

    function renderSmallScreenPagedMeals(meals, settings, t) {
        const cards = document.getElementById('cards');
        if (!cards) return;
        stopMealPageSwitch();

        const list = Array.isArray(meals) ? meals : [];
        if (!list.length) {
            cards.innerHTML = `<div class="empty">${escapeHtml(t.emptyMeals || 'No meals available')}</div>`;
            return;
        }

        const pages = [];
        list.forEach((meal) => {
            const key = String(meal?.key || '').trim();
            const localized = String(t.mealLabels?.[key] || '').trim();
            const customDisplayLabel = String(meal?.__displayLabel || '').trim();
            const explicitLabel = String(meal?.label || '').trim();
            const mealName = customDisplayLabel || localized || explicitLabel || String(key || '').trim() || '—';
            const structuredRows = sortStructuredRowsForMeal(Array.isArray(meal?.structured_rows) ? meal.structured_rows : [], key);
            const pageRowsFromStructured = [];
            if (structuredRows.length > 0) {
                structuredRows.forEach((row, index) => {
                    const category = parseInt(row?.recipe_category || 0, 10) || 0;
                    let icon = '';
                    if (row?.is_soup === true || category === 5) {
                        icon = 'soup';
                    } else if (row?.is_drink === true || category === 1) {
                        icon = 'drink';
                    } else if (index === 0) {
                        icon = 'cutlery';
                    }

                    const lineText = normalizeMealLine(String(row?.text || '').trim());
                    if (!lineText) {
                        return;
                    }

                    pageRowsFromStructured.push({
                        text: lineText,
                        icon
                    });
                });
            }

            const pageRows = pageRowsFromStructured.length > 0
                ? pageRowsFromStructured
                : parseMealRowsForSmall(String(meal?.text || '').trim());

            pages.push({
                label: mealName,
                rows: pageRows,
                tomorrowPreview: meal?.__tomorrowPreview === true
            });
        });

        const renderRow = (row) => {
            const rawText = String(row?.text || '—');
            const text = escapeHtml(toDisplaySingleLine(rawText, settings.language));
            const iconKey = String(row?.icon || '').trim();
            const iconHtml = iconKey !== ''
                ? `<span class="small-page-row-icon" aria-hidden="true">${iconSvg(iconKey)}</span>`
                : '<span class="small-page-row-icon" aria-hidden="true"></span>';
            const rowClass = iconKey !== '' ? 'small-page-row' : 'small-page-row no-icon';
            return `<div class="${rowClass}">${iconHtml}<div class="small-page-row-text"><span class="meal-row-line">${text}</span></div></div>`;
        };

        let pageIndex = 0;
        const renderPageHtml = (page) => {
            const pageRows = Array.isArray(page.rows) ? page.rows : [];
            const renderedRows = pageRows.map(renderRow).join('');
            return `<div class="card band-other small-page-card"><div class="small-page-table" style="--small-page-rows:${Math.max(1, pageRows.length)};">${renderedRows}</div></div>`;
        };

        const renderPage = () => {
            const page = pages[pageIndex] || pages[0] || { label: t.title, rows: [] };
            cards.setAttribute('data-page-index', String(pageIndex));
            cards.setAttribute('data-page-label', String(page.label || '').trim());
            cards.setAttribute('data-page-tomorrow-preview', page && page.tomorrowPreview === true ? '1' : '0');
            cards.innerHTML = renderPageHtml(page);
            const titleEl = document.getElementById('title');
            if (titleEl) {
                const label = String(page.label || '').trim();
                titleEl.textContent = label !== '' ? label : (String(t.title || '').trim() || 'Menu');
            }
            requestAnimationFrame(() => {
                fitVisibleMealCards('small_screen', settings);
            });
        };

        renderPage();
        if (pages.length > 1) {
            const switchMs = Math.max(1000, Math.min(120000, Number(settings.smallScreenPageSwitchSec || 12) * 1000));
            let switchInProgress = false;
            mealPageSwitchTimer = setInterval(() => {
                if (switchInProgress) {
                    return;
                }
                switchInProgress = true;
                pageIndex = (pageIndex + 1) % pages.length;
                requestAnimationFrame(() => {
                    try {
                        renderPage();
                    } finally {
                        setTimeout(() => {
                            switchInProgress = false;
                        }, 120);
                    }
                });
            }, switchMs);
        }
    }

    function renderLargeScreenGridMeals(meals, settings, t) {
        const cards = document.getElementById('cards');
        if (!cards) return;
        stopMealPageSwitch();

        const list = Array.isArray(meals) ? meals.slice(0, 4) : [];
        while (list.length < 4) {
            list.push({ key: 'other', label: '—', text: '—' });
        }

        cards.innerHTML = list.map((meal) => mealCardHtml(meal, settings, t, { showAllergens: true })).join('');
        fitVisibleMealCards('large_screen', settings);
    }

    function renderFixedAllergenPanel(meals, settings, t) {
        const panel = document.getElementById('allergen-fixed');
        if (!panel) return;

        if (settings.showAllergenEmojis !== true || String(settings.mealDisplayMode || 'small_screen') !== 'large_screen') {
            panel.classList.remove('show');
            panel.innerHTML = '';
            return;
        }

        const map = allergenMap();
        const found = new Map();
        (Array.isArray(meals) ? meals : []).forEach((meal) => {
            const raw = stripSourceNoise(String(meal?.text || '').trim());
            extractAllergenCodes(raw).forEach((code) => {
                const key = String(code);
                if (!found.has(key)) {
                    const entry = map[key] || { icon: 'warning', label: t.allergens || 'Allergens' };
                    found.set(key, { code: key, icon: entry.icon, label: entry.label });
                }
            });
        });

        const items = Array.from(found.values()).sort((a, b) => Number(a.code) - Number(b.code));
        if (items.length === 0) {
            panel.classList.remove('show');
            panel.innerHTML = '';
            return;
        }

        const badges = items.map((item) => `
            <span class="allergen-fixed-badge allergen-${escapeHtml(item.icon)}" title="${escapeHtml(`${item.label} (${item.code})`)}">
                <span class="allergen-fixed-num">${escapeHtml(item.code)}</span>
                <span class="allergen-fixed-label">${escapeHtml(item.label)}</span>
            </span>
        `).join('');

        panel.innerHTML = `<div class="allergen-fixed-title">${escapeHtml(t.allergens || 'Allergens')}</div><div class="allergen-fixed-row">${badges}</div>`;
        panel.classList.add('show');
    }

    function footerAllergenSummary(meals, t) {
        const list = Array.isArray(meals) ? meals : [];
        const labels = new Set();
        const codeLabels = allergenMap();
        list.forEach((meal) => {
            const raw = stripSourceNoise(String(meal?.text || '').trim());
            extractAllergenLabels(raw).forEach((label) => {
                const clean = String(label || '').replace(/^ALERG[ÉE]NY:\s*/iu, '').replace(/[ \t]{2,}/g, ' ').trim();
                if (clean) {
                    labels.add(clean);
                }
            });
            extractAllergenCodes(raw).forEach((code) => {
                const normalized = parseInt(code, 10);
                if (normalized >= 1 && normalized <= 14 && codeLabels[normalized]?.label) {
                    labels.add(String(codeLabels[normalized].label));
                }
            });
        });

        const sorted = Array.from(labels).sort((a, b) => String(a).localeCompare(String(b), 'sk'));
        if (!sorted.length) {
            return '';
        }

        return `${String(t.allergens || 'Allergens')}: ${sorted.join(', ')}`;
    }

    function render(data, settings, context = {}) {
        const cards = document.getElementById('cards');
        const cardsWrap = document.getElementById('cards-wrap');
        const subtitle = document.getElementById('subtitle');
        const foot = document.getElementById('foot');
        const title = document.getElementById('title');
        const t = i18n(settings.language);

        if (!isWeekdayIsoDate(isoDateOffset(0))) {
            cards.innerHTML = '<div class="empty"></div>';
            subtitle.textContent = '';
            subtitle.style.display = 'none';
            foot.innerHTML = '';
            return;
        }

        const dayText = String(data?.menu_date || '').trim();
        const institutionName = String(data?.institution_name || '').trim();

        const displayMode = String(settings.mealDisplayMode || 'small_screen').toLowerCase() === 'large_screen'
            ? 'large_screen'
            : 'small_screen';

        const tomorrowData = context && typeof context === 'object' ? (context.tomorrowData || null) : null;
        const tomorrowMealsRaw = normalizeMealsForDisplay(Array.isArray(tomorrowData?.meals) ? tomorrowData.meals : []);
        const mealsRaw = normalizeMealsForDisplay(Array.isArray(data?.meals) ? data.meals : []);
        const mealsUnmergedLarge = isFutureMenuDate(dayText)
            ? mealsRaw
            : buildLargeScreenMeals(mealsRaw, tomorrowMealsRaw, settings, nowMinutesLocal(), t);
        const mealsUnmergedSmall = buildSmallScreenMeals(mealsRaw, tomorrowMealsRaw, settings, nowMinutesLocal(), t);
        const mealsForSmall = mergeStandardMealBands(mealsUnmergedSmall, t, settings);
        const mealsForLarge = mergeStandardMealBands(mealsUnmergedLarge, t, settings);
        const smallAllowedKeys = resolveSmallScreenAllowedMealKeys(settings);
        const mealsForSmallSelected = smallAllowedKeys === null
            ? mealsForSmall
            : mealsForSmall.filter((meal) => smallAllowedKeys.has(String(meal?.key || '').trim()));

        if (displayMode === 'small_screen') {
            if (title) {
                title.textContent = String(t.title || '').trim() || 'Menu';
                title.style.display = '';
            }
            subtitle.textContent = '';
            subtitle.style.display = 'none';
            startSmallHeaderClock();
        } else {
            stopSmallHeaderClock();
            if (title) {
                const customTitle = String(settings.customHeaderTitle || '').trim();
                title.textContent = customTitle !== '' ? customTitle : t.title;
                title.style.display = settings.showHeaderTitle === false ? 'none' : '';
            }
            const subtitleParts = [];
            if (settings.showInstitutionName !== false && institutionName) {
                subtitleParts.push(institutionName);
            }
            if (dayText) {
                subtitleParts.push(dayText);
            }
            subtitle.textContent = subtitleParts.join(' • ') || t.noInstitution;
            subtitle.style.display = (subtitle.textContent || '').trim() === '' ? 'none' : '';
        }

        cards.classList.toggle('single-card', displayMode === 'small_screen');
        stopSlowScroll();
        stopMealPageSwitch();
        const displayMealsRaw = displayMode === 'large_screen' ? mealsForLarge : mealsForSmallSelected;
        const displayMeals = displayMode === 'small_screen'
            ? displayMealsRaw
            : displayMealsRaw.filter((meal) => mealHasRenderableRows(meal));
        if (!displayMeals.length) {
            cards.innerHTML = `<div class="empty">${escapeHtml(emptyStateMessage(data, t))}</div>`;
        } else {
            if (displayMode === 'large_screen') {
                renderLargeScreenGridMeals(displayMeals, settings, t);
            } else {
                renderSmallScreenPagedMeals(displayMeals, settings, t);
            }
        }
        renderFixedAllergenPanel(displayMode === 'large_screen' ? displayMeals : [], settings, t);

        if (displayMode === 'small_screen') {
            const allergensLine = footerAllergenSummary(displayMeals, t);
            const hasTomorrowPreview = displayMeals.some((meal) => meal?.__tomorrowPreview === true);
            const baseDateText = hasTomorrowPreview
                ? String(t.tomorrowTag || t.tomorrow || 'ZAJTRA').trim()
                : String(dayText || '').trim();
            const combinedLine = [baseDateText, String(allergensLine || '').trim()]
                .filter(Boolean)
                .join(' • ');
            foot.innerHTML = `<span class="foot-line">${escapeHtml(combinedLine || baseDateText || '')}</span>`;
        } else {
            const serverTs = String(data?.updated_at || '').trim();
            const appetiteText = String(settings.appetiteMessageText || '').trim();
            const sourceUrl = String(settings.sourceUrl || '').trim();
            const lines = [];
            if (dayText) {
                lines.push(`<span class="foot-line">${escapeHtml(dayText)}</span>`);
            }
            lines.push(`<span class="foot-line">${escapeHtml(serverTs ? `${t.updatedAt}: ${serverTs}` : t.unknownUpdate)}</span>`);
            if (settings.showAppetiteMessage === true && appetiteText !== '') {
                lines.push(`<span class="foot-line">${escapeHtml(appetiteText)}</span>`);
            }
            if (settings.showSourceUrl === true && sourceUrl !== '') {
                lines.push(`<span class="foot-source">${escapeHtml(`${String(t.sourcePrefix || 'Menu source')}: ${sourceUrl}`)}</span>`);
            }
            const allergensLine = footerAllergenSummary(displayMeals, t);
            if (allergensLine !== '') {
                lines.push(`<span class="foot-allergens">${escapeHtml(allergensLine)}</span>`);
            }
            foot.innerHTML = lines.join('');
        }
    }

    function renderSquareDual(todayData, tomorrowData, settings) {
        const cards = document.getElementById('cards');
        const subtitle = document.getElementById('subtitle');
        const foot = document.getElementById('foot');
        const title = document.getElementById('title');
        const t = i18n(settings.language);

        if (!isWeekdayIsoDate(isoDateOffset(0))) {
            cards.innerHTML = '<div class="empty"></div>';
            subtitle.textContent = '';
            subtitle.style.display = 'none';
            foot.innerHTML = '';
            return;
        }

        if (title) {
            const customTitle = String(settings.customHeaderTitle || '').trim();
            title.textContent = customTitle !== '' ? customTitle : t.title;
            title.style.display = settings.showHeaderTitle === false ? 'none' : '';
        }

        const institutionName = String(todayData?.institution_name || tomorrowData?.institution_name || '').trim();
        subtitle.textContent = settings.showInstitutionName === false ? '' : (institutionName || t.noInstitution);
        subtitle.style.display = (subtitle.textContent || '').trim() === '' ? 'none' : '';

        const currentMinutes = nowMinutesLocal();
        const todayDateText = String(todayData?.menu_date || '').trim();
        const todayMealsRaw = Array.isArray(todayData?.meals) ? todayData.meals : [];
        const todayMealsUnmerged = isFutureMenuDate(todayDateText)
            ? todayMealsRaw
            : filterMealsForCurrentTime(todayMealsRaw, settings, currentMinutes);
        const todayMeals = mergeStandardMealBands(todayMealsUnmerged, t, settings);
        const tomorrowRawMeals = Array.isArray(tomorrowData?.meals) ? tomorrowData.meals : [];
        const tomorrowMealsUnmerged = settings.showTomorrowAfterEvening === false
            ? tomorrowRawMeals
            : filterTomorrowPreviewMeals(tomorrowRawMeals);
        const tomorrowMeals = mergeStandardMealBands(tomorrowMealsUnmerged, t, settings);
        const shouldShowTomorrowColumn = settings.showTomorrowInSquare !== false
            && tomorrowMeals.length > 0
            && shouldShowTomorrowAfterEvening(settings, currentMinutes);

        const dayBlocks = [
            { key: 'today', title: t.today, data: { ...todayData, meals: todayMeals } }
        ];
        if (shouldShowTomorrowColumn) {
            dayBlocks.push({ key: 'tomorrow', title: t.tomorrow, data: { ...tomorrowData, meals: tomorrowMeals } });
        }

        const daysHtml = dayBlocks.map((day) => {
            const dayMeals = Array.isArray(day.data?.meals) ? day.data.meals : [];
            const mealHtml = dayMeals.length > 0
                ? dayMeals.map((meal) => {
                    const key = String(meal.key || '').trim();
                    const localized = String(t.mealLabels?.[key] || '').trim();
                    const rawName = localized || String(meal.label || key || '').trim();
                    const safeName = escapeHtml(rawName);
                    const textRaw = stripSourceNoise(String(meal.text || '').trim());
                    const displayText = (stripAllergenAnnotations(textRaw) || textRaw || '—')
                        .split(/\r?\n/)
                        .map((line) => normalizeMealLine(line))
                        .filter(Boolean)
                        .join('\n');
                    const safeText = escapeHtml(displayText);
                    const labelIcon = settings.showMealTypeSvgIcons === true
                        ? `<span class="day-meal-icon" aria-hidden="true">${mealTypeSvg(meal.key)}</span>`
                        : '';
                    return `<div class="day-meal"><div class="day-meal-label">${labelIcon}<span>${safeName}</span></div><div class="day-meal-text">${safeText}</div></div>`;
                }).join('')
                : `<div class="empty">${escapeHtml(emptyStateMessage(day.data, t))}</div>`;

            const dateText = escapeHtml(String(day.data?.menu_date || '').trim());
            return `<div class="day-square"><div class="day-title"><span class="day-title-icon" aria-hidden="true">${iconSvg('calendar')}</span><span>${escapeHtml(day.title)}</span></div><div class="day-date">${dateText}</div><div class="day-content">${mealHtml}</div></div>`;
        }).join('');

        cards.innerHTML = `<div class="dual-days ${dayBlocks.length === 1 ? 'single-day' : ''}">${daysHtml}</div>`;

        const allVisibleMeals = dayBlocks.flatMap((day) => Array.isArray(day.data?.meals) ? day.data.meals : []);
        renderFixedAllergenPanel(allVisibleMeals, settings, t);

        const tsCandidates = [String(todayData?.updated_at || '').trim(), String(tomorrowData?.updated_at || '').trim()].filter(Boolean);
        const ts = tsCandidates.length > 0 ? tsCandidates.sort().slice(-1)[0] : '';
        const appetiteText = String(settings.appetiteMessageText || '').trim();
        const sourceUrl = String(settings.sourceUrl || '').trim();
        const lines = [];
        lines.push(`<span class="foot-line">${escapeHtml(ts ? `${t.updatedAt}: ${ts}` : t.unknownUpdate)}</span>`);
        if (settings.showAppetiteMessage === true && appetiteText !== '') {
            lines.push(`<span class="foot-line">${escapeHtml(appetiteText)}</span>`);
        }
        if (settings.showSourceUrl === true && sourceUrl !== '') {
            lines.push(`<span class="foot-source">${escapeHtml(`${String(t.sourcePrefix || 'Menu source')}: ${sourceUrl}`)}</span>`);
        }
        const allVisibleMealsSummary = footerAllergenSummary(allVisibleMeals, t);
        if (allVisibleMealsSummary !== '') {
            lines.push(`<span class="foot-allergens">${escapeHtml(allVisibleMealsSummary)}</span>`);
        }
        foot.innerHTML = lines.join('');
    }

    function clearOverlayTextAnimation(position) {
        const state = overlayTextState[position];
        if (!state) return;
        if (state.raf !== null) {
            cancelAnimationFrame(state.raf);
            state.raf = null;
        }
    }

    function clearOverlays() {
        if (overlayClockInterval !== null) {
            clearInterval(overlayClockInterval);
            overlayClockInterval = null;
        }
        clearOverlayTextAnimation('top');
        clearOverlayTextAnimation('bottom');

        ['overlayTop', 'overlayBottom'].forEach((id) => {
            const el = document.getElementById(id);
            if (el) {
                el.style.display = 'none';
                el.innerHTML = '';
            }
        });
    }

    function overlayDateText(now, lang) {
        const locale = String(lang || 'hu') === 'sk' ? 'sk-SK' : (String(lang || 'hu') === 'en' ? 'en-US' : 'hu-HU');
        try {
            return now.toLocaleDateString(locale, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        } catch (_) {
            return now.toISOString().slice(0, 10);
        }
    }

    function applyOverlays(settings) {
        clearOverlays();

        const displayMode = String(settings.mealDisplayMode || 'small_screen').toLowerCase() === 'large_screen'
            ? 'large_screen'
            : 'small_screen';
        if (displayMode !== 'large_screen') {
            const rootSmall = document.querySelector('.root');
            if (rootSmall) {
                rootSmall.style.setProperty('--overlay-top-height', '0%');
                rootSmall.style.setProperty('--overlay-bottom-height', '0%');
            }
            return;
        }

        const root = document.querySelector('.root');
        if (!root) return;

        let topHeight = 0;
        let bottomHeight = 0;

        const topBand = document.getElementById('overlayTop');
        const bottomBand = document.getElementById('overlayBottom');
        if (!topBand || !bottomBand) return;

        const chooseBand = (pos) => (String(pos || '').toLowerCase() === 'bottom' ? bottomBand : topBand);

        if (settings.clockOverlayEnabled === true) {
            const band = chooseBand(settings.clockOverlayPosition);
            const height = Math.max(20, Math.min(40, Number(settings.clockOverlayHeightPercent || 40)));
            band.style.display = 'flex';
            band.style.height = `${height}%`;
            if (String(settings.clockOverlayPosition || '').toLowerCase() === 'bottom') {
                bottomHeight = Math.max(bottomHeight, height);
            } else {
                topHeight = Math.max(topHeight, height);
            }

            const renderClock = () => {
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                const ss = String(now.getSeconds()).padStart(2, '0');
                const timeLine = `${hh}:${mm}:${ss}`;
                const dateLine = overlayDateText(now, settings.language);
                band.innerHTML = `<div class="overlay-clock"><div class="overlay-clock-line" style="color:${escapeHtml(String(settings.clockOverlayTimeColor || '#ffffff'))}; font-size:clamp(30px,6.2vw,132px);">${escapeHtml(timeLine)}</div><div class="overlay-clock-line" style="color:${escapeHtml(String(settings.clockOverlayDateColor || '#ffffff'))}; font-size:clamp(16px,2.2vw,48px); margin-top:6px;">${escapeHtml(dateLine)}</div></div>`;
            };

            renderClock();
            overlayClockInterval = setInterval(renderClock, 1000);
        }

        if (settings.textOverlayEnabled === true) {
            const band = chooseBand(settings.textOverlayPosition);
            const height = Math.max(12, Math.min(40, Number(settings.textOverlayHeightPercent || 20)));
            band.style.display = 'flex';
            band.style.height = `${height}%`;
            if (String(settings.textOverlayPosition || '').toLowerCase() === 'bottom') {
                bottomHeight = Math.max(bottomHeight, height);
            } else {
                topHeight = Math.max(topHeight, height);
            }

            let segments = [];
            const sourceType = String(settings.textOverlaySourceType || 'manual').toLowerCase();
            if (sourceType === 'collection') {
                try {
                    const parsed = JSON.parse(String(settings.textOverlayCollectionJson || '[]'));
                    if (Array.isArray(parsed)) {
                        segments = parsed.map((item) => String(item || '').trim()).filter(Boolean);
                    }
                } catch (_) {
                    segments = [];
                }
            } else {
                const txt = String(settings.textOverlayText || '').trim();
                if (txt) segments = [txt];
            }

            if (segments.length === 0) {
                segments = [''];
            }

            const color = String(settings.textOverlayColor || '#ffffff');
            const size = Math.max(18, Math.min(120, Number(settings.textOverlayFontSize || 52)));
            const speed = Math.max(40, Math.min(320, Number(settings.textOverlaySpeedPxPerSec || 120)));

            band.innerHTML = `<div class="overlay-text" style="color:${escapeHtml(color)}; font-size:${Math.round(size)}px;"><div class="overlay-text-track">${segments.map((s) => `<span class=\"overlay-text-segment\">${escapeHtml(s)}</span>`).join('')}</div></div>`;

            const state = overlayTextState[String(settings.textOverlayPosition || '').toLowerCase() === 'bottom' ? 'bottom' : 'top'];
            const textEl = band.querySelector('.overlay-text');
            const track = band.querySelector('.overlay-text-track');
            if (state && textEl && track) {
                let x = textEl.clientWidth;
                let lastTs = 0;
                const tick = (ts) => {
                    if (!lastTs) lastTs = ts;
                    const dt = Math.max(0, (ts - lastTs) / 1000);
                    lastTs = ts;
                    x -= speed * dt;
                    const resetAt = -track.scrollWidth;
                    if (x < resetAt) {
                        x = textEl.clientWidth;
                    }
                    track.style.transform = `translateX(${Math.round(x)}px)`;
                    state.raf = requestAnimationFrame(tick);
                };
                state.raf = requestAnimationFrame(tick);
            }
        }

        root.style.setProperty('--overlay-top-height', `${topHeight}%`);
        root.style.setProperty('--overlay-bottom-height', `${bottomHeight}%`);
    }

    function isoDateOffset(days) {
        const now = new Date();
        const base = new Date(now.getFullYear(), now.getMonth(), now.getDate() + days, 12, 0, 0, 0);
        const y = base.getFullYear();
        const m = String(base.getMonth() + 1).padStart(2, '0');
        const d = String(base.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function isoDateShift(baseIso, days) {
        const raw = String(baseIso || '').trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
            return isoDateOffset(days);
        }
        const [y, m, d] = raw.split('-').map((value) => parseInt(value, 10));
        const base = new Date(y, (m || 1) - 1, d || 1, 12, 0, 0, 0);
        base.setDate(base.getDate() + (parseInt(days, 10) || 0));
        const yy = base.getFullYear();
        const mm = String(base.getMonth() + 1).padStart(2, '0');
        const dd = String(base.getDate()).padStart(2, '0');
        return `${yy}-${mm}-${dd}`;
    }

    function isWeekdayIsoDate(isoDate) {
        const raw = String(isoDate || '').trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
            return false;
        }
        const [y, m, d] = raw.split('-').map((value) => parseInt(value, 10));
        const dt = new Date(y, (m || 1) - 1, d || 1, 12, 0, 0, 0);
        const day = dt.getDay();
        return day >= 1 && day <= 5;
    }

    function hasAnyMeals(data) {
        const meals = Array.isArray(data?.meals) ? data.meals : [];
        return meals.some((meal) => mealHasRenderableRows(meal));
    }

    function mealHasRenderableRows(meal) {
        const rawText = stripSourceNoise(String(meal?.text || '').trim());
        const cleanText = String(stripAllergenAnnotations(rawText) || rawText || '').trim();
        if (!cleanText) {
            return false;
        }
        const normalizedLines = cleanText
            .split(/\r?\n/)
            .map((line) => normalizeMealLine(line))
            .filter((line) => line !== '' && line !== '—');
        return normalizedLines.length > 0;
    }

    function normalizeMealsForDisplay(meals) {
        const list = Array.isArray(meals) ? meals.slice() : [];
        if (!list.length) {
            return list;
        }

        const byKey = new Map();
        list.forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (key !== '') {
                byKey.set(key, meal);
            }
        });

        const breakfast = byKey.get('breakfast') || null;
        const lunch = byKey.get('lunch') || null;
        const breakfastHasRows = mealHasRenderableRows(breakfast);
        if (!breakfastHasRows && lunch) {
            const lunchRows = Array.isArray(lunch?.structured_rows) ? lunch.structured_rows : [];
            const categories = lunchRows
                .map((row) => parseInt(row?.recipe_category || 0, 10) || 0)
                .filter((cat) => cat > 0);
            if (categories.length > 0) {
                const breakfastCats = new Set([1, 2, 3]);
                const looksBreakfast = categories.every((cat) => breakfastCats.has(cat));
                if (looksBreakfast) {
                    byKey.set('breakfast', {
                        ...lunch,
                        key: 'breakfast',
                        label: 'Raňajky'
                    });
                    byKey.delete('lunch');
                }
            }
        }

        const orderedKeys = ['breakfast', 'snack_am', 'lunch', 'snack_pm', 'dinner'];
        const normalized = [];
        const used = new Set();
        orderedKeys.forEach((key) => {
            const meal = byKey.get(key);
            if (meal) {
                normalized.push(meal);
                used.add(key);
            }
        });

        list.forEach((meal) => {
            const key = String(meal?.key || '').trim();
            if (!used.has(key)) {
                normalized.push(meal);
            }
        });

        return normalized;
    }

    function createDebugState() {
        return { lines: [] };
    }

    function pushDebug(debugState, message) {
        if (!debugState || !Array.isArray(debugState.lines)) return;
        const clean = String(message || '').trim();
        if (!clean) return;
        debugState.lines.push(clean);
        if (debugState.lines.length > 10) {
            debugState.lines = debugState.lines.slice(-10);
        }
    }

    function renderDebugStatus(debugState, rendered) {
        const statusEl = document.getElementById('status');
        if (!statusEl) return;

        if (rendered === true) {
            statusEl.classList.remove('is-debug');
            statusEl.style.display = 'none';
            statusEl.textContent = '';
            return;
        }

        const lines = (debugState && Array.isArray(debugState.lines)) ? debugState.lines : [];
        if (!lines.length) {
            statusEl.classList.remove('is-debug');
            statusEl.style.display = 'none';
            statusEl.textContent = '';
            return;
        }

        statusEl.classList.add('is-debug');
        statusEl.style.display = 'block';
        statusEl.textContent = `⚠️ Meal debug\n${lines.join('\n')}`;
    }

    async function fetchMenuData(settings, dateValue, exactDate, debugState) {
        const queryParams = new URLSearchParams({
            action: 'menu',
            site_key: settings.siteKey,
            institution_id: String(parseInt(settings.institutionId, 10) || 0),
            date: dateValue,
            exact_date: exactDate ? '1' : '0',
            show_breakfast: settings.showBreakfast ? '1' : '0',
            show_snack_am: settings.showSnackAm ? '1' : '0',
            show_lunch: settings.showLunch ? '1' : '0',
            show_snack_pm: settings.showSnackPm ? '1' : '0',
            show_dinner: settings.showDinner ? '1' : '0',
            source_type: settings.sourceType === 'server' ? 'server' : 'manual'
        });

        const requestedCompanyId = parseInt(settings.companyId, 10) || 0;
        if (requestedCompanyId > 0) {
            queryParams.set('company_id', String(requestedCompanyId));
        }

        const url = appendToken(resolveApiUrl(settings.apiBaseUrl, queryParams.toString()));
        try {
            const response = await fetchWithTimeout(url, settings.apiTimeoutMs);
            const payload = await response.json();
            if (!response.ok || !payload || payload.success !== true) {
                pushDebug(debugState, `API fail (${response.status || 'n/a'}) ${dateValue}`);
                return null;
            }
            const data = (payload.data && typeof payload.data === 'object') ? payload.data : null;
            const meta = (payload.meta && typeof payload.meta === 'object') ? payload.meta : {};
            if (data) {
                data.__serverDataAvailable = meta.server_data_available === true;
                data.__pendingServerSync = meta.pending_server_sync === true;
            }
            return data;
        } catch (error) {
            pushDebug(debugState, `API exception ${dateValue}: ${String(error?.message || error || 'unknown')}`);
            return null;
        }
    }

    async function findNextMenuWithMeals(settings, startOffsetDays, maxDaysAhead, debugState) {
        const start = Math.max(0, parseInt(startOffsetDays, 10) || 0);
        const max = Math.max(start, parseInt(maxDaysAhead, 10) || 0);

        for (let offset = start; offset <= max; offset++) {
            const dateValue = isoDateOffset(offset);
            const data = await fetchMenuData(settings, dateValue, true, debugState);
            if (data && hasAnyMeals(data)) {
                pushDebug(debugState, `Fallback menu used: ${String(data.menu_date || dateValue)}`);
                return data;
            }
        }

        return null;
    }

    async function fetchWithTimeout(url, timeoutMs) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
            return await fetch(url, { method: 'GET', cache: 'no-store', signal: controller.signal });
        } finally {
            clearTimeout(timer);
        }
    }

    async function loadOfflineMealFile(pathValue, debugState, label) {
        const path = String(pathValue || '').trim();
        if (!path) {
            pushDebug(debugState, `Offline file missing (${String(label || 'unknown')})`);
            return null;
        }
        try {
            const response = await fetch(path, { method: 'GET', cache: 'no-store' });
            if (!response.ok) {
                pushDebug(debugState, `Offline file fail ${String(label || '')}: ${response.status}`);
                return null;
            }
            const payload = await response.json();
            if (!(payload && typeof payload === 'object')) {
                pushDebug(debugState, `Offline file invalid JSON (${String(label || '')})`);
            }
            return payload && typeof payload === 'object' ? payload : null;
        } catch (error) {
            pushDebug(debugState, `Offline file exception ${String(label || '')}: ${String(error?.message || error || 'unknown')}`);
            return null;
        }
    }

    async function refreshSingleModeFromApi(settings, cacheKey, debugState) {
        const todayIso = isoDateOffset(0);
        if (!isWeekdayIsoDate(todayIso)) {
            pushDebug(debugState, 'Single mode skipped: weekend day');
            return false;
        }

        let data = await fetchMenuData(settings, todayIso, false, debugState);
        const shouldProbeFallback = (!data || data.__serverDataAvailable !== false) && settings.maxFallbackDaysAhead > 0;
        if ((!data || !hasAnyMeals(data)) && shouldProbeFallback) {
            const tomorrowIso = isoDateShift(todayIso, 1);
            if (isWeekdayIsoDate(tomorrowIso)) {
                const tomorrowFallback = await fetchMenuData(settings, tomorrowIso, true, debugState);
                if (tomorrowFallback && hasAnyMeals(tomorrowFallback)) {
                    data = tomorrowFallback;
                }
            }
        }

        if (!data) {
            return false;
        }

        const effectiveTodayDate = String(data?.menu_date || isoDateOffset(0)).trim() || isoDateOffset(0);
        const effectiveTomorrowDate = isoDateShift(effectiveTodayDate, 1);
        const tomorrowData = await fetchMenuData(settings, effectiveTomorrowDate, true, debugState);

        render(data, settings, { tomorrowData });
        try {
            localStorage.setItem(cacheKey, JSON.stringify({ saved_at: Date.now(), mode: 'single', data: { today: data, tomorrow: tomorrowData } }));
        } catch (_) {
        }
        return true;
    }

    async function refreshSquareModeFromApi(settings, cacheKey, debugState) {
        const todayDate = isoDateOffset(0);
        if (!isWeekdayIsoDate(todayDate)) {
            pushDebug(debugState, 'Square mode skipped: weekend day');
            return false;
        }

        let todayData = await fetchMenuData(settings, todayDate, false, debugState);
        const shouldProbeFallbackToday = (!todayData || todayData.__serverDataAvailable !== false) && settings.maxFallbackDaysAhead > 0;
        if ((!todayData || !hasAnyMeals(todayData)) && shouldProbeFallbackToday) {
            const tomorrowDate = isoDateShift(todayDate, 1);
            if (isWeekdayIsoDate(tomorrowDate)) {
                const fallbackTomorrow = await fetchMenuData(settings, tomorrowDate, true, debugState);
                if (fallbackTomorrow && hasAnyMeals(fallbackTomorrow)) {
                    todayData = fallbackTomorrow;
                }
            }
        }

        const effectiveTodayDate = String(todayData?.menu_date || todayDate).trim() || todayDate;
        const effectiveTomorrowDate = isoDateShift(effectiveTodayDate, 1);
        const tomorrowData = settings.showTomorrowInSquare !== false
            ? (isWeekdayIsoDate(effectiveTomorrowDate)
                ? await fetchMenuData(settings, effectiveTomorrowDate, true, debugState)
                : null)
            : null;

        if (!todayData && !tomorrowData) {
            return false;
        }

        renderSquareDual(
            todayData || { institution_name: '', menu_date: effectiveTodayDate, meals: [] },
            tomorrowData || { institution_name: '', menu_date: effectiveTomorrowDate, meals: [] },
            settings
        );
        try {
            localStorage.setItem(cacheKey, JSON.stringify({ saved_at: Date.now(), mode: 'square_dual_day', data: { today: todayData, tomorrow: tomorrowData } }));
        } catch (_) {
        }
        return true;
    }

    function startBackgroundApiRefresh(settings, cacheKey, debugState) {
        if (backgroundRefreshTimer !== null) {
            clearInterval(backgroundRefreshTimer);
            backgroundRefreshTimer = null;
        }
        if (settings.runtimeApiFetchEnabled !== true) {
            return;
        }

        const intervalMs = Math.max(60000, Math.min(3600000, Number(settings.runtimeRefreshIntervalSec || 300) * 1000));
        let inFlight = false;
        backgroundRefreshTimer = setInterval(async () => {
            if (inFlight) {
                return;
            }
            inFlight = true;
            try {
                if (settings.layoutMode === 'square_dual_day') {
                    await refreshSquareModeFromApi(settings, cacheKey, debugState);
                } else {
                    await refreshSingleModeFromApi(settings, cacheKey, debugState);
                }
            } catch (_) {
            } finally {
                inFlight = false;
            }
        }, intervalMs);
    }

    function saveMenuCache(cacheKey, mode, data) {
        try {
            localStorage.setItem(cacheKey, JSON.stringify({ saved_at: Date.now(), mode, data }));
        } catch (_) {
        }
    }

    function renderFromInlinePrefetched(settings, cacheKey, debugState, options = {}) {
        const successMessage = String(options.successMessage || '').trim();
        const emptyMessage = String(options.emptyMessage || '').trim();
        const prefetched = settings.offlinePrefetchedMenuData;

        if (settings.layoutMode === 'square_dual_day') {
            const todayPref = prefetched && typeof prefetched === 'object' ? (prefetched.today || null) : null;
            const tomorrowPref = prefetched && typeof prefetched === 'object' ? (prefetched.tomorrow || null) : null;
            if (!(todayPref || tomorrowPref)) {
                if (emptyMessage) {
                    pushDebug(debugState, emptyMessage);
                }
                return false;
            }
            renderSquareDual(
                todayPref || { institution_name: '', menu_date: isoDateOffset(0), meals: [] },
                tomorrowPref || { institution_name: '', menu_date: isoDateOffset(1), meals: [] },
                settings
            );
            saveMenuCache(cacheKey, 'square_dual_day', { today: todayPref, tomorrow: tomorrowPref });
            if (successMessage) {
                pushDebug(debugState, successMessage);
            }
            return true;
        }

        if (!(prefetched && Array.isArray(prefetched.meals))) {
            const prefTodayAlt = prefetched && typeof prefetched === 'object' ? prefetched.today : null;
            if (!(prefTodayAlt && Array.isArray(prefTodayAlt.meals))) {
                if (emptyMessage) {
                    pushDebug(debugState, emptyMessage);
                }
                return false;
            }
            const prefTomorrowAlt = prefetched && typeof prefetched === 'object' ? (prefetched.tomorrow || null) : null;
            render(prefTodayAlt, settings, { tomorrowData: prefTomorrowAlt });
            saveMenuCache(cacheKey, 'single', { today: prefTodayAlt, tomorrow: prefTomorrowAlt });
            if (successMessage) {
                pushDebug(debugState, successMessage);
            }
            return true;
        }

        render(prefetched, settings, { tomorrowData: null });
        saveMenuCache(cacheKey, 'single', { today: prefetched, tomorrow: null });
        if (successMessage) {
            pushDebug(debugState, successMessage);
        }
        return true;
    }

    function renderFromLocalCache(settings, cacheKey, debugState, options = {}) {
        const successMessage = String(options.successMessage || '').trim();
        const emptyMessage = String(options.emptyMessage || '').trim();
        const unusableMessage = String(options.unusableMessage || '').trim();

        try {
            const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
            if (!(cached && cached.data)) {
                if (emptyMessage) {
                    pushDebug(debugState, emptyMessage);
                }
                return false;
            }

            if (settings.layoutMode === 'square_dual_day') {
                const todayCached = cached.data.today || null;
                const tomorrowCached = cached.data.tomorrow || null;
                if (!(todayCached || tomorrowCached)) {
                    if (unusableMessage) {
                        pushDebug(debugState, unusableMessage);
                    }
                    return false;
                }
                renderSquareDual(
                    todayCached || { institution_name: '', menu_date: isoDateOffset(0), meals: [] },
                    tomorrowCached || { institution_name: '', menu_date: isoDateOffset(1), meals: [] },
                    settings
                );
                if (successMessage) {
                    pushDebug(debugState, successMessage);
                }
                return true;
            }

            const todayCached = cached?.data && Array.isArray(cached.data?.today?.meals)
                ? cached.data.today
                : (cached?.data && Array.isArray(cached.data?.meals) ? cached.data : null);
            const tomorrowCached = cached?.data && cached.data?.tomorrow && Array.isArray(cached.data.tomorrow?.meals)
                ? cached.data.tomorrow
                : null;

            if (!todayCached) {
                if (unusableMessage) {
                    pushDebug(debugState, unusableMessage);
                }
                return false;
            }

            render(todayCached, settings, { tomorrowData: tomorrowCached });
            if (successMessage) {
                pushDebug(debugState, successMessage);
            }
            return true;
        } catch (error) {
            pushDebug(debugState, `Cache exception: ${String(error?.message || error || 'unknown')}`);
            return false;
        }
    }

    async function renderFromOfflineFiles(settings, cacheKey, debugState) {
        const todayFile = String(settings.offlinePrefetchedTodayFile || '').trim();
        const tomorrowFile = String(settings.offlinePrefetchedTomorrowFile || '').trim();

        if (settings.layoutMode === 'square_dual_day') {
            const todayFromFile = await loadOfflineMealFile(todayFile, debugState, 'today');
            const tomorrowFromFile = settings.showTomorrowInSquare !== false
                ? await loadOfflineMealFile(tomorrowFile, debugState, 'tomorrow')
                : null;
            if (!(todayFromFile || tomorrowFromFile)) {
                pushDebug(debugState, 'Offline files empty (square mode)');
                return false;
            }
            renderSquareDual(
                todayFromFile || { institution_name: '', menu_date: isoDateOffset(0), meals: [] },
                tomorrowFromFile || { institution_name: '', menu_date: isoDateOffset(1), meals: [] },
                settings
            );
            saveMenuCache(cacheKey, 'square_dual_day', { today: todayFromFile, tomorrow: tomorrowFromFile });
            return true;
        }

        const todayFromFile = await loadOfflineMealFile(todayFile, debugState, 'today');
        const tomorrowFromFile = await loadOfflineMealFile(tomorrowFile, debugState, 'tomorrow');
        if (!todayFromFile) {
            pushDebug(debugState, 'Offline file empty (single mode)');
            return false;
        }

        render(todayFromFile, settings, { tomorrowData: tomorrowFromFile });
        saveMenuCache(cacheKey, 'single', { today: todayFromFile, tomorrow: tomorrowFromFile });
        return true;
    }

    function renderHardFallback(settings, debugState) {
        if (settings.layoutMode === 'square_dual_day') {
            renderSquareDual(
                { institution_name: '', menu_date: isoDateOffset(0), meals: [] },
                { institution_name: '', menu_date: isoDateOffset(1), meals: [] },
                settings
            );
        } else {
            render(
                { institution_name: '', menu_date: isoDateOffset(0), meals: [] },
                settings,
                { tomorrowData: { institution_name: '', menu_date: isoDateOffset(1), meals: [] } }
            );
        }
        pushDebug(debugState, 'Rendered hard fallback (empty meals)');
    }

    async function init() {
        const settings = getSettings();
        settings.layoutMode = 'classic';
        applyVisualSettings(settings);
        applyOverlays(settings);
        const cacheKey = `meal_menu_cache_${settings.companyId}_${settings.siteKey}_${settings.institutionId}`;
        const debugState = createDebugState();

        let rendered = false;

        if (!rendered) {
            rendered = renderFromInlinePrefetched(settings, cacheKey, debugState, {
                successMessage: 'Rendered from inline prefetched data (startup fast path)'
            });
        }

        if (!rendered) {
            rendered = renderFromLocalCache(settings, cacheKey, debugState, {
                successMessage: 'Rendered from local cache (startup fast path)'
            });
        }

        try {
            if (settings.runtimeApiFetchEnabled === true && settings.layoutMode === 'square_dual_day') {
                const ok = await refreshSquareModeFromApi(settings, cacheKey, debugState);
                if (ok) {
                    rendered = true;
                } else {
                    pushDebug(debugState, 'API empty (square mode)');
                }
            } else if (settings.runtimeApiFetchEnabled === true) {
                const ok = await refreshSingleModeFromApi(settings, cacheKey, debugState);
                if (ok) {
                    rendered = true;
                } else {
                    pushDebug(debugState, 'API empty (single mode)');
                }
            } else {
                pushDebug(debugState, 'Runtime API fetch disabled; using prefetched/local data only');
            }
        } catch (error) {
            pushDebug(debugState, `Init API phase exception: ${String(error?.message || error || 'unknown')}`);
        }

        if (!rendered) {
            rendered = await renderFromOfflineFiles(settings, cacheKey, debugState);
        }

        if (!rendered) {
            rendered = renderFromInlinePrefetched(settings, cacheKey, debugState, {
                emptyMessage: settings.layoutMode === 'square_dual_day'
                    ? 'Inline prefetched data empty (square mode)'
                    : 'Inline prefetched data empty (single mode)'
            });
        }

        if (!rendered) {
            rendered = renderFromLocalCache(settings, cacheKey, debugState, {
                emptyMessage: 'No local cache',
                unusableMessage: 'Cache present but unusable'
            });
        }

        if (!rendered) {
            renderHardFallback(settings, debugState);
        }

        window.addEventListener('resize', () => {
            const mode = String(settings.mealDisplayMode || 'small_screen').toLowerCase() === 'large_screen'
                ? 'large_screen'
                : 'small_screen';
            fitVisibleMealCards(mode, settings);
        });

        startBackgroundApiRefresh(settings, cacheKey, debugState);

        renderDebugStatus(debugState, rendered);
    }

    init();
})();
</script>
</body>
</html>
