<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock - EduDisplej</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        #clock-root {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #analog-svg {
            display: block;
            height: 100vh;
            width: auto;
            max-width: 100vw;
        }
        #digital-overlay {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.03em;
            text-align: center;
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
        }
        #digital-overlay.pos-top { top: 33%; }
        #digital-overlay.pos-center { top: 50%; transform: translate(-50%, -50%); }
        #digital-overlay.pos-bottom { top: 67%; }
        #digital-full {
            color: #fff;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.04em;
            text-align: center;
            white-space: nowrap;
        }
        #digital-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2vh;
        }
        .clock-date-row {
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: 0.01em;
            text-align: center;
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
        }
        #analog-date {
            position: absolute;
            left: 50%;
            top: 79%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div id="clock-root"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const settings = {
            type: (params.get('type') || 'analog').toLowerCase() === 'digital' ? 'digital' : 'analog',
            format: (params.get('format') || '24h').toLowerCase() === '12h' ? '12h' : '24h',
            dateFormat: (params.get('dateFormat') || 'dmy').toLowerCase(),
            timeColor: params.get('timeColor') || '#ffffff',
            dateColor: params.get('dateColor') || '#facc15',
            bgColor: params.get('bgColor') || '#000000',
            showSeconds: params.get('showSeconds') !== 'false',
            showDate: params.get('showDate') !== 'false',
            language: (params.get('language') || 'sk').toLowerCase(),
            timeFontSize: parseInt(params.get('timeFontSize'), 10) || parseInt(params.get('fontSize'), 10) || 150,
            dateFontSize: parseInt(params.get('dateFontSize'), 10) || 48,
            digitalOverlayEnabled: params.get('digitalOverlayEnabled') === 'true',
            digitalOverlayPosition: (() => {
                const value = String(params.get('digitalOverlayPosition') || 'auto').toLowerCase();
                return ['auto', 'top', 'center', 'bottom'].includes(value) ? value : 'auto';
            })()
        };

        document.body.style.backgroundColor = settings.bgColor;

        function pad2(value) {
            return String(value).padStart(2, '0');
        }

        function formatDigitalTime(dateObj) {
            let hours = dateObj.getHours();
            const minutes = pad2(dateObj.getMinutes());
            const seconds = pad2(dateObj.getSeconds());
            if (settings.format === '12h') {
                const suffix = hours >= 12 ? ' PM' : ' AM';
                hours = hours % 12 || 12;
                return `${hours}:${minutes}${settings.showSeconds ? ':' + seconds : ''}${suffix}`;
            }
            return `${pad2(hours)}:${minutes}${settings.showSeconds ? ':' + seconds : ''}`;
        }

        function getDayShort(dateObj) {
            const days = {
                sk: ['Ne', 'Po', 'Ut', 'St', 'Št', 'Pia', 'So'],
                hu: ['V', 'H', 'K', 'Sze', 'Cs', 'P', 'Szo'],
                en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
            };
            const lang = ['sk', 'hu', 'en'].includes(settings.language) ? settings.language : 'sk';
            return (days[lang] || days.sk)[dateObj.getDay()] || 'Po';
        }

        function formatDatePart(dateObj) {
            const locale = settings.language === 'hu' ? 'hu-HU' : (settings.language === 'en' ? 'en-GB' : 'sk-SK');
            const dd = pad2(dateObj.getDate());
            const mm = pad2(dateObj.getMonth() + 1);
            const yyyy = String(dateObj.getFullYear());

            switch (settings.dateFormat) {
                case 'none':
                    return '';
                case 'numeric':
                    return `${dd}.${mm}`;
                case 'short':
                    return new Intl.DateTimeFormat(locale, { day: '2-digit', month: 'short' }).format(dateObj);
                case 'full':
                    return new Intl.DateTimeFormat(locale, { day: '2-digit', month: 'long', year: 'numeric' }).format(dateObj);
                case 'dmy':
                default:
                    return `${dd}.${mm}.${yyyy}`;
            }
        }

        function formatClockDate(dateObj) {
            const dayShort = getDayShort(dateObj);
            const datePart = formatDatePart(dateObj);
            return `${dayShort} ${datePart}`.trim();
        }

        function topZoneBusy(angles) {
            return angles.some((angle) => {
                const radians = (angle - 90) * Math.PI / 180;
                const x = Math.cos(radians);
                const y = Math.sin(radians);
                return y < -0.25 && Math.abs(x) < 0.55;
            });
        }

        function renderDigitalOnly(root) {
            const stack = document.createElement('div');
            stack.id = 'digital-stack';

            const el = document.createElement('div');
            el.id = 'digital-full';
            el.style.fontSize = `clamp(56px, ${Math.max(6, Math.min(14, settings.timeFontSize / 16))}vw, 220px)`;
            el.style.color = settings.timeColor;
            stack.appendChild(el);

            let dateEl = null;
            if (settings.showDate) {
                dateEl = document.createElement('div');
                dateEl.id = 'digital-date';
                dateEl.className = 'clock-date-row';
                dateEl.style.color = settings.dateColor;
                dateEl.style.fontSize = `clamp(20px, ${Math.max(2, Math.min(5.5, settings.dateFontSize / 16))}vw, 110px)`;
                stack.appendChild(dateEl);
            }

            root.appendChild(stack);

            const tick = () => {
                const now = new Date();
                el.textContent = formatDigitalTime(now);
                if (dateEl) {
                    dateEl.textContent = formatClockDate(now);
                }
                setTimeout(tick, 1000 - (now.getTime() % 1000) + 20);
            };
            tick();
        }

        function renderAnalog(root) {
            root.innerHTML = `
                <svg id="analog-svg" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="-1 -1 2 2" stroke="none" fill="none" style="background-color:${settings.bgColor}">
                    <defs>
                        <circle id="hour-mark" cx="0" cy="-0.95" r="0.04"/>
                    </defs>
                    <g id="hour-marks" fill="${settings.timeColor}"/>
                    <g id="hands" stroke="${settings.timeColor}" stroke-linecap="round" style="display:none">
                        <line id="hour-hand" x1="0" y1="0" x2="0" y2="-0.50" stroke-width="0.11"/>
                        <line id="minute-hand" x1="0" y1="0" x2="0" y2="-0.75" stroke-width="0.07"/>
                        <line id="second-hand" x1="0" y1="0" x2="0" y2="-0.85" stroke-width="0.04" stroke="${settings.dateColor}"/>
                    </g>
                </svg>
            `;

            const namespace = 'http://www.w3.org/2000/svg';
            const marks = document.getElementById('hour-marks');
            const hands = document.getElementById('hands');
            const hourHand = document.getElementById('hour-hand');
            const minuteHand = document.getElementById('minute-hand');
            const secondHand = document.getElementById('second-hand');

            for (let i = 0; i < 12; i += 1) {
                const mark = document.createElementNS(namespace, 'use');
                mark.setAttribute('href', '#hour-mark');
                mark.setAttribute('transform', `rotate(${i / 12 * 360})`);
                marks.appendChild(mark);
            }

            if (!settings.showSeconds) {
                secondHand.setAttribute('style', 'display:none');
            }

            let overlayEl = null;
            if (settings.digitalOverlayEnabled) {
                overlayEl = document.createElement('div');
                overlayEl.id = 'digital-overlay';
                overlayEl.style.color = settings.timeColor;
                overlayEl.style.fontSize = `clamp(28px, ${Math.max(2.8, Math.min(7.5, settings.timeFontSize / 25))}vw, 96px)`;
                root.appendChild(overlayEl);
            }

            let analogDateEl = null;
            if (settings.showDate) {
                analogDateEl = document.createElement('div');
                analogDateEl.id = 'analog-date';
                analogDateEl.className = 'clock-date-row';
                analogDateEl.style.color = settings.dateColor;
                analogDateEl.style.fontSize = `clamp(18px, ${Math.max(1.8, Math.min(4.8, settings.dateFontSize / 16))}vw, 96px)`;
                root.appendChild(analogDateEl);
            }

            hands.removeAttribute('style');

            const tick = () => {
                const now = new Date();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();

                const hourDeg = ((hours + minutes / 60 + seconds / 3600) / 12) * 360;
                const minuteDeg = ((minutes + seconds / 60) / 60) * 360;
                const secondDeg = (seconds / 60) * 360;

                hourHand.setAttribute('transform', `rotate(${hourDeg})`);
                minuteHand.setAttribute('transform', `rotate(${minuteDeg})`);
                if (settings.showSeconds) {
                    secondHand.setAttribute('transform', `rotate(${secondDeg})`);
                }

                if (overlayEl) {
                    overlayEl.textContent = formatDigitalTime(now);
                    let position = settings.digitalOverlayPosition;
                    if (position === 'auto') {
                        const busyTop = topZoneBusy(settings.showSeconds ? [hourDeg, minuteDeg, secondDeg] : [hourDeg, minuteDeg]);
                        position = busyTop ? 'bottom' : 'top';
                    }
                    overlayEl.className = '';
                    overlayEl.classList.add(`pos-${position}`);
                }

                if (analogDateEl) {
                    analogDateEl.textContent = formatClockDate(now);
                }

                setTimeout(tick, 1000 - (now.getTime() % 1000) + 20);
            };

            tick();
        }

        const root = document.getElementById('clock-root');
        if (settings.type === 'digital') {
            renderDigitalOnly(root);
        } else {
            renderAnalog(root);
        }
    </script>
</body>
</html>
