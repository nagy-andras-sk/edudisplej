<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduDisplej Terem Foglaltság</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .root { width: 100%; height: 100%; padding: 2.4vh 2.4vw; display: grid; grid-template-rows: auto auto 1fr auto; gap: 1.2vh; }
        .title { font-size: clamp(24px, 3.1vw, 54px); font-weight: 700; }
        .subtitle { font-size: clamp(14px, 1.35vw, 24px); color: #cbd5e1; margin-top: 4px; }
        .status-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .badge { border: 1px solid rgba(148, 163, 184, 0.25); border-radius: 999px; padding: 6px 10px; font-size: clamp(12px, 1.05vw, 18px); }
        .badge.ok { background: rgba(22, 163, 74, .2); color: #bbf7d0; }
        .badge.busy { background: rgba(220, 38, 38, .2); color: #fecaca; }
        .badge.info { background: rgba(30, 64, 175, .2); color: #bfdbfe; }
        .list { border: 1px solid rgba(148, 163, 184, 0.24); border-radius: 10px; overflow: hidden; }
        .row { display: grid; grid-template-columns: 150px 1fr; gap: 12px; padding: 10px 12px; border-bottom: 1px solid rgba(148, 163, 184, 0.18); }
        .row:last-child { border-bottom: 0; }
        .time { font-weight: 700; color: #e2e8f0; font-size: clamp(16px, 1.4vw, 24px); }
        .text { font-size: clamp(16px, 1.35vw, 24px); color: #f8fafc; white-space: pre-wrap; word-break: break-word; }
        .muted { color: #94a3b8; }
        .empty { border: 1px dashed rgba(148,163,184,.35); border-radius: 12px; padding: 14px; color: #cbd5e1; font-size: clamp(18px, 1.7vw, 30px); }
        .foot { font-size: clamp(12px, 1vw, 18px); color: #94a3b8; }
    </style>
</head>
<body>
<div class="root">
    <div>
        <div class="title">Terem foglaltság</div>
        <div class="subtitle" id="subtitle">Betöltés...</div>
    </div>

    <div class="status-bar" id="status"></div>

    <div id="events"></div>

    <div class="foot" id="foot"></div>
</div>

<script>
(function () {
    function parseBool(value, fallback) {
        if (value === null || value === undefined || value === '') return fallback;
        if (typeof value === 'boolean') return value;
        const normalized = String(value).toLowerCase();
        if (['1', 'true', 'yes', 'on'].includes(normalized)) return true;
        if (['0', 'false', 'no', 'off'].includes(normalized)) return false;
        return fallback;
    }

    function parseIntSafe(value, fallback) {
        const n = parseInt(value, 10);
        return Number.isFinite(n) ? n : fallback;
    }

    function appendToken(url) {
        const pageParams = new URLSearchParams(window.location.search);
        const pageToken = pageParams.get('token');
        if (!pageToken || String(url).includes('token=')) {
            return url;
        }
        const glue = String(url).includes('?') ? '&' : '?';
        return `${url}${glue}token=${encodeURIComponent(pageToken)}`;
    }

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    function normalizeLang(value) {
        const normalized = String(value || '').toLowerCase();
        if (normalized === 'hu' || normalized === 'en' || normalized === 'sk') {
            return normalized;
        }
        return 'sk';
    }

    function rt(lang, id, vars = null) {
        const dict = {
            hu: {
                title: 'Terem foglaltság',
                subtitle_loading: 'Betöltés...',
                subtitle_no_room: 'Nincs kiválasztott terem',
                occupied: '🔴 Foglalt',
                free: '🟢 Szabad',
                now: 'Most',
                source: 'Forrás',
                daily_events: 'Napi események',
                next_events: 'Következő',
                source_server: 'Szerver',
                source_cache: 'Offline cache',
                source_no_data: 'Nincs adat',
                source_no_room: 'Nincs kiválasztott terem',
                no_rows: 'Nincs megjeleníthető foglaltság ehhez a nézethez.',
                updated_at: 'Frissítve',
                updated_unknown: 'Frissítési idő: ismeretlen'
            },
            sk: {
                title: 'Obsadenosť miestností',
                subtitle_loading: 'Načítavam...',
                subtitle_no_room: 'Nie je vybraná miestnosť',
                occupied: '🔴 Obsadené',
                free: '🟢 Voľné',
                now: 'Teraz',
                source: 'Zdroj',
                daily_events: 'Denné udalosti',
                next_events: 'Nasledujúce',
                source_server: 'Server',
                source_cache: 'Offline cache',
                source_no_data: 'Bez dát',
                source_no_room: 'Nie je vybraná miestnosť',
                no_rows: 'Pre tento pohľad nie sú dostupné žiadne udalosti.',
                updated_at: 'Aktualizované',
                updated_unknown: 'Čas aktualizácie: neznámy'
            },
            en: {
                title: 'Room occupancy',
                subtitle_loading: 'Loading...',
                subtitle_no_room: 'No room selected',
                occupied: '🔴 Occupied',
                free: '🟢 Free',
                now: 'Now',
                source: 'Source',
                daily_events: 'Daily events',
                next_events: 'Upcoming',
                source_server: 'Server',
                source_cache: 'Offline cache',
                source_no_data: 'No data',
                source_no_room: 'No room selected',
                no_rows: 'No events available for this view.',
                updated_at: 'Updated',
                updated_unknown: 'Update time: unknown'
            }
        };

        let text = String((dict[lang] && dict[lang][id]) || dict.en[id] || id || '');
        if (vars && typeof vars === 'object') {
            Object.entries(vars).forEach(([key, value]) => {
                text = text.replace(new RegExp(`\\{${key}\\}`, 'g'), String(value ?? ''));
            });
        }
        return text;
    }

    function getSettings() {
        const defaults = {
            roomId: 0,
            companyId: 0,
            showOnlyCurrent: false,
            showNextCount: 4,
            language: 'sk',
            runtimeRefreshIntervalSec: 60,
            apiBaseUrl: '../../api/room_occupancy.php'
        };

        const injected = (typeof window.EDUDISPLEJ_SETTINGS === 'object' && window.EDUDISPLEJ_SETTINGS) ? window.EDUDISPLEJ_SETTINGS : {};
        const params = new URLSearchParams(window.location.search);

        return {
            roomId: parseIntSafe(params.get('roomId') ?? injected.roomId, defaults.roomId),
            companyId: parseIntSafe(params.get('company_id') ?? params.get('companyId') ?? injected.companyId, defaults.companyId),
            showOnlyCurrent: parseBool(params.get('showOnlyCurrent') ?? injected.showOnlyCurrent, defaults.showOnlyCurrent),
            showNextCount: Math.max(1, Math.min(12, parseIntSafe(params.get('showNextCount') ?? injected.showNextCount, defaults.showNextCount))),
            language: normalizeLang(params.get('language') ?? injected.language ?? defaults.language),
            runtimeRefreshIntervalSec: Math.max(30, Math.min(3600, parseIntSafe(params.get('runtimeRefreshIntervalSec') ?? injected.runtimeRefreshIntervalSec, defaults.runtimeRefreshIntervalSec))),
            apiBaseUrl: String(params.get('apiBaseUrl') ?? injected.apiBaseUrl ?? defaults.apiBaseUrl)
        };
    }

    function resolveApiUrl(base, query) {
        const hasQ = String(base).includes('?');
        return `${base}${hasQ ? '&' : '?'}${query}`;
    }

    function render(data, settings, sourceText) {
        const subtitle = document.getElementById('subtitle');
        const status = document.getElementById('status');
        const eventsContainer = document.getElementById('events');
        const foot = document.getElementById('foot');
        const lang = normalizeLang(settings.language);

        document.documentElement.lang = lang;
        document.title = rt(lang, 'title');
        const titleEl = document.querySelector('.title');
        if (titleEl) {
            titleEl.textContent = rt(lang, 'title');
        }

        const roomName = String(data?.room_name || '').trim();
        const eventDate = String(data?.event_date || '').trim();
        subtitle.textContent = roomName ? `${roomName}${eventDate ? ` • ${eventDate}` : ''}` : rt(lang, 'subtitle_no_room');

        const current = data?.current_event || null;
        const isOccupied = Boolean(data?.is_occupied_now);
        const allEvents = Array.isArray(data?.events) ? data.events : [];

        const nowParts = new Date().toTimeString().slice(0, 5).split(':');
        const nowMinutes = ((parseInt(nowParts[0] || '0', 10) || 0) * 60) + (parseInt(nowParts[1] || '0', 10) || 0);
        const toMinutes = (hhmm) => {
            const parts = String(hhmm || '').split(':');
            const hh = parseInt(parts[0] || '0', 10) || 0;
            const mm = parseInt(parts[1] || '0', 10) || 0;
            return (hh * 60) + mm;
        };
        const upcoming = allEvents
            .filter((event) => toMinutes(event?.start_time) >= nowMinutes)
            .slice(0, settings.showNextCount);

        const rows = settings.showOnlyCurrent
            ? (current ? [current] : [])
            : allEvents;
        const rowsToRender = rows.slice(0, 24);

        const badges = [];
        badges.push(`<span class="badge ${isOccupied ? 'busy' : 'ok'}">${isOccupied ? rt(lang, 'occupied') : rt(lang, 'free')}</span>`);
        if (current) {
            badges.push(`<span class="badge info">${rt(lang, 'now')}: ${escapeHtml(current.start_time)}–${escapeHtml(current.end_time)} ${escapeHtml(current.event_title || '')}</span>`);
        }
        badges.push(`<span class="badge info">${rt(lang, 'source')}: ${escapeHtml(sourceText)}</span>`);
        if (!settings.showOnlyCurrent) {
            badges.push(`<span class="badge info">${rt(lang, 'daily_events')}: ${allEvents.length}</span>`);
        } else {
            badges.push(`<span class="badge info">${rt(lang, 'next_events')}: ${upcoming.length}</span>`);
        }
        status.innerHTML = badges.join('');

        if (!rowsToRender.length) {
            eventsContainer.innerHTML = `<div class="empty">${escapeHtml(rt(lang, 'no_rows'))}</div>`;
        } else {
            eventsContainer.innerHTML = `<div class="list">${rowsToRender.map((event) => {
                const time = `${escapeHtml(event.start_time || '')} - ${escapeHtml(event.end_time || '')}`;
                const title = escapeHtml(event.event_title || '');
                const note = escapeHtml(event.event_note || '');
                return `<div class="row"><div class="time">${time}</div><div class="text">${title}${note ? `<div class="muted" style="margin-top:4px;">${note}</div>` : ''}</div></div>`;
            }).join('')}</div>`;
        }

        const updateTs = allEvents.length > 0 ? String(allEvents[0]?.updated_at || '').trim() : '';
        foot.textContent = updateTs ? `${rt(lang, 'updated_at')}: ${updateTs}` : rt(lang, 'updated_unknown');
    }

    async function fetchWithTimeout(url, timeoutMs) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
            return await fetch(url, { method: 'GET', cache: 'no-store', signal: controller.signal });
        } finally {
            clearTimeout(timer);
        }
    }

    async function init() {
        const settings = getSettings();
        const cacheKey = `room_occ_cache_${settings.companyId}_${settings.roomId}`;
        const lang = normalizeLang(settings.language);

        document.documentElement.lang = lang;
        document.title = rt(lang, 'title');
        const titleEl = document.querySelector('.title');
        if (titleEl) {
            titleEl.textContent = rt(lang, 'title');
        }
        const subtitleEl = document.getElementById('subtitle');
        if (subtitleEl) {
            subtitleEl.textContent = rt(lang, 'subtitle_loading');
        }

        if (settings.roomId <= 0) {
            render({ room_name: '', event_date: new Date().toISOString().slice(0, 10), events: [], current_event: null, is_occupied_now: false }, settings, rt(lang, 'source_no_room'));
            return;
        }

        const params = new URLSearchParams({
            action: 'schedule',
            room_id: String(settings.roomId),
            date: new Date().toISOString().slice(0, 10)
        });
        if (settings.companyId > 0) {
            params.set('company_id', String(settings.companyId));
        }

        let rendered = false;
        try {
            const url = appendToken(resolveApiUrl(settings.apiBaseUrl, params.toString()));
            const response = await fetchWithTimeout(url, 6000);
            const payload = await response.json();
            if (response.ok && payload && payload.success) {
                const data = payload.data || {};
                render(data, settings, rt(lang, 'source_server'));
                rendered = true;
                try {
                    localStorage.setItem(cacheKey, JSON.stringify({ data, saved_at: Date.now() }));
                } catch (_) {}
            }
        } catch (_) {}

        if (!rendered) {
            try {
                const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
                if (cached?.data) {
                    render(cached.data, settings, rt(lang, 'source_cache'));
                    rendered = true;
                }
            } catch (_) {}
        }

        if (!rendered) {
            render({ room_name: '', event_date: new Date().toISOString().slice(0, 10), events: [], current_event: null, is_occupied_now: false }, settings, rt(lang, 'source_no_data'));
        }
    }

    init();
    setInterval(() => {
        init();
    }, Math.max(30, Math.min(3600, parseIntSafe((getSettings() || {}).runtimeRefreshIntervalSec, 60))) * 1000);
})();
</script>
</body>
</html>
